status.new-horizon-emp-1.description = Nieznacznie osłabia zdolności bojowe jednostki\nPod wpływem ataku mikro EMP, pomocnicze jednostki sterujące są uszkodzone, uruchamiany jest system zapasowy...
status.new-horizon-emp-2.name = EMP
status.new-horizon-emp-2.description = Osłabia zdolności bojowe jednostki\nPod wpływem ataku EMP, komputery kierowania ogniem są zakłócone.\n[accent]Nadpisuje niższe uszkodzenia EMP
