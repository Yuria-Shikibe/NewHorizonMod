block.new-horizon-sand-cracker.name = Kruszarka Piasku
block.new-horizon-sand-cracker.description = Kruszy materiały na piasek.
block.new-horizon-decoherence-reverser.name = Odwracacz Dekoharencji
#block.new-horizon-decoherence-reverser.description =
block.new-horizon-tungsten-reconstructor.name = Rekonstruktor Wolframu
block.new-horizon-titanium-reconstructor.name = Rekonstruktor Tytanu
block.new-horizon-oil-refiner.name = Rafineria Ropy
block.new-horizon-oil-refiner.description = Wydobywa ropę z piasku.
block.new-horizon-resource-convertor.name = Konwerter Zasobów
