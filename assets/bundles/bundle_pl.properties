#Items
item.new-horizon-hard-light.name = Twarde Światło
item.new-horizon-hard-light.description = Naturalnie uformowane kryształy węglowo-krzemowe powstające podczas wysokoenergetycznych procesów fizycznych, takich jak intensywne burze słoneczne, szeroko rozpowszechnione na powierzchni Midanty.
item.new-horizon-silicar.name = Sylikar
item.new-horizon-silicar.description = Odwrotnie zaprojektowane osiągnięcie z reliktów Midanty, ultralekki materiał powstały w wyniku degeneracji fotonów w określonych warunkach.
item.new-horizon-presstanium.name = Presstan
item.new-horizon-presstanium.description = Twardy, mocny kawałek metalu.
item.new-horizon-processor-junior.name = Młodszy Procesor
item.new-horizon-processor-junior.description = Podstawowy procesor.
item.new-horizon-processor-junior.details = "Intel – TAK!"
item.new-horizon-metal-oxhydrigen.name = Metalotlenek
item.new-horizon-metal-oxhydrigen.description = Kryształowo czysty!
item.new-horizon-zeta.name = Kryształ Zeta
item.new-horizon-zeta.description = Emituje słabą poświatę.
item.new-horizon-multiple-steel.name = Stal Wielowarstwowa
item.new-horizon-multiple-steel.description = Płyta składająca się z wielu warstw metali połączonych ze sobą.
item.new-horizon-processor-senior.name = Starszy Procesor
item.new-horizon-processor-senior.description = Wyższa prędkość!
item.new-horizon-processor-senior.details = "NVIDIA – TAK!"
item.new-horizon-irayrond-panel.name = Płyta Irydowa
item.new-horizon-irayrond-panel.description = Specjalny rodzaj twardego metalu o wysokiej odporności na temperaturę.
item.new-horizon-seton-alloy.name = Stop Setonu
item.new-horizon-seton-alloy.description = Ciężki i mocny.
item.new-horizon-nodex-plate.name = Płyta Nodex
item.new-horizon-nodex-plate.description = Inteligentny metal, który może się sam naprawiać.
item.new-horizon-ancimembrane.name = Ancimembrana
item.new-horizon-ancimembrane.description = Nieznana starożytna technologia.
item.new-horizon-hadronicomp.name = Hadronikomp
item.new-horizon-hadronicomp.description = Znany również jako materiał kwarkowo-gluonowy. Jego produkty są niezniszczalne, osiągając granice znanej nauki.
item.new-horizon-processor-hyper.name = Hiperprocesor
item.new-horizon-processor-hyper.description = Hiperfazowy układ obliczeniowy. Wydajność obliczeniowa zwiększona o kilka rzędów wielkości.
item.new-horizon-fusion-core-energy.name = Klaster Cząstek Fuzyjnych
item.new-horizon-fusion-core-energy.description = Duża liczba termojądrowych cząstek zamkniętych magnetycznie, mogą być używane jako energia lub bezpośrednio jako amunicja.
item.new-horizon-thermo-core-positive.name = Dodatni Ładunek Termiczny
item.new-horizon-thermo-core-positive.description = Pojemnik wypełniony energetycznym ładunkiem termicznym.
item.new-horizon-thermo-core-negative.name = Ujemny Ładunek Termiczny
item.new-horizon-thermo-core-negative.description = Pojemnik wypełniony chłodnym ładunkiem termicznym.
item.new-horizon-dark-energy.name = Ciemna Energia
item.new-horizon-dark-energy.description = Tajemnica wszechświata.

#Liquids
liquid.new-horizon-ammonia.name = Spolaryzowany Amoniak
liquid.new-horizon-ammonia.description = Silnie zasadowy amoniak powstały w specjalnych warunkach, szczególnie w wysokokwantowym środowisku Midanty.
liquid.new-horizon-hydrazine.name = Hydrazyna
liquid.new-horizon-hydrazine.description = Wysokoenergetyczne paliwo uzyskiwane ze spolaryzowanego amoniaku. Używane do wytwarzania energii lub dalszej produkcji.
liquid.new-horizon-quantum-liquid.name = Ciecz Kwantowa
liquid.new-horizon-quantum-liquid.description = Niestabilny obiekt kwantowy. Po wzbudzeniu może być używany do różnych celów przemysłowych.
liquid.new-horizon-xen-fluid.name = Ciecz Xen
liquid.new-horizon-xen-fluid.description = Wysokoenergetyczna ciecz. Może generować dużo energii.
liquid.new-horizon-zeta-fluid-positive.name = Dodatnia Ciecz Zeta
liquid.new-horizon-zeta-fluid-positive.description = Dodatnia ciecz po elektrolizie kryształów Zeta. Może być używana do przetwarzania chemicznego i zwrotu ujemnej cieczy Zeta.
liquid.new-horizon-zeta-fluid-negative.name = Ujemna Ciecz Zeta
liquid.new-horizon-zeta-fluid-negative.description = Ujemna ciecz po elektrolizie kryształów Zeta. Może być używana do przetwarzania chemicznego i zwrotu dodatniej cieczy Zeta.
liquid.new-horizon-irdryon-fluid.name = Ciecz Irdryon
liquid.new-horizon-irdryon-fluid.description = Niskotemperaturowa ciecz fazowa.

liquid.new-horizon-photon.name = Strumień Fotonów
liquid.new-horizon-photon.description = Uwięzione fotony.
liquid.new-horizon-particle-stream.name = Strumień Cząstek
#liquid.new-horizon-particle-stream.description =
liquid.new-horizon-neutron-stream.name = Strumień Neutronów
#liquid.new-horizon-neutron-stream.description =
liquid.new-horizon-proton-stream.name = Strumień Protonów
#liquid.new-horizon-proton-stream.description =
liquid.new-horizon-anti-matter-stream.name = Strumień Antymaterii
#liquid.new-horizon-anti-matter-stream.description =
liquid.new-horizon-zeta-positive-stream.name = Dodatni Strumień Zeta
#liquid.new-horizon-zeta-positive-stream.description =
liquid.new-horizon-zeta-negative-stream.name = Ujemny Strumień Zeta
#liquid.new-horizon-zeta-negative-stream.description =

liquid.new-horizon-plo-naq.name = Plo Naq
liquid.new-horizon-plo-naq.description = Krytyczna ciecz koloidalna. Może być dowolnie konfigurowana w dowolną wysokowytrzymałą strukturę lub używana do szybkiej naprawy uszkodzonych budynków.
liquid.new-horizon-cho-vat.name = Cho Vat
liquid.new-horizon-cho-vat.description = Chromowo-zielona energia cieczy. Znacznie redukuje otrzymywane obrażenia poprzez efekt rozpraszania energii.
liquid.new-horizon-kar-ion.name = Kar Ion
liquid.new-horizon-kar-ion.description = Sześciowymiarowe jony wysokowymiarowe. Niszczą konwencjonalne obiekty poprzez dysocjację strukturalną.

#Turret Block
block.new-horizon-bombard.name = Bombard
block.new-horizon-bombard.description = Duża wieżyczka artyleryjska.
block.new-horizon-multiple-artillery.details = [red]SALWA BURTOWA!
block.new-horizon-vortex.name = Wir
block.new-horizon-vortex.description = Duża wieżyczka.
block.new-horizon-hive.name = Ul
block.new-horizon-hive.description = Dalekosiężna wyrzutnia rakiet przeciwlotniczych.\nWystrzeliwuje rakiety po spiralnej trajektorii.
block.new-horizon-ancient-artillery.name = Starożytna Artyleria
block.new-horizon-ancient-artillery.description = Wystrzeliwuje potężny pocisk.\n\n[sky]Tylko w edytorze i piaskownicy. \n[accent]Włączono ponowne przechwytywanie po zniszczeniu. Zajmij ją, aby lepiej kontrolować pole bitwy.
block.new-horizon-prism.name = Pryzmat
block.new-horizon-prism.description = Wystrzeliwuje naładowaną wiązkę laserową, a mniejsze promienie odbijają się do pobliskich celów.
block.new-horizon-interferon.name = Interferon
block.new-horizon-interferon.description = Nieznana starożytna technologia\nWystrzeliwuje piorunujące pociski wybuchowe.
block.new-horizon-beam.name = Promień
block.new-horizon-beam.description = Szybko strzela laserami do wrogów.
block.new-horizon-antibody.name = Przeciwciało
block.new-horizon-antibody.description = Nieznana starożytna technologia\nWystrzeliwuje małe ładunki energii.
block.new-horizon-webber.name = Webber
block.new-horizon-webber.description = Chwyta wrogów za pomocą optycznych pęset.\n\n[accent]Priorytet dla szybszych wrogów.
block.new-horizon-gravity.name = Grawitacja
block.new-horizon-gravity.description = Wystrzeliwuje promień ciągnący, który może przyciągać wiele jednostek jednocześnie.
block.new-horizon-eternity.name = Wieczność
block.new-horizon-eternity.description = Nadzwyczajna strategiczno-taktyczna superbroń. „Może kosztować wiele, ale zasługuje na chwałę”.
block.new-horizon-eternity.details = „Na północnej otchłani jest ryba, imię jej Kun. Na południowych morzach jest armata, imię jej Wieczność. Jej długość to kilkaset metrów, średnica kilkadziesiąt metrów. Gdy obraca się w ogień, meteory przelatują nad głową, niebo płonie purpurą. Przy detonacji horyzont rozbłyskuje jasno, jakby fioletowe chmury spływały z nieba, unicestwiając wszystkich wrogów. Władcy ogarnięci strachem, zawiązują sojusze, by osłabić Qin. Bramy otwarte, by ją przyjąć, ale wahają się i nie śmią ruszyć. W negocjacjach żądają zmniejszenia projektu o połowę, ale bezskutecznie. Przez dziesięciolecia nie śmią jechać na południe, by paść swoje konie.” – fragment z „Wieczności”. Jej koszt, skala i siła odstraszania są bezprecedensowe. Pod presją zakazano rozmieszczania na zagranicznych bazach, z zapewnieniami, że nie zostanie użyta jako pierwsza. Trudny proces badawczo-rozwojowy i ogromne koszty doprowadziły do zawieszenia projektu. Rzeczywiście, ogromne zużycie wszelkich zasobów uczyniłoby i tak niezbyt bogatą firmę jeszcze biedniejszą. Ale jako strategiczny atut rzadko jest utrzymywana w stanie aktywnym.
block.new-horizon-anti-bullet-turret.name = Przechwytywacz
block.new-horizon-anti-bullet-turret.description = Wieżyczka obrony punktowej. Przechwytuje nadlatujące pociski.
block.new-horizon-anti-bullet-turret.details = W rzeczywistości wykorzystuje obwód zasilania i komputer kierowania ogniem z Argmota.
block.new-horizon-pulse.name = Impuls
block.new-horizon-pulse.description = Strzela seriami pocisków do wrogów. Zadaje więcej obrażeń kinetycznych.
block.new-horizon-pulse.details = Krążą plotki, że wojskowa baza danych nadała mu kryptonim „Stara Mama”.
block.new-horizon-dendrite.name = Dendryt
block.new-horizon-dendrite.description = Nieznana starożytna technologia
block.new-horizon-atom-separator.name = Separator Atomowy
block.new-horizon-atom-separator.description = Strzela zabójczym ciągłym laserem.\n\nPriorytet dla wrogów o mniejszej prędkości.
block.new-horizon-atom-separator.details = Nazywany też Atomowym Cięciem. Mówi się, że wymuszone wyłączenie blokady elewacji pozwala strzelać prosto w niebo.\n\n[accent]„Czy to ja widziałem dziwną blondynkę w zbroi stojącą tam?”
block.new-horizon-blood-star.name = Krwawa Gwiazda
block.new-horizon-blood-star.description = Wystrzeliwuje statyczną bombę jonową.
block.new-horizon-blood-star.details = Gotowy magazyn amunicji może spowodować niszczycielską reakcję łańcuchową w przypadku trafienia. Ostrożnie chroń wieżyczkę.
block.new-horizon-multiple-launcher.name = Wielowyrzutnia
block.new-horizon-multiple-launcher.description = Duża wieżyczka wyrzutni rakiet.
block.new-horizon-multiple-launcher.details = Nazywana „Katiuszą”, co wydaje się być jakąś starożytną kobiecą nazwą. Co dziwne, ten przydomek jest nieoczekiwanie popularny.\n\nMoże dlatego, że lubi pić?
block.new-horizon-thermo-turret.name = Termo-wieżyczka
block.new-horizon-thermo-turret.description = Prosta obronna wieżyczka, która wystrzeliwuje samonaprowadzające się pociski poprzez ładowanie cieczy Xen.
block.new-horizon-thermo-turret.details = Wieżyczka z wczesnej fazy gry, zoptymalizowana pod kątem chemicznych otworów wentylacyjnych Midanty. Efekt pirolizy cieczy Xen, stymulowany elektrycznością, wystarcza do odparcia ataków mniejszych jednostek.
block.new-horizon-rail-gun.name = Działo Szynowe
block.new-horizon-rail-gun.description = Wieżyczka z wolną prędkością obrotu i niską szybkostrzelnością, strzelająca pociskami o bardzo dużym zasięgu i wysokich obrażeniach.
block.new-horizon-rail-gun.details = Prędkość wylotowa zbliża się do 15 Machów. Jej ekstremalna penetracja pozwala z łatwością przebijać każdy cel.
block.new-horizon-end-of-era.name = Koniec Ery
block.new-horizon-end-of-era.description = Może być wyposażona w potężne pociski.
block.new-horizon-executor.name = Kat
block.new-horizon-executor.description = Wystrzeliwuje potężne pociski energetyczne, które szukają wrogów.
block.new-horizon-synchro.name = Synchro
block.new-horizon-synchro.description = Standardowa wieżyczka o dużej szybkostrzelności. Może zadawać duże obrażenia jednostkom, ale nie jest dobra w niszczeniu tarcz.
block.new-horizon-argmot.name = Argmot
block.new-horizon-argmot.description = Strzela skupiskami elektryczności w wrogów. Szybkostrzelność wzrasta z czasem. Przegrzewa się, jeśli strzela zbyt długo. Zadaje niszczycielskie obrażenia tarczom.
block.new-horizon-argmot.details = Przy pełnym obciążeniu zadaje niszczycielskie obrażenia, ale jeśli ogromne ciepło odpadowe nie jest zarządzane, doprowadzi do przymusowego wyłączenia.
block.new-horizon-slavio.name = Slavio
block.new-horizon-slavio.description = Wystrzeliwuje serię samonaprowadzających się rakiet. Zadaje duże obrażenia jednostkom, ale nie jest skuteczny przeciwko tarczom.
block.new-horizon-concentration.name = Koncentracja
block.new-horizon-concentration.description = [sky]Im dłużej się wpatruje, [#bf92f9]tym silniejsza się staje.
block.new-horizon-electro.name = Elektro
block.new-horizon-electro.description = Uwalnia pociski energetyczne, które paraliżują wrogów i zadają ciągłe obrażenia na dużym obszarze.

