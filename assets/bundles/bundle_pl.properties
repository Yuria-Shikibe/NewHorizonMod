nh.setting.nh-hide-starting-log.name = Wyłącz Interfejs Startowy Modyfikacji
nh.setting.nh-hide-starting-log.desc = Określa, czy pokazywać interfejs startowy New Horizon przy każdym uruchomieniu gry.
nh.setting.nh-effect-detail.name = Pełne Wyświetlanie Efektów
nh.setting.nh-effect-detail.desc = Wyłączenie zmniejszy niektóre efekty wizualne. Rozważ wyłączenie tej opcji, jeśli twoje urządzenie ma niską wydajność.
nh.setting.nh-gravity-trap-alpha.name = Przezroczystość Pułapki Grawitacyjnej: {0}
nh.setting.nh-gravity-trap-alpha.desc = Wartość wewnętrznej przezroczystości pułapki grawitacyjnej.
nh.setting.nh-gravity-trap-outline-alpha.name = Przezroczystość Konturu Pułapki Grawitacyjnej: {0}
nh.setting.nh-gravity-trap-outline-alpha.desc = Wartość przezroczystości konturu pułapki grawitacyjnej.
nh.setting.nh-override-unit-shield.name = Nadpisywanie Tarcz Jednostek
nh.setting.nh-override-unit-shield.desc = Dodaje tarczę o stałej pojemności większości jednostek, zastępując waniliową tarczę falową.
nh.setting.nh-override-core-unit.name = Dostosowanie Jednostek Rdzenia
nh.setting.nh-override-core-unit.desc = Zwiększa statystyki, takie jak prędkość budowy, waniliowych jednostek rdzenia.
nh.setting.nh-override-logistic.name = Nadpisywanie Logistyki Waniliowej
nh.setting.nh-override-logistic.desc = Ukrywa większość waniliowych budynków logistycznych, pokazując tylko te z Nowego Horyzontu.\nWłącz to, jeśli nie lubisz logistyki wielotechnologicznej lub po prostu chcesz używać logistyki Nowego Horyzontu.
nh.setting.nh-override-drill.name = Nadpisywanie Waniliowych Wierteł
nh.setting.nh-override-drill.desc = Ukrywa wszystkie waniliowe wiertła z wyjątkiem pneumatycznego i uderzeniowego.\nDostosowuje również statystyki i koszty pozostałych wierteł.
nh.setting.nh-override-factories.name = Nadpisywanie Waniliowych Fabryk
nh.setting.nh-override-factories.desc = Upraszcza produkcję przedmiotów takich jak krzem i siarka, aby przyspieszyć postęp na wczesnym etapie gry.
nh.setting.nh-override-power.name = Nadpisywanie Waniliowej Energii
nh.setting.nh-override-power.desc = Ukrywa niektóre waniliowe budynki energetyczne.\nWłącz to, jeśli nie lubisz budynków energetycznych wielu technologii lub chcesz używać systemów energetycznych Nowego Horyzontu.
nh.setting.nh-override-unit.name = Nadpisywanie Waniliowych Jednostek
nh.setting.nh-override-unit.desc = Usuwa ograniczenia środowiskowe ze wszystkich waniliowych jednostek.\nPrzydatne podczas gry w środowiskach innych niż Midantha.
nh.setting.nh-override-logic.name = Nadpisywanie Waniliowej Logiki
nh.setting.nh-override-logic.desc = Dostosowuje koszt waniliowych budynków logiki, aby można je było budować we wszystkich środowiskach.
nh.setting.nh-override-item.name = Dostosowanie Waniliowych Przedmiotów
nh.setting.nh-override-item.desc = Usuwa planetarne ograniczenia dotyczące używania niektórych waniliowych materiałów przedmiotowych.
nh.setting.nh-override-turret.name = Dostosowanie Waniliowych Wieżyczek
nh.setting.nh-override-turret.desc = Dodaje amunicję specyficzną dla moda do waniliowych wieżyczek i dostosowuje niektóre ich wartości.
nh.setting.nh-event-raid.name = Dodaj Naloty Powietrzne
nh.setting.nh-event-raid.desc = Włącza okresowe losowe naloty powietrzne na mapach innych niż piaskownica. Nie wymaga procesora świata.
nh.setting.nh-debugging.name = Tryb Debugowania
nh.setting.nh-debugging.desc = Włącza tryb debugowania\nPozwala włączyć niektóre treści debugowania.
nh.setting.nh-debug-panel.name = Panel Debugowania
nh.setting.nh-debug-panel.desc = Dodaje i włącza panel debugowania specyficzny dla moda.

