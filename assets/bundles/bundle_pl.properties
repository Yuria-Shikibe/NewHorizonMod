status.new-horizon-intercepted.name = Przeciw-warp I
status.new-horizon-intercepted.description = Jednostka docelowa zostanie zmuszona do wyjścia z warpu\nPoważne zakłócenie kanału hiperprzestrzennego, wymagane natychmiastowe wyjście i ocena.
