block.new-horizon-resonance-mining-facility.name = Wiertło Rezonansowe
block.new-horizon-resonance-mining-facility.description = Wykorzystuje fale mechaniczne o określonej częstotliwości do wydajnego wydobycia surowców.
block.new-horizon-beam-mining-facility.name = Wiertło Promieniowe
block.new-horizon-beam-mining-facility.description = Wykorzystuje lasery o dużej mocy do operacji wydobywczych. Zdolne do obróbki twardszych rud. Może korzystać z modułów górniczych.
block.new-horizon-implosion-mining-facility.name = Wiertło Implozyjne
block.new-horizon-implosion-mining-facility.description = Wydajnie wydobywa surowce za pomocą implozji.
block.new-horizon-air-radiator.name = Chłodnica Powietrzna
#block.new-horizon-air-radiator.description =
block.new-horizon-liquid-radiator.name = Chłodnica Cieczy
