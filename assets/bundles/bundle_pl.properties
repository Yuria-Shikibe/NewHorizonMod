mod.new-horizon.name = Nowy Horyzont
mod.new-horizon.author = Yuria & Lao
mod.new-horizon.description = Wersja beta. Kampania nie jest dołączona.\n\nZawiera stabilną zawartość oraz opcjonalne nadpisanie mechanik waniliowych.\n\nMod jest grywalny jako rozszerzenie zarówno dla Serpulo, jak i Erekir.\n\nKampania wciąż w fazie tworzenia.
mod.new-horizon.subtitle = Wersja beta. Kampania nie jest dołączona.

