block.new-horizon-photothermal-generator.name = Generator Fototermiczny
block.new-horizon-photothermal-generator.description = Specjalna wersja generatora spalinowego. Przekształca część energii cieplnej w twarde światło.
block.new-horizon-geological-photothermal-generator.name = Geologiczny Generator Fototermiczny
block.new-horizon-geological-photothermal-generator.description = Specjalna wersja generatora termicznego. Przekształca część energii cieplnej w twarde światło.
block.new-horizon-vector-condenser.name = Turbina Wektorowa
block.new-horizon-vector-condenser.description = Specjalna wersja skraplacza turbinowego. Przekształca część energii cieplnej w twarde światło.
block.new-horizon-differential-reactor.name = Reaktor Różnicowy
#block.new-horizon-differential-reactor.description =
block.new-horizon-photon-panel.name = Panel Fotonowy
block.new-horizon-photon-panel.description = Ulepszony panel słoneczny. Generuje energię ze światła słonecznego, jednocześnie wychwytując światło i przekształcając je w twarde światło.\nWydajność konwersji zależy od mnożnika słonecznego. Produkty są przesyłane bezpośrednio do rdzenia za pomocą protokołu hiperinwentarzowego, bez potrzeby stosowania komponentów logistycznych. Zobacz kategorię budynków energetycznych dla powiązanych obiektów produkcyjnych.
block.new-horizon-neutralization-generator.name = Generator Neutralizacji
block.new-horizon-neutralization-generator.description = Generuje energię z energii uwalnianej podczas neutralizacji spolaryzowanego amoniaku. Wytwarza wodę jako produkt uboczny.
block.new-horizon-hydrazine-generator.name = Generator Hydrazynowy
block.new-horizon-hydrazine-generator.description = Generuje energię poprzez spalanie hydrazyny.
block.new-horizon-gravity-trap-small.name = Mała Pułapka Grawitacyjna
block.new-horizon-gravity-trap-small.description = Lekki generator studni grawitacyjnej. Tworzy pułapkę grawitacyjną w określonym zasięgu.
block.new-horizon-gravity-trap.name = Standardowa Pułapka Grawitacyjna
block.new-horizon-gravity-trap.description = Ciężki generator studni grawitacyjnej. Tworzy pułapkę grawitacyjną i przewodzi elektryczność na dużym obszarze.
block.new-horizon-gravity-trap-heavy.name = Ciężka Pułapka Grawitacyjna
block.new-horizon-gravity-trap-heavy.description = Najcięższy generator studni grawitacyjnej. Tworzy pułapkę grawitacyjną i przewodzi elektryczność na dużym obszarze.
block.new-horizon-zeta-generator.name = Fuzer Zeta
block.new-horizon-zeta-generator.description = Stabilny i wydajny reaktor.
block.new-horizon-armor-battery.name = Opancerzona Bateria
block.new-horizon-armor-battery.description = Mniejsza.
block.new-horizon-armor-battery-large.name = Duża Opancerzona Bateria
block.new-horizon-armor-battery-large.description = Opancerzona duża bateria o większej trwałości, ale zmniejszonej pojemności. Ze względu na potrzebę rozmieszczania bloków energetycznych w niebezpiecznych obszarach, minister bezpieczeństwa Rasor przedstawił propozycję i dyskusję na spotkaniu dotyczącą „bezpieczniejszych baterii”. (Wcześniej eksplodujące duże baterie stworzyły już zbyt wiele wdów.) W rezultacie duża bateria została przebudowana z wytrzymalszych materiałów i wyposażona w kontrolę elektroniczną.
block.new-horizon-armor-battery-huge.name = Hiper-bateria
block.new-horizon-armor-battery-huge.description = Przechowuje energię. Ma większą pojemność niż duże baterie.
block.new-horizon-hydro-fuel-cell.name = Wodny Ogniwo Paliwowe
block.new-horizon-hydro-fuel-cell.description = Generator czystej energii. Energia chemiczna jest przekształcana w elektryczność pod ochroną azotu.
block.new-horizon-fission-reactor.name = Reaktor Rozszczepieniowy
#block.new-horizon-fission-reactor.description =
block.new-horizon-fusion-reactor.name = Reaktor Fuzyjny
block.new-horizon-fusion-reactor.description = Zapada jądra fuzyjne, aby generować energię.
block.new-horizon-hyper-reactor.name = Hiper-reaktor
block.new-horizon-hyper-reactor.description = Generuje niezwykle duże ilości energii z dodatnich ładunków termicznych, ale także generuje pioruny. Obrażenia od piorunów są zwiększone, gdy budynek jest uszkodzony.\n[accent]Eksploduje po zniszczeniu.

#DefenseBlock
block.new-horizon-titanium-wall.name = Warstwowy Mur Tytanowy
block.new-horizon-titanium-wall.description = Solidny mur o wyższym zdrowiu, może blokować nadlatujące pociski z wbudowaną redukcją obrażeń.
block.new-horizon-presstanium-wall.name = Mur Presstanowy
block.new-horizon-presstanium-wall.description = Solidny mur, może blokować nadlatujące pociski, pioruny i lasery. Może rozdzielać otrzymane obrażenia na pobliskie mury.
block.new-horizon-presstanium-wall.details = Nowa generacja obiektu obronnego. Konstrukcja rozdzielająca obrażenia znacznie poprawia odporność muru na uderzenia.
block.new-horizon-refactoring-multi-wall.name = Mur Wielowarstwowy Refaktoryzacyjny
block.new-horizon-refactoring-multi-wall.description = Solidny mur o wyższym zdrowiu, może blokować nadlatujące pociski, pioruny i lasery. Może rozdzielać więcej obrażeń z większą liczbą pobliskich murów. Ma redukcję obrażeń.
block.new-horizon-refactoring-multi-wall.details = Poprzez nakładanie i rekonstrukcję murów torowych ze stali wysokopromiennej, odporność muru na uderzenia jest dodatkowo zwiększona.
block.new-horizon-seton-phased-wall.name = Fazowy Mur Setonu
block.new-horizon-seton-phased-wall.description = Solidny mur z silnym pancerzem i wysokim zdrowiem, może blokować nadlatujące pociski, pioruny i lasery. Może rozdzielać więcej obrażeń z większą liczbą pobliskich murów. Ma wyższą redukcję obrażeń.
block.new-horizon-seton-phased-wall.details = Wysokowytrzymały materiał odporny na uderzenia, powstały w wyniku interakcji gęstego stopu i tkaniny fazowej, stosowany w liniach obrony w celu dalszego zwiększenia niezawodności.
block.new-horizon-shaped-wall.name = Mur Adaptacyjny
block.new-horizon-shaped-wall.description = Prawie niezniszczalny mur, może blokować nadlatujące pociski, pioruny i lasery. Może rozdzielać więcej obrażeń z większą liczbą pobliskich murów. Ma dużą redukcję obrażeń.
block.new-horizon-shaped-wall.details = Tak zwany „metal z pamięcią kształtu”, którego forma przestrzenna jest ustalana po zakończeniu budowy, a kolejne mury są koordynowane w celu utrzymania struktury. Ze względu na właściwości materiału większość ataków nie może przebić muru. Niektóre obiekty wyłącznie korzystają z tego typu muru. To tylko produkt uboczny.
block.new-horizon-fire-extinguisher.name = Gaśnica
block.new-horizon-fire-extinguisher.description = Gasi pobliskie pożary.
block.new-horizon-blaster.name = Blaster
block.new-horizon-blaster.description = Uwalnia pioruny w kierunku zbliżających się jednostek, odrzuca je i zadaje obrażenia.
block.new-horizon-bomb-launcher.name = Wyrzutnia Bomb
block.new-horizon-bomb-launcher.description = Wystrzeliwuje bombę z opóźnionym czasem lądowania w pozycję celu.\n\n[sky]Można jednocześnie dowodzić wieloma budynkami.
block.new-horizon-air-raider.name = Nalot Powietrzny
block.new-horizon-air-raider.description = Zadaje wiele uderzeń rakietowych w cel.
block.new-horizon-flood-pipe.name = Rura Powodziowa
block.new-horizon-flood-pipe.description = Zwiększa różne statystyki w oparciu o przechowywane Plo-Naq, Cho-Vat i Kar-Ion. Dystrybuuje zawartość z sąsiednimi rurami powodziowymi.

#UnitBlock
block.new-horizon-basic-jump-gate.name = Podstawowa Brama Skokowa
block.new-horizon-basic-jump-gate.description = Pozwala graczom przywołać jednostki do wsparcia walki.\n[sky]Może przywołać jednostki T1, T2 i T3 Midanty.
block.new-horizon-primary-jump-gate.name = Podstawowa Brama Skokowa
block.new-horizon-primary-jump-gate.description = Pozwala graczom przywołać jednostki do wsparcia walki.\n[sky]Może przywołać jednostki T1, T2 i T3.
block.new-horizon-standard-jump-gate.name = Standardowa Brama Skokowa
block.new-horizon-standard-jump-gate.description = Pozwala graczom przywołać jednostki do wsparcia walki.\n[sky]Może przywołać jednostki T4, T5 i młodsze jednostki.
block.new-horizon-hyper-jump-gate.name = Hiper Brama Skokowa
block.new-horizon-hyper-jump-gate.description = Pozwala graczom przywołać jednostki do wsparcia walki.\n[sky]Może przywołać starsze jednostki.
block.new-horizon-hyper-space-warper.name = Bramy Zagięcia Hiperprzestrzennego
block.new-horizon-hyper-space-warper.description = Służy do transportu jednostek.\n\n[sky]Może być zablokowana przez wrogie pułapki grawitacyjne.\n[sky]Zasięg zakłóceń wrogiej pułapki grawitacyjnej można zobaczyć na HUD. Pułapka grawitacyjna wymusi na jednostce hiperprzestrzennej wyskoczenie i zada procentowe obrażenia.
block.new-horizon-module-rail.name = Szyna Modułowa
block.new-horizon-module-rail.description = Specjalistyczna szyna do transportu dużych modułów.

#SpecialBlock
block.new-horizon-core-conflux.name = Rdzeń: Konfluks
block.new-horizon-core-conflux.description = Najmniejszy rdzeń placówkowy, o umiarkowanym magazynie i zdolnościach obronnych.
block.new-horizon-core-array.name = Rdzeń: Array
block.new-horizon-core-array.description = Rdzeń bazowy średniej wielkości z doskonałym magazynem i obroną, zdolny do utrzymania bazy średniej wielkości.
block.new-horizon-core-nexus.name = Rdzeń: Nexus
block.new-horizon-core-nexus.description = Duży rdzeń bazowy z wyjątkowym magazynem i obroną, zdolny do utrzymania dużej bazy.
block.new-horizon-core-cluster.name = Rdzeń: Cluster
block.new-horizon-core-cluster.description = Najbardziej zaawansowany rdzeń bazowy, produkt wysokotechnologicznej inżynierii zrekonstruowany ze starożytnej technologii. Posiada niewyobrażalny magazyn i zdolności obronne, zdolny do utrzymania ogromnej bazy, jednocześnie wspierając wyjątkowo potężnego mecha rdzeniowego.
block.new-horizon-rift-shield.name = Generator Tarczy Szczelinowej
block.new-horizon-rift-shield.description = Tworzy potężną tarczę do odbijania nadlatujących pocisków i blokowania wrogów.\nZużywa więcej zasobów przy niskiej pojemności tarczy.
block.new-horizon-standard-shield-generator.name = Standardowy Generator Tarczy
block.new-horizon-standard-shield-generator.description = Lekki standardowy generator tarczy. Tworzy prostokątną ścianę siłową.
block.new-horizon-large-shield-generator.name = Duży Projektor Siłowy
block.new-horizon-large-shield-generator.description = Tworzy większe i szybciej regenerujące się pole siłowe, chroniąc budynki i jednostki wewnątrz przed obrażeniami.\nPrzegrzewa się, jeśli otrzyma zbyt dużo obrażeń. Opcjonalnie używa chłodziwa, aby zapobiec przegrzaniu. Rdzenie fuzyjne zwiększają rozmiar tarczy.
block.new-horizon-standard-regen-projector.name = Standardowy Projektor Regeneracji
block.new-horizon-standard-regen-projector.description = Naprawia uszkodzone budynki w prostokątnym obszarze. Użycie tkaniny fazowej zwiększa prędkość naprawy. Ma minimalny próg naprawy, umożliwiając szybszą naprawę małych budynków. Efekty naprawy nie kumulują się.
block.new-horizon-heavy-regen-projector.name = Ciężki Projektor Regeneracji
block.new-horizon-heavy-regen-projector.description = Naprawia uszkodzone budynki w większym prostokątnym obszarze. Użycie membranelli zwiększa prędkość naprawy. Ma wyższy minimalny próg naprawy, umożliwiając szybszą naprawę małych i średnich budynków. Efekty naprawy nie kumulują się.
block.new-horizon-standard-storage.name = Standardowy Magazyn
block.new-horizon-standard-storage.description = Lekki magazyn przedmiotów. Przedmioty mogą być z niego rozładowywane za pomocą rozładowywaczy.
block.new-horizon-heavy-storage.name = Ciężki Magazyn
block.new-horizon-heavy-storage.description = Ciężki magazyn przedmiotów. Przedmioty mogą być z niego rozładowywane za pomocą rozładowywaczy.
block.new-horizon-remote-storage.name = Zdalny Magazyn
block.new-horizon-remote-storage.description = Bezpośrednio łączy się z rdzeniem, niezależnie od jego pozycji w świecie. Zużycie energii wzrasta proporcjonalnie do liczby umieszczonych.[accent]Nie zapewnia dodatkowej pojemności przedmiotów ani funkcji rdzenia.
block.new-horizon-junior-module-beacon.name = Wieża Latarni Przyspieszenia
block.new-horizon-junior-module-beacon.description = Przyspiesza wszystkie przyspieszalne budynki w prostokątnym obszarze wyśrodkowanym na nim. Dodanie tkaniny fazowej dodatkowo zwiększa mnożnik przyspieszenia.
block.new-horizon-senior-module-beacon.name = Wieża Latarni Projektowej
block.new-horizon-senior-module-beacon.description = Zwiększa produkcję wyznaczonych budynków w prostokątnym obszarze wyśrodkowanym na nim. Dodanie stopu Tsunami dodatkowo zwiększa mnożnik produkcji. Zwiększa tylko wydajność przedmiotów i modułów.

#LogicBlock
block.new-horizon-icon-display-small.name = Mały Wyświetlacz Ikon
block.new-horizon-icon-display-small.description = Wyświetla ikony zawartości gry. Jego zawartość może być odczytywana i konfigurowana za pomocą konfiguracji procesora świata.
block.new-horizon-icon-display.name = Wyświetlacz Ikon
block.new-horizon-icon-display.description = Wyświetla ikony zawartości gry. Jego zawartość może być odczytywana i konfigurowana za pomocą konfiguracji procesora świata.
block.new-horizon-character-display-small.name = Mały Wyświetlacz Znaków
block.new-horizon-character-display-small.description = Wyświetla znaki. Tekstury znaków wykorzystują tekstury nakładkowych podłóg z gry.
block.new-horizon-character-display.name = Wyświetlacz Znaków
block.new-horizon-character-display.description = Wyświetla znaki. Tekstury znaków wykorzystują tekstury nakładkowych podłóg z gry.

#unit
unit.new-horizon-scalar.name = Skalar
unit.new-horizon-scalar.description = Jednostka rdzenia dla Rdzenia Konfluks. Wyposażona w lekką rozproszoną armatę termoelektryczną i wzmacniacz silnika.\nZdolna do wydobywania rud zarówno z podłóg, jak i ścian.
unit.new-horizon-vector.name = Wektor
unit.new-horizon-vector.description = Jednostka rdzenia dla Rdzenia Array. Wyposażona w lekkie podwójne armaty wybuchowe i wzmacniacz silnika.\nZdolna do wydobywania rud zarówno z podłóg, jak i ścian.
unit.new-horizon-martix.name = Matryca
unit.new-horizon-martix.description = Jednostka rdzenia dla Rdzenia Nexus. Wyposażona w podwójne samonaprowadzające się strzały rozproszone i wzmacniacz silnika. Może również nakładać tarcze na pobliskie jednostki.\nZdolna do wydobywania rud zarówno z podłóg, jak i ścian.
unit.new-horizon-tensor.name = Tensor
unit.new-horizon-tensor.description = Jednostka rdzenia dla Rdzenia Cluster. Produkt odwrotnej inżynierii starożytnej technologii, wyposażony w podwójne szybkostrzelne elektromagnetyczne samonaprowadzające się rakiety energetyczne. Posiada wytrzymały kadłub i tarczę pierścieniową, a także może nadawać silne tarcze jednostkom w pewnym promieniu.\nZdolna do wydobywania rud zarówno z podłóg, jak i ścian.
unit.new-horizon-origin.name = Początek
unit.new-horizon-origin.description = Lekka jednostka naziemna wyposażona w rozproszoną armatę.
unit.new-horizon-sharp.name = Ostry
unit.new-horizon-sharp.description = Lekka jednostka powietrzna wyposażona w lekką armatę termiczną.
unit.new-horizon-assaulter.name = Szturmowiec
unit.new-horizon-assaulter.description = Jednostka samobójcza, strzelająca przeciążonym laserem.
unit.new-horizon-apparition.name = Zjawa
unit.new-horizon-apparition.description = Średnioszybki samolot szturmowy\nStrzela rozproszonymi samonaprowadzającymi się impulsami piorunów.
unit.new-horizon-branch.name = Gałąź
unit.new-horizon-branch.description = Lekka jednostka powietrzna.
unit.new-horizon-thynomo.name = Tynomo
unit.new-horizon-thynomo.description = Średnia jednostka naziemna wyposażona w armatę laserową.
unit.new-horizon-relay.name = Przekaźnik
unit.new-horizon-relay.description = Lekki okręt morski wyposażony w dwie wyrzutnie rakiet.
unit.new-horizon-aliotiat.name = Aliotiat
unit.new-horizon-aliotiat.description = Średnia naziemna jednostka wsparcia.
unit.new-horizon-warper.name = Zaginacz
unit.new-horizon-warper.description = Szybki powietrzny bombowiec.
unit.new-horizon-ghost.name = Duch
unit.new-horizon-ghost.description = Średni wspierający okręt morski.
unit.new-horizon-rhino.name = Nosorożec
unit.new-horizon-rhino.description = Ciężko opancerzony statek cargo z wysoką prędkością budowy.
unit.new-horizon-gather.name = Zbieracz
unit.new-horizon-gather.description = Starszy dron górniczy.
unit.new-horizon-tarlidor.name = Tarlidor
unit.new-horizon-tarlidor.description = Ciężka naziemna jednostka wsparcia.
unit.new-horizon-naxos.name = Naksos
unit.new-horizon-naxos.description = Myśliwiec przeciwlotniczy wyposażony w tnący promień.\n\n[accent]Atakuje tylko jednostki powietrzne.
unit.new-horizon-striker.name = Uderzacz
unit.new-horizon-striker.description = Ciężka powietrzna jednostka wsparcia. Wyposażona w dalekosiężne armaty laserowe.
unit.new-horizon-zarkov.name = Zarkow
unit.new-horizon-zarkov.description = Ciężki wspierający okręt morski, wyposażony w 4 wieloprowadnicowe wyrzutnie rakiet.
unit.new-horizon-annihilation.name = Anihilacja
unit.new-horizon-annihilation.description = Ciężka jednostka naziemna wyposażona w bojową armatę laserową i wyrzutnie rakiet.
unit.new-horizon-destruction.name = Zniszczenie
unit.new-horizon-destruction.description = Ciężka powietrzna jednostka bojowa.
unit.new-horizon-longinus.name = Longinus
unit.new-horizon-longinus.description = Krążownik artyleryjski, strzela śmiercionośnym pociskiem energetycznym.
unit.new-horizon-saviour.name = Zbawca
unit.new-horizon-saviour.description = Duża jednostka wsparcia wyposażona w dwie ciężkie wieżyczki EMP.
unit.new-horizon-hurricane.name = Pirolizer
unit.new-horizon-hurricane.description = Powietrzny flagowiec. Może łatwo zniszczyć wszystko.
unit.new-horizon-anvil.name = Kowadło
unit.new-horizon-anvil.description = Ciężki okręt bojowy.
unit.new-horizon-declining.name = Upadek
unit.new-horizon-declining.description = Morski flagowiec. Wyposażony w 3 działka szynowe i inną małą broń.
unit.new-horizon-sin.name = Grzech
unit.new-horizon-sin.description = Ciężki naziemny mech, wyposażony w wiele broni rakietowej.
unit.new-horizon-collapser.name = Zapadacz
unit.new-horizon-collapser.description = Wielki powietrzny flagowiec. Stworzony do niszczenia wnętrz baz wroga.
unit.new-horizon-ancient-probe.name = Starożytna Sonda
unit.new-horizon-ancient-probe.description = Nieznana starożytna technologia.\nSkanuje i wysyła dane o bazach wroga, może przyciągnąć nalot.\n[red]<Nie masz jeszcze uprawnień do przeglądania tego podpunktu>
unit.new-horizon-histone.name = Histon
unit.new-horizon-histone.description = Nieznana starożytna technologia\nAutonomiczny mechanizm laserowy\n[red]<Nie masz jeszcze uprawnień do przeglądania tego podpunktu>
unit.new-horizon-restriction-enzyme.name = Enzym Restrykcyjny
unit.new-horizon-restriction-enzyme.description = Nieznana starożytna technologia.\nAutomatyczna starożytna wieżyczka.\n[red]<Nie masz jeszcze uprawnień do przeglądania tego podpunktu>
unit.new-horizon-macrophage.name = Makrofag
unit.new-horizon-macrophage.description = Nieznana starożytna technologia.\nCiężki okręt bojowy. Może wykonywać ruch okrężny.\n[red]<Nie masz jeszcze uprawnień do przeglądania tego podpunktu>
unit.new-horizon-lymph.name = Limfa
unit.new-horizon-lymph.description = Nieznana starożytna technologia\nAutonomiczna taktyczna platforma uzbrojenia\n[red]<Nie masz jeszcze uprawnień do przeglądania tego podpunktu>
unit.new-horizon-laugra.name = Laugra
unit.new-horizon-laugra.description = Nieznana starożytna technologia.\nStrzela przyspieszającymi pociskami, które mogą przebijać budynki i jednostki. Może być zablokowana przez budynki o pancerzu powyżej 10 lub pochłaniające lasery.\nNie tonie.\n[red]<Nie masz jeszcze uprawnień do przeglądania tego podpunktu>
unit.new-horizon-guardian.name = Carv'osher
unit.new-horizon-guardian.description = Starożytne nieznane stworzenie.\n\n[accent]Gracze nie mogą nim dobrze sterować.
unit.new-horizon-pester.name = Plątanina
unit.new-horizon-pester.description = Starożytny pancernik.\n[sky]Jeśli to możliwe, zwróci wszystkie zadane mu obrażenia.\n[red]<Nie masz jeszcze uprawnień do przeglądania tego podpunktu>
unit.new-horizon-nucleoid.name = Nukleoid
unit.new-horizon-nucleoid.description = Nieznana starożytna technologia.\nPrawdopodobnie flagowiec starożytnych.\n[red]<Nie masz jeszcze uprawnień do przeglądania tego podpunktu>
unit.new-horizon-liv.name = Liw
unit.new-horizon-liv.description = Szybki przechwytywacz, wyposażony w dwie termo-wieżyczki. Może również służyć jako silna jednostka wsparcia.
unit.new-horizon-liv.details = Zastosowanie Rdzenia Nexus sprawiło, że jednostka rdzenia stała się znacznie potężniejsza niż wcześniej.

