nh.new-feature.important-0 = [sky]Zapowiedź aktualizacji New Horizon 2.0.0[]
nh.new-feature.important-0-desc = Ta aktualizacja zawiera nowe rdzenie, jednostki rdzeni, jednostki bojowe, budynki, przedmioty, ciecze oraz dostosowania systemowe. Jeśli masz pytania dotyczące tłumaczenia, skontaktuj się z nami na serwerze Discord. \n[gold]Serwer wrócił: 47.103.39.94[white]

nh.new-feature.improve-0 = System nalotów naprawiony
nh.new-feature.improve-0-desc = Naprawiono wyzwalacze nalotów, alerty i logikę poziomów zagrożenia; dodano HUD zagrożenia oraz znaczniki na mapie.

nh.new-feature.content-0 = Nowe rdzenie i jednostki rdzeni
nh.new-feature.content-0-desc = Dodaje cztery nowe rdzenie: Rdzeń Konfluks, Rdzeń Array, Rdzeń Nexus i Rdzeń Cluster; dodaje cztery nowe jednostki rdzeni: Skalar, Wektor, Matryca i Tensor.

nh.new-feature.content-1 = Rdzeń Konfluks
nh.new-feature.content-1-desc = Mały rdzeń placówkowy 3x3 o przyzwoitym magazynie i zdolnościach obronnych. Odpowiednia jednostka rdzenia: Skalar.

nh.new-feature.content-2 = Rdzeń Array
nh.new-feature.content-2-desc = Średni rdzeń bazowy 4x4 o solidnym magazynie i obronie, zdolny do utrzymania bazy średniej wielkości. Odpowiednia jednostka rdzenia: Wektor.

nh.new-feature.content-3 = Rdzeń Nexus
nh.new-feature.content-3-desc = Duży rdzeń bazowy 5x5 o doskonałym magazynie i obronie, zdolny do utrzymania dużej bazy. Odpowiednia jednostka rdzenia: Matryca.

nh.new-feature.content-4 = Rdzeń Cluster
nh.new-feature.content-4-desc = Zaawansowany rdzeń bazowy 6x6, odbudowany z wykorzystaniem starożytnej technologii. Posiada niezwykle wysoki magazyn i zdolności obronne, zdolny do utrzymania ogromnej bazy. Odpowiednia jednostka rdzenia: Tensor.

nh.new-feature.content-5 = Nowe i odnowione jednostki
nh.new-feature.content-5-desc = Dodaje lub przerabia kilka jednostek bojowych: Przekaźnik, Zjawa, Uderzacz, Limfa i Histon.

nh.new-feature.content-6 = Przekaźnik
nh.new-feature.content-6-desc = Lekki okręt morski wyposażony w dwie wyrzutnie rakiet.

nh.new-feature.content-7 = Zjawa
nh.new-feature.content-7-desc = Średnioszybki samolot szturmowy strzelający rozproszonymi samonaprowadzającymi się impulsami piorunów.

nh.new-feature.content-8 = Uderzacz
nh.new-feature.content-8-desc = Ciężka powietrzna jednostka wsparcia wyposażona w dalekosiężną armatę laserową.

nh.new-feature.content-9 = Limfa
nh.new-feature.content-9-desc = [red]Ten podpunkt nie został jeszcze ujawniony.

nh.new-feature.content-10 = Histon
nh.new-feature.content-10-desc = [red]Ten podpunkt nie został jeszcze ujawniony.

nh.new-feature.content-11 = Nowe budynki, przedmioty i ciecze
nh.new-feature.content-11-desc = Dodaje zawartość związaną z logistyką, produkcją, energią, syntezą, przedmiotami i cieczami.

nh.new-feature.content-12 = System logistyczny
nh.new-feature.content-12-desc = Dodaje i dostosowuje kilka budynków dystrybucji logistycznej oraz aktualizuje logikę systemu logistycznego.

nh.new-feature.content-13 = System produkcyjny
nh.new-feature.content-13-desc = Dodaje i dostosowuje kilka budynków związanych z produkcją.

nh.new-feature.content-14 = System energetyczny
nh.new-feature.content-14-desc = Dodaje i dostosowuje kilka budynków generacji, zasilania i wsparcia energetycznego.

nh.new-feature.content-15 = System syntezy
nh.new-feature.content-15-desc = Dodaje i dostosowuje kilka budynków syntezy, przetwarzania i konwersji.

nh.new-feature.content-16 = Przedmioty i ciecze
nh.new-feature.content-16-desc = Dodaje wiele przedmiotów i cieczy wraz z powiązanymi łańcuchami przetwarzania.

nh.new-feature.balance-0 = Dostosowania systemu logistycznego
nh.new-feature.balance-0-desc = Dostosowuje i przerabia część logiki systemu dystrybucji.

nh.new-feature.balance-1 = Dostosowania balansu
nh.new-feature.balance-1-desc = Wprowadza kilka zmian balansowych.

nh.new-feature.fix-0 = Naprawa awarii nieregularnych fabryk
nh.new-feature.fix-0-desc = Naprawiono awarię, która mogła być spowodowana przez nieregularne fabryki.
