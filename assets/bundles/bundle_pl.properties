#DistributionBlock
block.new-horizon-hard-light-rail.name = Szyna Twardego Światła
block.new-horizon-hard-light-rail.description = Wykorzystuje statyczne i zestalone fotony jako nośnik do transportu przedmiotów. Przyjmuje przedmioty tylko z tylnego budynku i innych elementów logistycznych.
block.new-horizon-hard-light-rail.details = Koncepcja wykorzystania statycznych mostów fotonowych została po raz pierwszy zaproponowana i wdrożona przez starożytne przedsiębiorstwo Guangquan Technology. Projekt twardego światła stał się obecnie preferowanym wyborem dla logistyki nowej generacji ze względu na jego niemal całkowicie niematerialną charakterystykę.
block.new-horizon-stack-rail.name = Szyna Stosowa
block.new-horizon-stack-rail.description = Układa i transportuje spakowane przedmioty. Użyj układarki, aby podawać ułożone przedmioty.
block.new-horizon-steady-stack-rail.name = Stabilna Szyna Stosowa
block.new-horizon-steady-stack-rail.description = Pozwala transportować ułożone spakowane przedmioty. Użyj układarki, aby wprowadzać ułożone przedmioty. Zaawansowane materiały zwiększają stabilność pakowania, umożliwiając wyższe prędkości transportu.
block.new-horizon-light-stack-loader.name = Lekka Układarka
block.new-horizon-light-stack-loader.description = Wyprowadza wprowadzone przedmioty w stosach po 15 na szynę przenośnika stosowego.
block.new-horizon-heavy-stack-loader.name = Ciężka Układarka
block.new-horizon-heavy-stack-loader.description = Wyprowadza wprowadzone przedmioty w stosach po 60 na szynę przenośnika stosowego.
block.new-horizon-multi-armor-conveyor.name = Opancerzony Przenośnik Wielowarstwowy
block.new-horizon-multi-armor-conveyor.description = Przenosi przedmioty do przodu. Szybszy niż szyna twardego światła. Nie akceptuje wejść z boków.
block.new-horizon-multi-junction.name = Węzeł Wielowarstwowy
block.new-horizon-multi-router.name = Rozdzielacz Wielowarstwowy
block.new-horizon-multi-router.description = Równomiernie dystrybuuje zarówno przedmioty, jak i ciecze do trzech kierunków wyjściowych.
block.new-horizon-logistics-router.name = Rozdzielacz Logistyczny
#block.new-horizon-logistics-router.description =
block.new-horizon-logistics-junction.name = Skrzyżowanie Szyn
block.new-horizon-logistics-junction.description = Pozwala na przecięcie się dwóch szyn.
block.new-horizon-logistics-directional-router.name = Kierunkowy Rozdzielacz
block.new-horizon-logistics-directional-router.description = Kierunkowy rozdzielacz. Przedmioty wejściowe są równomiernie rozprowadzane do trzech innych kierunków.
block.new-horizon-logistics-directional-merger.name = Kierunkowy Łącznik
block.new-horizon-logistics-directional-merger.description = Kierunkowy łącznik. Łączy trzy wejścia w jeden kierunek.
block.new-horizon-logistics-directional-overflow-gate.name = Kierunkowa Brama Przepełnieniowa
block.new-horizon-logistics-directional-overflow-gate.description = Komponent logistyczny, który może przekierowywać wejścia przedmiotów w określonym kierunku.
block.new-horizon-logistics-directional-underflow-gate.name = Kierunkowa Brama Niedomiaru
block.new-horizon-logistics-directional-underflow-gate.description = Komponent logistyczny, który może ograniczać wejścia przedmiotów w określonym kierunku.
block.new-horizon-logistics-omni-sorter.name = Sortownik Wszechkierunkowy
block.new-horizon-logistics-omni-sorter.description = Pozwala wykluczać wejścia przedmiotów w każdym kierunku.
block.new-horizon-logistics-omni-blocker.name = Bloker Wszechkierunkowy
block.new-horizon-logistics-omni-blocker.description = Komponent logistyczny, który może ograniczać lub przekierowywać wejścia przedmiotów w dowolnym kierunku. Kliknij, aby przełączyć tryb.
block.new-horizon-logistics-omni-overflow-gate.name = Wszechkierunkowa Brama Przepełnieniowa
block.new-horizon-logistics-omni-overflow-gate.description = Pozwala na filtrowanie przepełnieniowe wejść przedmiotów w każdym kierunku.
block.new-horizon-logistics-omni-underflow-gate.name = Wszechkierunkowa Brama Niedomiaru
block.new-horizon-logistics-omni-underflow-gate.description = Pozwala na filtrowanie niedomiarowe wejść przedmiotów w każdym kierunku.
block.new-horizon-logistics-bridge.name = Most Szyn
block.new-horizon-logistics-bridge.description = Może transportować przedmioty do innego mostu w zasięgu. Może przyjąć maksymalnie trzy wejścia.
block.new-horizon-logistics-extend-bridge.name = Przedłużony Most
block.new-horizon-logistics-extend-bridge.description = Może transportować przedmioty do innego mostu w zasięgu. Może przyjąć maksymalnie trzy wejścia.
block.new-horizon-logistics-unloader.name = Rozładowywacz Szyn
block.new-horizon-logistics-unloader.description = Rozładowuje przedmioty z tylnego budynku do przedniego. Może być skonfigurowany na określony przedmiot. Zwiększa prędkość, gdy jest skonfigurowany na konkretny przedmiot.
block.new-horizon-logistics-fast-unloader.name = Szybki Rozładowywacz Szyn
#block.new-horizon-logistics-fast-unloader.description =
block.new-horizon-omni-unloader.name = Rozładowywacz Wszechkierunkowy
#block.new-horizon-omni-unloader.description =
block.new-horizon-rapid-unloader.name = Szybki Rozładowywacz
block.new-horizon-rapid-unloader.description = Ulepszony rozładowywacz. Szybko rozładowuje wybrany przedmiot z pobliskich bloków.
block.new-horizon-reinforced-item-source.name = Wzmocnione Źródło Przedmiotów
block.new-horizon-reinforced-item-source.description = Ma wyższe zdrowie.\n\n[accent]Wybrana zawartość jest ściśle zapisywana i odczytywana przez identyfikator, aby uniknąć problemów z przesunięciem.

#LiquidBlock
block.new-horizon-turbo-pump-small.name = Mała Pompa Turbinowa
block.new-horizon-turbo-pump-small.description = Pompuje ciecz. Po podłączeniu do innych pomp turbinowych może być traktowana jako pojedyncza jednostka do przesyłania mocy i dostarczania cieczy.
block.new-horizon-turbo-pump.name = Pompa Turbinowa
block.new-horizon-turbo-pump.description = Pompuje ciecz. Po podłączeniu do innych pomp turbinowych może być traktowana jako pojedyncza jednostka do przesyłania mocy i dostarczania cieczy.
block.new-horizon-standard-liquid-storage.name = Standardowy Zbiornik Cieczy
block.new-horizon-standard-liquid-storage.description = Przechowuje dużą ilość cieczy.
block.new-horizon-heavy-liquid-storage.name = Ciężki Zbiornik Cieczy
block.new-horizon-heavy-liquid-storage.description = Przechowuje bardzo dużą ilość cieczy.
block.new-horizon-conduit.name = Rura
block.new-horizon-conduit.description = Może transportować ciecz do przodu. Kliknij, aby przełączyć akceptację wejścia bocznego.
block.new-horizon-logistics-liquid-bridge.name = Most Cieczy
block.new-horizon-logistics-liquid-bridge.description = Może transportować ciecz do innego mostu w zasięgu. Może przyjąć maksymalnie trzy wejścia.
block.new-horizon-logistics-extend-liquid-bridge.name = Przedłużony Most Cieczy
block.new-horizon-logistics-extend-liquid-bridge.description = Może transportować ciecz do innego mostu w zasięgu. Może przyjąć maksymalnie trzy wejścia.
block.new-horizon-logistics-liquid-junction.name = Skrzyżowanie Cieczy
block.new-horizon-logistics-liquid-junction.description = Pozwala na przecięcie się dwóch rur.
block.new-horizon-logistics-liquid-router.name = Rozdzielacz Cieczy
block.new-horizon-logistics-liquid-router.description = Ciecz może być rozprowadzana w dowolnym kierunku.
block.new-horizon-logistics-liquid-unloader.name = Rozładowywacz Cieczy
block.new-horizon-logistics-liquid-unloader.description = Rozładowuje ciecz z tylnego budynku do przedniego. Musi być skonfigurowany na konkretną ciecz.
block.new-horizon-reinforced-liquid-source.name = Wzmocnione Źródło Cieczy
block.new-horizon-reinforced-liquid-source.description = Ma wyższe zdrowie.\n\n[accent]Wybrana zawartość jest ściśle zapisywana i odczytywana przez identyfikator, aby uniknąć problemów z przesunięciem.

block.new-horizon-stream-source.name = Źródło Strumienia
block.new-horizon-stream-source.description = Nieskończenie wyprowadza strumienie cząstek w określonym kierunku.
block.new-horizon-stream-extractor.name = Ekstraktor Strumienia
block.new-horizon-stream-extractor.description = Wyprowadza strumienie cząstek z otaczających bloków w określonym kierunku.
block.new-horizon-stream-receiver.name = Odbiornik Strumienia
block.new-horizon-stream-receiver.description = Odbiera strumienie cząstek z pozostałych trzech stron i przekazuje je do przodu.
block.new-horizon-stream-repeater.name = Powtarzacz Strumienia
block.new-horizon-stream-repeater.description = Odbiera strumienie cząstek z tyłu i przekazuje je do przodu, wydłużając zasięg transmisji.
block.new-horizon-stream-redirector.name = Przekierownik Strumienia
block.new-horizon-stream-redirector.description = Odbiera strumienie cząstek z pozostałych trzech stron i przekazuje je do przodu.
block.new-horizon-stream-splitter.name = Rozdzielacz Strumienia
block.new-horizon-stream-splitter.description = Odbiera strumienie cząstek z boków, przekazuje zmierzoną część do przodu, a reszta jest przesyłana na przeciwną stronę.

