block.new-horizon-large-water-extractor.name = Duży Ekstraktor Wody
block.new-horizon-large-water-extractor.description = Wydobywa wody gruntowe z większą wydajnością niż ekstraktor wody.
block.new-horizon-scan-collector.name = Skanner Zbiorczy
