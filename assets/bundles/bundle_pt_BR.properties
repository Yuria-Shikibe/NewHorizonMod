block.new-horizon-hard-light-rail.name = Trilho de Luz Sólida
block.new-horizon-hard-light-rail.description = Usa fótons estáticos e solidificados como portadores para transportar itens.\nClique para alternar se aceita entrada lateral.
block.new-horizon-hard-light-rail.details = O conceito de usar pontes fotônicas estáticas foi proposto e implementado pela primeira vez pela Guangquan Technology, uma empresa antiga. O design de luz sólida tornou-se a escolha preferida para a logística leve de próxima geração devido à sua característica quase inteiramente livre de matéria física.
block.new-horizon-stack-rail.name = Trilho de Pilha
block.new-horizon-stack-rail.description = Empilha e transporta itens embalados. Use o empilhador para alimentar os itens empilhados.
block.new-horizon-steady-stack-rail.name = Trilho de Pilha Estável
block.new-horizon-steady-stack-rail.description = Permite transportar itens empilhados. Use um empilhador para inserir os itens. Materiais avançados melhoram a estabilidade da embalagem, permitindo maiores velocidades de transporte.
block.new-horizon-light-stack-loader.name = Carregador de Pilha Leve
block.new-horizon-light-stack-loader.description = Libera itens em pilhas de 15 no trilho transportador de empilhamento.
block.new-horizon-heavy-stack-loader.name = Carregador de Pilha Pesado
block.new-horizon-heavy-stack-loader.description = Libera itens em pilhas de 60 no trilho transportador de empilhamento.
block.new-horizon-logistics-junction.name = Junção de Trilhos
block.new-horizon-logistics-junction.description = Permite que dois trilhos se cruzem.
block.new-horizon-logistics-directional-router.name = Roteador Direcional Logístico
block.new-horizon-logistics-router.description = Roteador direcional. Itens de entrada podem ser distribuídos uniformemente para as outras três direções.
block.new-horizon-logistics-directional-merger.name = Fusor Direcional Logístico
block.new-horizon-logistics-directional-merger.description = Fusor Direcional. Combina três entradas em uma direção.
block.new-horizon-logistics-directional-gate.name = Portão Direcional Logístico
block.new-horizon-logistics-directional-gate.description = Componente logístico que pode controlar o fluxo ou transbordamento de entradas de itens em direções específicas. Clique para mudar o modo.
block.new-horizon-logistics-omni-gate.name = Portão Omni Logístico
block.new-horizon-logistics-omni-gate.description = Permite filtrar entradas de itens em cada direção.
block.new-horizon-logistics-omni-sorter.name = Classificador Omni Logístico
block.new-horizon-logistics-omni-sorter.description = Permite excluir entradas de itens em cada direção.
block.new-horizon-logistics-omni-blocker.name = Bloqueador Omni Logístico
block.new-horizon-logistics-omni-blocker.description = Componente logístico que pode controlar o fluxo ou transbordamento de entradas de itens em qualquer direção. Clique para mudar o modo.
block.new-horizon-logistics-bridge.name = Ponte de Trilho
block.new-horizon-logistics-bridge.description = Pode transportar itens para outra ponte no alcance. Pode receber no máximo três entradas.
block.new-horizon-logistics-extend-bridge.name = Ponte de Extensão Logística
block.new-horizon-logistics-extend-bridge.description = Pode transportar itens para outra ponte no alcance. Pode receber no máximo três entradas.
block.new-horizon-logistics-unloader.name = Descarregador de Trilho
block.new-horizon-logistics-unloader.description = Descarrega itens de edifícios traseiros para o edifício frontal. Pode ser configurado para um item específico. Velocidade aumentada quando configurado.
block.new-horizon-rapid-unloader.name = Descarregador Rápido
block.new-horizon-rapid-unloader.description = Descarregador aprimorado. Descarrega rapidamente o item selecionado de blocos próximos.
block.new-horizon-reinforced-item-source.name = Fonte de Itens Reforçada
block.new-horizon-reinforced-item-source.description = Possui mais vida.\n\n[accent]O conteúdo selecionado é estritamente vinculado ao nome da identidade para evitar problemas de deslocamento.

#Liquid
block.new-horizon-turbo-pump-small.name = Bomba Turbo Pequena
block.new-horizon-turbo-pump-small.description = Bombeia líquidos. Quando conectada a outras bombas turbo, pode ser considerada uma única unidade para transmitir energia e entregar líquidos.
block.new-horizon-turbo-pump.name = Bomba Turbo
block.new-horizon-turbo-pump.description = Bombeia líquidos. Quando conectada a outras bombas turbo, pode ser considerada uma única unidade para transmitir energia e entregar líquidos.
block.new-horizon-standard-liquid-storage.name = Armazenamento de Líquido Padrão
block.new-horizon-standard-liquid-storage.description = Armazena uma grande quantidade de líquido.
block.new-horizon-heavy-liquid-storage.name = Armazenamento de Líquido Pesado
block.new-horizon-heavy-liquid-storage.description = Armazena uma quantidade massiva de líquido.
block.new-horizon-conduit.name = Condutor de Líquido
block.new-horizon-conduit.description = Transporta fluidos. Clique para alternar se aceita entrada lateral.
block.new-horizon-logistics-liquid-junction.name = Junção de Líquidos Logística
block.new-horizon-logistics-liquid-junction.description = Permite o cruzamento de dois tubos.
block.new-horizon-logistics-liquid-router.name = Roteador de Líquidos Logístico
block.new-horizon-logistics-liquid-router.description = Fluidos podem ser alocados para qualquer direção.
block.new-horizon-logistics-liquid-bridge.name = Ponte de Líquidos
block.new-horizon-logistics-liquid-bridge.description = Pode transportar líquidos para outra ponte no alcance. Pode receber no máximo três entradas.
block.new-horizon-logistics-extend-liquid-bridge.name = Ponte de Líquidos Estendida
block.new-horizon-logistics-extend-liquid-bridge.description = Pode transportar líquidos para outra ponte no alcance. Pode receber no máximo três entradas.
block.new-horizon-logistics-liquid-unloader.name = Descarregador de Líquidos
block.new-horizon-logistics-liquid-unloader.description = Descarrega líquidos de edifícios traseiros para o edifício frontal. Deve ser configurado para um líquido específico.
block.new-horizon-reinforced-liquid-source.name = Fonte de Líquidos Reforçada
block.new-horizon-reinforced-liquid-source.description = Possui mais vida.\n\n[accent]O conteúdo selecionado é estritamente vinculado ao nome da identidade para evitar problemas de deslocamento.

#factory
block.new-horizon-silicar-crusher.name = Triturador de Silicar
block.new-horizon-silicar-crusher.description = Usa potência pneumática para triturar silicar em silício e grafite. Não requer energia para funcionar.
block.new-horizon-stamping-presser.name = Prensa de Estampagem
block.new-horizon-stamping-presser.description = Fábrica de estampagem simples e confiável. Usa método físico para estampar titânio e grafite em Presstânio.
block.new-horizon-stamping-facility.name = Instalação de Estampagem
block.new-horizon-stamping-facility.description = Estampa Titânio em Presstânio.
block.new-horizon-processor-printer.name = Impressora de Processadores
block.new-horizon-processor-printer.description = Usa tecnologia de impressão 3D para imprimir silício em processadores júnior.
block.new-horizon-condense-facility.name = Crioresfriador de Fase
#block.new-horizon-condense-facility.description = 
block.new-horizon-crucible-foundry.name = Fundição de Crisol
block.new-horizon-crucible-foundry.description = Funde tungstênio e outros recursos em carbeto.
block.new-horizon-crystallizer.name = Cristalizador
block.new-horizon-crystallizer.description = Transforma hidrogênio em estado cristalino.
block.new-horizon-zeta-factory.name = Fábrica Zeta
#block.new-horizon-zeta-factory.description = 
block.new-horizon-zeta-dissociator.name = Dissociador Zeta
block.new-horizon-zeta-dissociator.description = Dissocia cristais Zeta em fluido Zeta positivo e negativo.
block.new-horizon-surge-refactor.name = Refator de Surge
block.new-horizon-surge-refactor.description = Usa titânio com fluido Zeta positivo para reconstruir eficientemente a Liga Tsunami (Surge).
block.new-horizon-fabric-synthesizer.name = Sintetizador de Tecido
block.new-horizon-fabric-synthesizer.description = Usa silício com fluido Zeta negativo para reconstruir eficientemente o Tecido de Fase.
block.new-horizon-multiple-steel-factory.name = Fábrica de Multi-Aço
block.new-horizon-multiple-steel-factory.description = Comprime metavidro, titânio e fluido Xen Alfa em aço multifuncional.
block.new-horizon-processor-encoder.name = Codificador de Processadores
block.new-horizon-processor-encoder.description = Codifica a nível subatômico para fabricar chips de alto desempenho.
block.new-horizon-irdryon-mixer.name = Misturador Irdryon
block.new-horizon-irdryon-mixer.description = Mistura materiais líquidos químicos industriais.
block.new-horizon-plastanium-crafter.name = Fabricante de Plastânio
#block.new-horizon-plastanium-crafter.description = 
block.new-horizon-irayrond-factory.name = Fábrica Irayrond
block.new-horizon-irayrond-factory.description = Produz liga de alto desempenho resistente à corrosão.
block.new-horizon-seton-factory.name = Fábrica Seton
block.new-horizon-seton-factory.description = Fabrica liga densa de alto desempenho.
block.new-horizon-nodex-factory.name = Fábrica Nodex
block.new-horizon-nodex-factory.description = Constrói liga autoplástica.
block.new-horizon-ancimembrane-concentrator.name = Concentrador de Ancimembrana
block.new-horizon-ancimembrane-concentrator.description = Tecnologia Antiga Desconhecida

#power
block.new-horizon-gravity-node-midantha.name = Nó de Gravidade Midantha
block.new-horizon-gravity-node-midantha.description = Gerador leve de poço de gravidade. Cria poços de gravidade e conduz eletricidade. Projetado para Midantha.
block.new-horizon-gravity-node-serpulo.name = Nó de Gravidade Serpulo
block.new-horizon-gravity-node-serpulo.description = Gerador leve de poço de gravidade. Cria poços de gravidade e conduz eletricidade. Projetado para Serpulo.
block.new-horizon-gravity-node-erekir.name = Nó de Gravidade Erekir
block.new-horizon-gravity-node-erekir.description = Gerador leve de poço de gravidade. Cria poços de gravidade e conduz eletricidade. Projetado para Erekir.
block.new-horizon-gravity-trap.name = Armadilha de Gravidade
block.new-horizon-gravity-trap.description = Gerador de poço de gravidade padrão. Cria poços de gravidade e conduz eletricidade dentro de um certo alcance.
block.new-horizon-gravity-trap-heavy.name = Armadilha de Gravidade Pesada
block.new-horizon-gravity-trap-heavy.description = Gerador de poço de gravidade ultra-pesado. Cria poços de gravidade e conduz eletricidade em uma grande área.
block.new-horizon-crystal-decomposition-thermal-generator.name = Gerador Térmico de Decomposição de Cristal
#block.new-horizon-crystal-decomposition-thermal-generator.description = 
block.new-horizon-nitrogen-dissociator.name = Dissociador de Nitrogênio
block.new-horizon-nitrogen-dissociator.description = Unidade de separação de nitrogênio, com modos duplos integrados para se adaptar a diferentes ambientes planetários.
block.new-horizon-psi-generator.name = Gerador Psi
#block.new-horizon-psi-generator.description = 
block.new-horizon-zeta-generator.name = Fusor Zeta
block.new-horizon-zeta-generator.description = Reator estável e eficiente.
block.new-horizon-anode-fusion-reactor.name = Reator de Fusão de Ânodo
block.new-horizon-anode-fusion-reactor.description = Usa fluido Zeta positivo para excitar partículas Zeta, liberando imensa energia ao atingir energia de ponto zero positiva.
block.new-horizon-cathode-fusion-reactor.name = Reator de Fusão de Cátodo
block.new-horizon-cathode-fusion-reactor.description = Usa fluido Zeta negativo para polarizar partículas Zeta, liberando imensa energia ao atingir energia de ponto zero negativa.
block.new-horizon-thermo-reactor.name = Reator Térmico
block.new-horizon-thermo-reactor.description = Texturas copiadas do Discord, com permissão do autor original para usá-las como temporárias.
block.new-horizon-armor-battery.name = Bateria Blindada
block.new-horizon-armor-battery.description = Mais compacta.
block.new-horizon-armor-battery-large.name = Bateria Blindada Grande
block.new-horizon-armor-battery-large.description = Bateria blindada grande com maior durabilidade, mas capacidade reduzida. Devido à necessidade de implantar blocos de energia em áreas perigosas, Rasor, Ministro da Segurança, propôs e discutiu 'baterias mais seguras.' (Anteriormente, a explosão de baterias grandes criava viúvas demais.) O resultado foi a reconstrução com materiais mais resistentes e controle eletrônico.
block.new-horizon-armor-battery-huge.name = Hiperbateria
block.new-horizon-armor-battery-huge.description = Armazena energia. Possui capacidade superior à das Baterias Grandes.
block.new-horizon-hydro-fuel-cell.name = Célula de Combustível de Hidrogênio
block.new-horizon-hydro-fuel-cell.description = Gerador de energia limpa. Energia química é convertida em eletricidade sob a proteção de nitrogênio.
block.new-horizon-hyper-generator.name = Hipergerador
block.new-horizon-hyper-generator.description = Gera quantidades extremamente altas de energia a partir de cargas térmicas positivas, mas também gera raios. O dano por raio aumenta conforme o edifício é danificado.\n[accent]Explodirá ao ser destruído.

#wall
block.new-horizon-presstanium-wall.name = Parede de Presstânio
block.new-horizon-presstanium-wall.description = Uma parede sólida, capaz de bloquear projéteis, raios e lasers. Distribui o dano recebido para paredes próximas.
block.new-horizon-presstanium-wall.details = Uma nova geração de instalações defensivas. O design de distribuição de dano melhora consideravelmente a resistência da parede a impactos.
block.new-horizon-refactoring-multi-wall.name = Parede Múltipla Refatorada
block.new-horizon-refactoring-multi-wall.description = Uma parede sólida com mais vida, capaz de bloquear projéteis, raios e lasers. Distribui mais dano conforme há mais paredes próximas. Possui redução de dano.
block.new-horizon-refactoring-multi-wall.details = Ao sobrepor e reconstruir paredes de tório com aço de alta luminosidade, a resistência da parede a impactos é reforçada.
block.new-horizon-seton-phased-wall.name = Parede de Fase Seton
block.new-horizon-seton-phased-wall.description = Uma parede sólida com blindagem forte e muita vida, capaz de bloquear projéteis, raios e lasers. Distribui mais dano conforme há mais paredes próximas. Possui maior redução de dano.
block.new-horizon-seton-phased-wall.details = Material de alta resistência a impactos formado pela interação de liga densa e tecido de fase, aplicado em linhas de defesa para melhorar a confiabilidade.
block.new-horizon-shaped-wall.name = Parede Adaptativa
block.new-horizon-shaped-wall.description = Uma parede quase inquebrável, capaz de bloquear projéteis, raios e lasers. Distribui mais dano conforme há mais paredes próximas. Possui redução de dano excepcional.
block.new-horizon-shaped-wall.details = O chamado "metal de memória", cuja forma espacial é fixada após a construção, com paredes subsequentes coordenadas para manter a estrutura. Devido às propriedades do material, a maioria dos ataques não pode penetrar a parede. Certas instalações usam exclusivamente este tipo de parede. Isto é apenas um subproduto.
block.new-horizon-fire-extinguisher.name = Extintor de Incêndio
block.new-horizon-fire-extinguisher.description = Extingue incêndios próximos.
block.new-horizon-blaster.name = Detonador
block.new-horizon-blaster.description = Libera eletricidade em unidades próximas, causando recuo e dano.
block.new-horizon-bomb-launcher.name = Lançador de Bombas
block.new-horizon-bomb-launcher.description = Lança uma bomba com tempo de queda atrasado na posição do alvo.\n\n[sky]Vários edifícios podem ser comandados ao mesmo tempo.
block.new-horizon-air-raider.name = Air Raider (Assaltante Aéreo)
block.new-horizon-air-raider.description = Dispara múltiplos mísseis contra o alvo.

#unit block
block.new-horizon-primary-jump-gate.name = Portão de Salto Primário
block.new-horizon-primary-jump-gate.description = Convoca unidades T1, T2 e T3.
block.new-horizon-standard-jump-gate.name = Portão de Salto Padrão
block.new-horizon-standard-jump-gate.description = Permite que os jogadores chamem unidades para apoiar a batalha.\n[sky]Pode convocar unidades sêniores.
block.new-horizon-hyper-jump-gate.name = Hiperportão de Salto
block.new-horizon-hyper-jump-gate.description = Permite que os jogadores chamem unidades para apoiar a batalha.\n[sky]Pode convocar apenas unidades júnior.
block.new-horizon-hyper-space-warper.name = Portão de Dobra de Hiperespaço
block.new-horizon-hyper-space-warper.description = Usado para transportar unidades.\n\n[sky]Pode ser bloqueado por armadilhas de gravidade inimigas.\n[sky]Você pode ver o alcance de interferência da armadilha de gravidade inimiga no HUD. A armadilha forçará um salto de hiperespaço que passe por ela a sair do salto, causando dano percentual à unidade.
block.new-horizon-module-source.name = Fonte de Módulo
block.new-horizon-module-source.description = Saída infinita de módulos. Apenas sandbox.
block.new-horizon-module-void.name = Vácuo de Módulo
block.new-horizon-module-void.description = Destrói módulos de entrada. Apenas sandbox.
block.new-horizon-module-rail.name = Trilho de Módulo
block.new-horizon-module-rail.description = Trilho dedicado para transportar módulos grandes.

#core and *
block.new-horizon-nexus-core.name = Núcleo Nexus
block.new-horizon-nexus-core.description = Desenvolvido via engenharia reversa do núcleo abandonado de Midantha, possui melhor desempenho e pode servir ao trabalho de exploração de Midantha de forma mais eficaz.
block.new-horizon-nexus-core.details = Embora isso ainda seja considerado obsoleto para a civilização de Midantha.
block.new-horizon-rift-shield.name = Gerador de Escudo de Fenda
block.new-horizon-rift-shield.description = Cria um escudo poderoso para repelir projéteis e bloquear inimigos.\nConsome mais recursos quando a capacidade do escudo está baixa.
block.new-horizon-standard-shield-generator.name = Gerador de Escudo Padrão
block.new-horizon-standard-shield-generator.description = Gerador de escudo padrão leve. Projeta uma parede de força retangular.
block.new-horizon-large-shield-generator.name = Projetor de Força Grande
block.new-horizon-large-shield-generator.description = Cria um campo de força maior e de regeneração mais rápida, protegendo edifícios e unidades internas contra danos.\nSuperaquece se sofrer danos excessivos. Opcionalmente usa líquido refrigerante para evitar superaquecimento. Núcleos de fusão aumentam o tamanho do escudo.
block.new-horizon-large-mend-projector.name = Projetor de Reparo Grande
block.new-horizon-large-mend-projector.description = Um projetor de reparo maior.\nOpcionalmente usa processadores júnior para aumentar o alcance e a eficiência.
block.new-horizon-standard-storage.name = Armazenamento Padrão
block.new-horizon-standard-storage.description = Armazenamento leve de itens. Itens podem ser retirados dele usando descarregadores.
block.new-horizon-heavy-storage.name = Armazenamento Pesado
block.new-horizon-heavy-storage.description = Armazenamento pesado de itens. Itens podem ser retirados dele usando descarregadores.
block.new-horizon-remote-storage.name = Armazenamento Remoto
block.new-horizon-remote-storage.description = Conecta-se diretamente ao núcleo, independentemente da sua posição no mundo. O consumo de energia aumenta proporcionalmente ao número de unidades colocadas.[accent]Não fornece capacidade de itens adicional ou funções de núcleo.
block.new-horizon-junior-module-beacon.name = Torre Sinalizadora de Overclock
block.new-horizon-junior-module-beacon.description = Faz overclock em todos os edifícios passíveis de overclock dentro de uma área retangular centrada nela. Adicionar tecido de fase aumenta ainda mais o multiplicador de overclock.
block.new-horizon-senior-module-beacon.name = Torre Sinalizadora de Projeção
block.new-horizon-senior-module-beacon.description = Impulsiona a produção de edifícios designados dentro de uma área retangular centrada nela. Adicionar Liga Tsunami aumenta ainda mais o multiplicador de produção. Impulsiona apenas a saída de itens e módulos.
block.new-horizon-standard-regen-projector.name = Projetor de Regeneração Padrão
block.new-horizon-standard-regen-projector.description = Repara edifícios danificados dentro de uma área retangular. O uso de tecido de fase aumenta a velocidade de reparo. Possui um limite mínimo de reparo, permitindo reparos mais rápidos em edifícios pequenos. Efeitos de reparo não se acumulam.
block.new-horizon-heavy-regen-projector.name = Projetor de Regeneração Pesado
block.new-horizon-heavy-regen-projector.description = Repara edifícios danificados dentro de uma área retangular maior. O uso de membranela aumenta a velocidade de reparo. Possui um limite mínimo de reparo maior, permitindo reparos mais rápidos em edifícios pequenos e médios. Efeitos de reparo não se acumulam.

#unit
unit.new-horizon-liv.name = Liv
unit.new-horizon-liv.description = Interceptador de alta velocidade, equipado com duas torres térmicas. Também capaz de atuar como uma forte unidade de suporte.
unit.new-horizon-liv.details = O uso do Núcleo Nexus tornou a unidade central muito mais poderosa do que antes.
unit.new-horizon-macrophage.name = Macrófago
unit.new-horizon-macrophage.description = Tecnologia antiga desconhecida.\nUma nave de combate pesada. Pode realizar movimentos envolventes.
unit.new-horizon-restriction-enzyme.name = Enzima de Restrição
unit.new-horizon-restriction-enzyme.description = Tecnologia antiga desconhecida.\nUma torre antiga automática.
unit.new-horizon-ancient-probe.name = Sonda Antiga
unit.new-horizon-ancient-probe.description = Tecnologia antiga desconhecida.\nEscaneia e envia dados das bases inimigas, podendo atrair um ataque.
unit.new-horizon-nucleoid.name = Nucleoide
unit.new-horizon-nucleoid.description = Tecnologia antiga desconhecida.\nProvavelmente o carro-chefe dos antigos.
unit.new-horizon-laugra.name = Laugra
unit.new-horizon-laugra.description = Tecnologia antiga desconhecida.\nDispara projéteis acelerados que podem perfurar edifícios e unidades. Pode ser bloqueado por edifícios com mais de 10 de blindagem ou que absorvam lasers.\nNão pode ser afogada.
unit.new-horizon-assaulter.name = Assaltante (Assaulter)
unit.new-horizon-assaulter.description = Uma unidade suicida, disparando laser de sobrecarga.
unit.new-horizon-hurricane.name = Pirolisador (Pyrolyzer)
unit.new-horizon-hurricane.description = Nave Capitânia Aérea. Pode destruir tudo facilmente.
unit.new-horizon-sin.name = Sin
unit.new-horizon-sin.description = Mecanóide terrestre pesado, equipado com múltiplas armas de mísseis.
unit.new-horizon-tarlidor.name = Tarlidor
unit.new-horizon-tarlidor.description = Unidade terrestre de suporte pesado.
unit.new-horizon-striker.name = Striker
unit.new-horizon-striker.description = Unidade aérea de suporte pesado. Equipada com canhões laser de longo alcance.
unit.new-horizon-annihilation.name = Aniquilação (Annihilation)
unit.new-horizon-annihilation.description = Unidade terrestre pesada equipada com um canhão laser de combate e lançadores de mísseis.
unit.new-horizon-warper.name = Warper
unit.new-horizon-warper.description = Bombardeiro aéreo de alta velocidade.
unit.new-horizon-destruction.name = Destruição (Destruction)
unit.new-horizon-destruction.description = Unidade de combate aérea pesada.
unit.new-horizon-gather.name = Coletor (Gather)
unit.new-horizon-gather.description = Drone minerador sênior.
unit.new-horizon-aliotiat.name = Aliotiat
unit.new-horizon-aliotiat.description = Unidade terrestre de suporte médio.
unit.new-horizon-sharp.name = Sharp
unit.new-horizon-sharp.description = Unidade aérea leve equipada com uma arma térmica leve.
unit.new-horizon-thynomo.name = Thynomo
unit.new-horizon-thynomo.description = Unidade terrestre média equipada com um canhão laser.
unit.new-horizon-origin.name = Origem (Origin)
unit.new-horizon-origin.description = Unidade terrestre leve equipada com uma arma de dispersão.
unit.new-horizon-guardian.name = Carv'osher
unit.new-horizon-guardian.description = Uma criatura antiga desconhecida.\n\n[accent]Os jogadores não conseguem controlá-la bem.
unit.new-horizon-branch.name = Branch
unit.new-horizon-branch.description = Unidade aérea leve.
unit.new-horizon-collapser.name = Colapsador (Collapser)
unit.new-horizon-collapser.description = Capitânia Aérea Superior. Criada para destruir o interior das bases inimigas.
unit.new-horizon-zarkov.name = Zarkov
unit.new-horizon-zarkov.description = Navio naval de suporte pesado, equipado com 4 lançadores múltiplos de mísseis.
unit.new-horizon-ghost.name = Fantasma (Ghost)
unit.new-horizon-ghost.description = Navio naval de suporte médio.
unit.new-horizon-declining.name = Declínio (Decline)
unit.new-horizon-declining.description = Capitânia naval. Equipada com 3 canhões elétricos e outras armas menores.
unit.new-horizon-rhino.name = Rinoceronte (Rhino)
unit.new-horizon-rhino.description = Um cargueiro pesadamente blindado com alta velocidade de construção.
#unit.new-horizon-relay.name = Revezamento (Relay)
#unit.new-horizon-relay.description = Navio naval leve, equipado com dois lançadores de mísseis.
unit.new-horizon-longinus.name = Longinus
unit.new-horizon-longinus.description = Cruzador de artilharia, dispara disparos de energia mortais.
unit.new-horizon-naxos.name = Naxos
unit.new-horizon-naxos.description = Caça antiaéreo, equipado com feixe de corte.\n\n[accent]Alveja e danifica apenas unidades aéreas.
unit.new-horizon-saviour.name = Salvador (Saviour)
unit.new-horizon-saviour.description = Uma unidade de suporte grande equipada com duas torres EMP pesadas.
unit.new-horizon-anvil.name = Bigorna (Anvil)
unit.new-horizon-anvil.description = Uma nave de combate pesada.
unit.new-horizon-pester.name = Entangler (Emaranhador)
unit.new-horizon-pester.description = Um encouraçado antigo.\n[sky]Se possível, ele retornará todo o dano que lhe for causado.
#Env
block.new-horizon-metal-ground-quantum.name = Armadura de Quântum Plissada
block.new-horizon-metal-vent.name = Silo de Exaustão
block.new-horizon-metal-ground.name = Armadura Plissada
block.new-horizon-metal-tower.name = Torre de Metal
block.new-horizon-quantum-field-disturbing.name = Campo Quântico Ondulado
block.new-horizon-quantum-field-deep.name = Campo Quântico Profundo
