block.new-horizon-xen-extractor.name = Extrator Xen
block.new-horizon-xen-extractor.description = Extrai Fluido Xen de aberturas industriais. Também gera uma quantidade moderada de energia.
block.new-horizon-xen-iterator.name = Iterador Xen
block.new-horizon-xen-iterator.description = Converte cristais Z e cristais Hidrox em fluido supercrítico, misturando-os para produzir um fluido de fase Xen com características únicas.
block.new-horizon-sand-cracker.name = Triturador de Areia
block.new-horizon-sand-cracker.description = Tritura materiais em areia.
block.new-horizon-tungsten-reconstructor.name = Reconstrutor de Tungstênio
