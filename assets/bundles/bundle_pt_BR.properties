#Turret
block.new-horizon-thermo-turret.name = Termo
block.new-horizon-thermo-turret.description = Torre defensiva simples que dispara projéteis guiados ao carregar fluido Xen.
block.new-horizon-thermo-turret.details = Uma torre de início de jogo otimizada para as aberturas químicas de Midantha. O efeito de pirólise do fluido Xen, estimulado pela eletricidade, é suficiente para lidar com ataques de unidades pequenas.
block.new-horizon-pulse.name = Pulso
block.new-horizon-pulse.description = Dispara rajadas de projéteis contra inimigos. Causa mais dano cinético.
block.new-horizon-beam.name = Feixe
block.new-horizon-beam.description = Dispara lasers rapidamente contra os inimigos.
block.new-horizon-synchro.name = Synchro
block.new-horizon-synchro.description = Torre padrão com alta cadência de tiro. Pode causar muito dano a unidades, mas não é boa para esgotar escudos.
block.new-horizon-argmot.name = Argmot
block.new-horizon-argmot.description = Dispara aglomerados de eletricidade nos inimigos. A cadência de tiro aumenta com o tempo. Superaquece se disparar por muito tempo. Causa dano devastador a escudos.
block.new-horizon-slavio.name = Slavio
block.new-horizon-slavio.description = Lança uma fileira de mísseis guiados. Causa grande dano a unidades, mas não é eficiente contra escudos.
block.new-horizon-gravity.name = Gravidade
block.new-horizon-gravity.description = Dispara um feixe trator que pode puxar várias unidades de uma vez.
block.new-horizon-webber.name = Webber
block.new-horizon-webber.description = Captura inimigos com pinças ópticas.\n\n[accent]Prioriza inimigos mais rápidos.
block.new-horizon-anti-bullet-turret.name = Interceptador
block.new-horizon-anti-bullet-turret.description = Torre de defesa de ponto. Intercepta projéteis que se aproximam.
block.new-horizon-multiple-launcher.name = Multi-Lançador
block.new-horizon-multiple-launcher.description = Torre lançadora de mísseis de grande porte.
block.new-horizon-bombard.name = Bombardear
block.new-horizon-bombard.description = Torre de artilharia pesada.
block.new-horizon-vortex.name = Vórtice
block.new-horizon-vortex.description = Torre de grande porte.
block.new-horizon-hive.name = Hive
block.new-horizon-hive.description = Lançador de mísseis antiaéreos de longo alcance.\nLança mísseis com trajetória espiral.
block.new-horizon-electro.name = Electro
block.new-horizon-electro.description = Libera projéteis de energia que paralisam inimigos e causam dano contínuo em uma ampla área.
block.new-horizon-atom-separator.name = Separador de Átomos
block.new-horizon-atom-separator.description = Dispara um laser contínuo mortal.\n\nPrioriza inimigos com menor velocidade.
block.new-horizon-blood-star.name = Estrela de Sangue
block.new-horizon-blood-star.description = Dispara uma bomba de íons estática.
block.new-horizon-executor.name = Executor
block.new-horizon-executor.description = Lança disparos de energia de alta potência que buscam inimigos.
block.new-horizon-prism.name = Prisma
block.new-horizon-prism.description = Dispara um feixe de laser carregado, com feixes menores refletidos para alvos próximos.
block.new-horizon-rail-gun.name = Canhão Elétrico (Railgun)
block.new-horizon-rail-gun.description = Uma torre com baixa velocidade de rotação e cadência de tiro que dispara um projétil de alcance muito longo e dano altíssimo.
block.new-horizon-concentration.name = Concentração
block.new-horizon-concentration.description = [sky]Quanto mais tempo foca, [#bf92f9]mais forte se torna.
block.new-horizon-end-of-era.name = Fim da Era
block.new-horizon-end-of-era.description = Pode equipar projéteis poderosos.
block.new-horizon-eternity.name = Eternidade
block.new-horizon-eternity.description = Superarma estratégico-tática extra-grande. "Pode custar muito, mas retribuirá com glória."
block.new-horizon-eternity.details = "O Abismo Norte tem um peixe, seu nome é Kun. Os Mares do Sul têm um canhão, seu nome é Eterno. Seu comprimento é de várias centenas de metros, seu diâmetro de várias dezenas. Uma vez que se vira para disparar, meteoros passam acima, o céu fica carmesim. Com a detonação, o horizonte brilha intensamente, como se nuvens púrpuras descessem dos céus, aniquilando todos os inimigos. Os senhores são tomados pelo medo, formando alianças para enfraquecer Qin. Os portões são abertos para enfrentá-lo, mas eles hesitam e não ousam avançar. Nas negociações, exigem que o projeto seja cortado pela metade, mas sem sucesso. Por décadas, não ousam cavalgar para o sul para pastorear seus cavalos." — trecho de *Eternidade*. Seu custo, escala e poder de dissuasão são inéditos. Sob pressão, sua implantação em bases estrangeiras é proibida, com garantias de que não será usado primeiro. O árduo processo de P&D e os custos enormes fizeram com que o projeto fosse suspenso certa vez. De fato, o consumo massivo de todos os tipos de recursos deixaria uma empresa já não muito rica em situação ainda pior. Mas, como moeda de troca estratégica, raramente é mantido em estado ativo.

block.new-horizon-antibody.name = Anticorpo
block.new-horizon-antibody.description = Tecnologia Antiga Desconhecida\nDispara mini cargas de energia.
block.new-horizon-interferon.name = Interferon
block.new-horizon-interferon.description = Tecnologia Antiga Desconhecida\nDispara disparos de arco explosivo.
block.new-horizon-dendrite.name = Dendrito
block.new-horizon-dendrite.description = Tecnologia Antiga Desconhecida
block.new-horizon-ancient-artillery.name = Artilharia Antiga
block.new-horizon-ancient-artillery.description = Dispara um projétil forte.\n\n[sky]Apenas editor e sandbox. \n[accent]Recaptura por Destruição Ativada. Ocupe-a para melhor controle do campo de batalha.

