block.new-horizon-liquid-convertor.name = Refinaria Xen
block.new-horizon-liquid-convertor.description = Recurso de fluido básico para converter vários recursos em Midanita.
block.new-horizon-optical-medium-drill.name = Broca Óptica Média
#block.new-horizon-optical-medium-drill.description = 
block.new-horizon-resonance-mining-facility.name = Broca de Ressonância
block.new-horizon-resonance-mining-facility.description = Usa ondas mecânicas com frequência específica para minerar recursos eficientemente.
block.new-horizon-beam-mining-facility.name = Broca de Feixe
block.new-horizon-beam-mining-facility.description = Usa lasers de feixe de alta potência para operações de mineração. Capaz de processar minérios mais duros. Pode se beneficiar de módulos de mineração.
block.new-horizon-implosion-mining-facility.name = Broca de Implosão
block.new-horizon-implosion-mining-facility.description = Extrai recursos eficientemente usando implosão.
block.new-horizon-speed-module.name = Overclocker de Pressão
block.new-horizon-speed-module.description = Aumenta consideravelmente a velocidade de mineração da broca alvo ao custo de maior consumo de energia.
block.new-horizon-speed-module-mk2.name = Overclocker de Pressão MK2
block.new-horizon-speed-module-mk2.description = Versão atualizada do Overclocker de Pressão.
block.new-horizon-refine-module.name = Processador de Refinaria
block.new-horizon-refine-module.description = Refina alguns recursos e os entrega diretamente. Aumentará o consumo de energia e diminuirá a velocidade de saída.
block.new-horizon-convertor-module.name = Conversor
block.new-horizon-convertor-module.description = Converte recursos de planetas diferentes.
block.new-horizon-delivery-module.name = Upload de Depósito Dimensional
block.new-horizon-delivery-module.description = Entrega recursos diretamente ao núcleo via tecnologia dimensional.
