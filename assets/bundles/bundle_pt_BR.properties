#Liquids
liquid.new-horizon-ammonia.name = Amônia Polarizada
liquid.new-horizon-ammonia.description = Amônia fortemente alcalina formada sob condições especiais, especialmente no ambiente de alto vácuo quântico de Midantha.
liquid.new-horizon-hydrazine.name = Hidrazina
liquid.new-horizon-hydrazine.description = Combustível de alta energia obtido de amônia polarizada. Usado para geração de energia ou manufatura avançada.
liquid.new-horizon-quantum-liquid.name = Líquido Quântico
liquid.new-horizon-quantum-liquid.description = Quântum instável. Pode ser usado para vários propósitos industriais após excitação.
liquid.new-horizon-xen-fluid.name = Fluido Xen
liquid.new-horizon-xen-fluid.description = Fluido de alta energia. Pode gerar muita energia.
liquid.new-horizon-zeta-fluid-positive.name = Fluido Zeta Positivo
liquid.new-horizon-zeta-fluid-positive.description = O fluido positivo após a eletrólise de cristais Zeta. Pode ser usado para processamento químico e retorna Fluido Zeta Negativo.
liquid.new-horizon-zeta-fluid-negative.name = Fluido Zeta Negativo
liquid.new-horizon-zeta-fluid-negative.description = O fluido negativo após a eletrólise de cristais Zeta. Pode ser usado para processamento químico e retorna Fluido Zeta Positivo.
liquid.new-horizon-irdryon-fluid.name = Fluido Irdryon
liquid.new-horizon-irdryon-fluid.description = Fluido de fase de baixa temperatura.

