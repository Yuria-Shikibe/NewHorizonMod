block.new-horizon-crystal-diode.description = Direcionador de energia de precisão usado em redes de transmissão de alta frequência.
block.new-horizon-supra-gel.name = Supra Gel
block.new-horizon-supra-gel.description = Nanogel de reparo rápido usado para recuperar unidades de combate danificadas.
block.new-horizon-cooling-unit.name = Unidade de Resfriamento
block.new-horizon-cooling-unit.description = Módulo de resfriamento que garante a estabilidade do sistema durante operações intensas.
block.new-horizon-power-cell.name = Célula de Energia
block.new-horizon-power-cell.description = Unidade de energia de reserva que ativa automaticamente em emergências.
block.new-horizon-signal-circulator.name = Circulador de Sinal
block.new-horizon-signal-circulator.description = Componente principal de rede que mantém a transmissão de dados fluida.
block.new-horizon-bionics-processor.name = Processador Biônico
block.new-horizon-bionics-processor.description = Módulo de controle de precisão que aumenta significativamente a velocidade de reação e a eficiência operacional.
block.new-horizon-fusion-reactor.name = Reator de Fusão
block.new-horizon-fusion-reactor.description = Dispositivo de saída de energia de fusão. A fusão controlada fornece energia ilimitada.
block.new-horizon-resisto-array.name = Matriz Resisto
block.new-horizon-resisto-array.description = Regula com precisão o fluxo de corrente para evitar sobrecarga do sistema.
block.new-horizon-quantum-conductor.name = Condutor Quântico
block.new-horizon-quantum-conductor.description = Componente fundamental que permite a transmissão de energia através do espaço.
