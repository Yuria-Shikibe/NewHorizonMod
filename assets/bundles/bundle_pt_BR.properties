block.new-horizon-pulse-mutator.description = Distorce ondas de pulso de energia para interromper as respostas do sistema inimigo.
block.new-horizon-particle-modulator.name = Modulador de Partículas
block.new-horizon-particle-modulator.description = Ajusta com precisão as trajetórias de partículas em sistemas de energia ou núcleos de armas.
block.new-horizon-tachyon-emitter.name = Emissor de Táquions
block.new-horizon-tachyon-emitter.description = Dispara partículas mais rápidas que a luz para interrupção espacial de curto alcance.
block.new-horizon-gauss-receptor.name = Receptor Gauss
block.new-horizon-gauss-receptor.description = Componente chave que recebe sinais da banda Gauss para controle remoto de precisão.

