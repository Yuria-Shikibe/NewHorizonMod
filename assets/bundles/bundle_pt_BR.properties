item.new-horizon-multiple-steel.name = Multi-Aço
item.new-horizon-multiple-steel.description = Um painel composto por várias camadas de metais unidas.
item.new-horizon-processor-senior.name = Processador Sênior
item.new-horizon-processor-senior.description = Maior velocidade!
item.new-horizon-irayrond-panel.name = Painel de Irídio
item.new-horizon-irayrond-panel.description = Tipo especial de metal duro com alta resistência a temperaturas.
item.new-horizon-seton-alloy.name = Liga Seton
item.new-horizon-seton-alloy.description = Pesada e firme.
item.new-horizon-nodex-plate.name = Placa Nodex
