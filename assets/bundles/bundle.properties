#Turret Block
block.new-horizon-bombard.name = Bombard
block.new-horizon-bombard.description = Large artillery turret.
block.new-horizon-multiple-artillery.details = [red]B R O A D S I D E !
block.new-horizon-vortex.name = Vortex
block.new-horizon-vortex.description = Large turret.
block.new-horizon-hive.name = Hive
block.new-horizon-hive.description = Long range anti-air missile launcher.\nLaunches missiles with spiral trajectory.
block.new-horizon-ancient-artillery.name = Ancient Artillery
block.new-horizon-ancient-artillery.description = Fires a strong projectile.\n\n[sky]Editor and sandbox only. \n[accent]Destruction Recapture Enabled. Occupy it for better battlefield control.
block.new-horizon-prism.name = Prism
block.new-horizon-prism.description = Shoots a charged laser beam with smaller ones reflected to nearby targets.
block.new-horizon-interferon.name = Interferon
block.new-horizon-interferon.description = Unknown Ancient Technology\nShoots arc bursting bolts.
block.new-horizon-beam.name = Beam
block.new-horizon-beam.description = Rapidly shoots lasers at enemies.
block.new-horizon-antibody.name = Antibody
block.new-horizon-antibody.description = Unknown Ancient Technology\nShoots mini energy charges.
block.new-horizon-webber.name = Webber
block.new-horizon-webber.description = Captures enemies with optical tweezers.\n\n[accent]Prioritizes faster enemies.
block.new-horizon-gravity.name = Gravity
block.new-horizon-gravity.description = Fires a tractor beam that can pull multiple units at once.
block.new-horizon-eternity.name = Eternity
block.new-horizon-eternity.description = Extra-large strategic-tactical superweapon."It may cost a lot,but it well respect it with glory."
block.new-horizon-eternity.details = "North Abyss has a fish, its name is Kun. The Southern Seas have a cannon, its name is Eternal.Its length is several hundred meters, its diameter several dozen meters. Once it turns to fire, meteors pass overhead, the sky flushes crimson. Upon detonation, the horizon blazes bright, as though purple clouds descend from the heavens, annihilating all foes.The lords are struck with fear, forming alliances to weaken Qin. The gates are opened to meet it, yet they hesitate and dare not advance.In negotiations, they demand the project be cut in half, but to no avail. For decades they dare not ride south to pasture their horses." ? excerpt from *Eternal*.Its cost, scale, and deterrent power are unprecedented. Under pressure, it is prohibited from deployment at overseas bases, with assurances it will not be used first.The arduous R&D process and enormous costs once caused the project to be suspended.Indeed, the massive consumption of all kinds of resources would make an already not-wealthy company even worse off. But as a strategic bargaining chip, it is rarely kept in an active state.
block.new-horizon-anti-bullet-turret.name = Interceptor
block.new-horizon-anti-bullet-turret.description = Point defence turret. Intercepts approaching bullets.
block.new-horizon-anti-bullet-turret.details = It actually uses the power circuit and fire control computer from the Argmot.
block.new-horizon-pulse.name = Pulse
block.new-horizon-pulse.description = Shoot bursts of bullets to enemies. Deals more kinetic damage.
block.new-horizon-pulse.details = Rumor has it the military database codename for it is "Old Mama."
block.new-horizon-dendrite.name = Dendrite
block.new-horizon-dendrite.description = Unknown Ancient Technology
block.new-horizon-atom-separator.name = Atom Separator
block.new-horizon-atom-separator.description = Shoots a deadly continuous laser.\n\nPrioritizes enemies with lower speed.
block.new-horizon-atom-separator.details = Nicknamed the Atom Cutter. It is said that forcibly disabling the elevation lock allows it to fire straight into the sky.\n\n[accent]"Did I just see a strange blonde girl in armor standing over there?"
block.new-horizon-blood-star.name = Blood Star
block.new-horizon-blood-star.description = Fires a static ion bomb.
block.new-horizon-blood-star.details = The ready ammunition magazine may cause a devastating chain reaction if hit. Protect the turret carefully.
block.new-horizon-multiple-launcher.name = Multi-Launcher
block.new-horizon-multiple-launcher.description = Large missile launcher turret.
block.new-horizon-multiple-launcher.details = Nicknamed "Katyusha," which seems to be some ancient feminine name. Oddly enough, this nickname is unexpectedly popular.\n\nMaybe because she likes to drink?
block.new-horizon-thermo-turret.name = Thermo
block.new-horizon-thermo-turret.description = Simple defensive turret that fires homing projectiles by charging Xen fluid.
block.new-horizon-thermo-turret.details = A early-game turret optimized for the chemical vents of Midantha. The pyrolysis effect of Xen fluid, stimulated by electricity, is sufficient to deal with attacks from smaller units.
block.new-horizon-rail-gun.name = Rail Gun
block.new-horizon-rail-gun.description = A turret with slow rotation speed and low rate of fire that fires a bolt with very long range and high damage.
block.new-horizon-rail-gun.details = Muzzle velocity approaches Mach 15. Its extreme penetration allows it to pierce through any target with ease.
block.new-horizon-end-of-era.name = End of Era
block.new-horizon-end-of-era.description = Can equip powerful bullets.
block.new-horizon-executor.name = Executioner
block.new-horizon-executor.description = Launches high-powered energy bolts that seek enemies.
block.new-horizon-synchro.name = Synchro
block.new-horizon-synchro.description = Standard turret with high fire rate. Can deal a lot of damage to the unit, but not good at deplete shield.
block.new-horizon-argmot.name = Argmot
block.new-horizon-argmot.description = Fires clusters of electricity at enemies. Fire rate increases over time. Will overheat if shoots for too long. Deals devastating damage to shields.
block.new-horizon-argmot.details = At full load, it deals devastating damage, but if the massive waste heat is not managed, it will force a shutdown.
block.new-horizon-slavio.name = Slavio
block.new-horizon-slavio.description = Launch a row of homing missiles. Deal great damage to unit but not efficiency to shields.
block.new-horizon-concentration.name = Concentration
block.new-horizon-concentration.description = [sky]The longer it gazes, [#bf92f9]the stronger it becomes.
block.new-horizon-electro.name = Electro
block.new-horizon-electro.description = Releases energy bullets that paralyze enemies and cause continuous damage in a wide area.

