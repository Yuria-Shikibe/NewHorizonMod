nh.setting.nh-hide-starting-log.name = Disable Mod Startup Interface
nh.setting.nh-hide-starting-log.desc = Determines whether to show the New Horizon startup interface each time the game launches.
nh.setting.nh-effect-detail.name = Full Effects Display
nh.setting.nh-effect-detail.desc = Disabling this will reduce certain visual effects. Consider turning this off if your device has low performance.
nh.setting.nh-gravity-trap-alpha.name = Gravity Trap Display Alpha: {0}
nh.setting.nh-gravity-trap-alpha.desc = The inner alpha value for gravity trap.
nh.setting.nh-gravity-trap-outline-alpha.name = Gravity Trap Outline Alpha: {0}
nh.setting.nh-gravity-trap-outline-alpha.desc = The outline alpha value for gravity trap.
nh.setting.nh-override-unit-shield.name = Unit Shield Override
nh.setting.nh-override-unit-shield.desc = Adds a fixed-capacity shield to most units, overriding the vanilla wave shield.
nh.setting.nh-override-core-unit.name = Core Unit Adjustment
nh.setting.nh-override-core-unit.desc = Enhances stats such as construction speed for vanilla core units.
nh.setting.nh-override-logistic.name = Vanilla Logistics Override
nh.setting.nh-override-logistic.desc = Hides most vanilla logistics buildings, showing only New Horizon ones.\nEnable this if you dislike multi-tech logistics or simply want to use New Horizon logistics.
nh.setting.nh-override-drill.name = Vanilla Drill Override
nh.setting.nh-override-drill.desc = Hides all vanilla drills except the pneumatic and impact drills.\nAlso adjusts the stats and costs of the remaining drills.
nh.setting.nh-override-factories.name = Vanilla Factory Override
nh.setting.nh-override-factories.desc = Simplifies production of items like silicon and sulfur to accelerate early-game progress.
nh.setting.nh-override-power.name = Vanilla Power Override
nh.setting.nh-override-power.desc = Hides some vanilla power buildings.\nEnable this if you dislike multi-tech power buildings or simply want to use New Horizon's power systems.
nh.setting.nh-override-unit.name = Vanilla Unit Override
nh.setting.nh-override-unit.desc = Removes environmental restrictions from all vanilla units.\nUseful when playing on non-Midantha environments.
nh.setting.nh-override-logic.name = Vanilla Logic Override
nh.setting.nh-override-logic.desc = Adjusts the cost of vanilla logic buildings so they can be built in all environments.
nh.setting.nh-override-item.name = Vanilla Item Adjustment
nh.setting.nh-override-item.desc = Removes planetary restrictions on the usage of some vanilla item materials.
nh.setting.nh-override-turret.name = Vanilla Turret Adjustment
nh.setting.nh-override-turret.desc = Adds mod-specific ammunition to vanilla turrets and adjusts some of their values.
nh.setting.nh-event-raid.name = Add Air Raid
nh.setting.nh-event-raid.desc = Adds random air raids based on world processor for all non-sandbox maps.
nh.setting.nh-debugging.name = Debug Mode
nh.setting.nh-debugging.desc = Enables debug mode\nAllows enabling some debug content.
