block.new-horizon-tungsten-reconstructor.name = Tungsten Reconstructor
block.new-horizon-titanium-reconstructor.name = Titanium Reconstructor
block.new-horizon-liquid-convertor.name = Xen Refinery
block.new-horizon-liquid-convertor.description = Basic fluid resource for converting various resources into Midanite.

#DistributionBlock
block.new-horizon-hard-light-rail.name = Hard Light Rail
block.new-horizon-hard-light-rail.description = Use static and solidified photon as carrier to transport items.\nClick to change whether accept side input.
block.new-horizon-hard-light-rail.details = The concept of using static photonic bridges was first proposed and implemented by Guangquan Technology, an ancient enterprise. The hard-light design has now become the preferred choice for next-generation lightweight logistics due to its nearly entirely material-free characteristic.
block.new-horizon-stack-rail.name = Stack Rail
block.new-horizon-stack-rail.description = Stack and transport the packaged items. Use the stacker to feed the stacked items.
block.new-horizon-steady-stack-rail.name = Steady stack rail
block.new-horizon-steady-stack-rail.description = You can transport stacked packed items.  Use a stacker to input the stacked items.  Advanced materials enhance packing stability, enabling higher transport speeds.
block.new-horizon-light-stack-loader.name = Light Stack Loader
block.new-horizon-light-stack-loader.description = Output the input items in stacks of 15 onto the stacking conveyor rail.
block.new-horizon-heavy-stack-loader.name = Heavy Stack Loader
block.new-horizon-heavy-stack-loader.description = Output the input items in stacks of 60 onto the stacking conveyor rail.
block.new-horizon-logistics-junction.name = Rail Junction
block.new-horizon-logistics-junction.description = Allow two rail to cross each other.
block.new-horizon-logistics-directional-router.name = Logistics Directional Router
block.new-horizon-logistics-directional-router.description = Directional router. Input items can be evenly distributed to the other three directions.
block.new-horizon-logistics-directional-merger.name = Logistics Directional Merger
block.new-horizon-logistics-directional-merger.description = Directional Merger. Combine three inputs into one direction.
block.new-horizon-logistics-directional-gate.name = Logistics Directional Gate
block.new-horizon-logistics-directional-gate.description = A logistics component that can throttle or overflow specified-direction item inputs.  Click to switch mode.
block.new-horizon-logistics-omni-sorter.name = Logistics Omni Sorter
block.new-horizon-logistics-omni-sorter.description = Allows excluding item inputs in each direction.
block.new-horizon-logistics-omni-blocker.name = Logistics Omni Blocker
block.new-horizon-logistics-omni-blocker.description = A logistics component that can throttle or overflow item inputs in any direction.  Click to switch mode.
block.new-horizon-logistics-omni-gate.name = Logistics Omni Gate
block.new-horizon-logistics-omni-gate.description = Allows filtering of item inputs in each direction.
block.new-horizon-logistics-bridge.name = Rail Bridge
block.new-horizon-logistics-bridge.description = Can transport items to another bridge in range. Can receive three inputs at maximum.
block.new-horizon-logistics-extend-bridge.name = Logistics Extend Bridge
block.new-horizon-logistics-extend-bridge.description = Can transport items to another bridge in range. Can receive three inputs at maximum.
block.new-horizon-logistics-unloader.name = Rail unloader
block.new-horizon-logistics-unloader.description = Unload items from back building to front building. Can be config to a specific item. Increase speed when config to a specific item.
block.new-horizon-rapid-unloader.name = Rapid Unloader
block.new-horizon-rapid-unloader.description = Upgraded unloader. Rapidly unloads the selected item from nearby blocks.
block.new-horizon-reinforced-item-source.name = Reinforced Item Source
block.new-horizon-reinforced-item-source.description = Has higher health.\n\n[accent]The Selected Content is Strictly Written and Read by the identity name to avoid dislocation problems.

