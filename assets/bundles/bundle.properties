block.new-horizon-xen-iterator.name = Xen Iterator
block.new-horizon-xen-iterator.description = Converts Z-crystals and Hydrox crystals into supercritical fluid, then mixes them to produce a uniquely characterized Xen-phase fluid.
block.new-horizon-large-water-extractor.name = Large Water Extractor
