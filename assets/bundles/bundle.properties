#PowerBlock
block.new-horizon-gravity-trap.name = Gravity Trap
block.new-horizon-gravity-trap.description = Standard-spec gravity well generator. Creates gravity wells and conducts electricity within a certain range.
block.new-horizon-gravity-trap-heavy.name = Heavy Gravity Trap
block.new-horizon-gravity-trap-heavy.description = Ultra-heavy gravity well generator. Creates gravity wells and conducts electricity over a large area.
block.new-horizon-neutralization-generator.name = Neutralization Generator
block.new-horizon-neutralization-generator.description = Generates power from the energy released by neutralizing polarized ammonia. Outputs water as a byproduct.
block.new-horizon-zeta-generator.name = Zeta Fuser
block.new-horizon-zeta-generator.description = Stable and efficient reactor.
block.new-horizon-armor-battery.name = Armored battery
block.new-horizon-armor-battery.description = more smaller.
block.new-horizon-armor-battery-large.name = Large armored battery
block.new-horizon-armor-battery-large.description = Armored large battery with greater durability but reduced capacity.Due to the need to deploy energy blocks in hazardous areas, Rasor, Minister of Security, raised a proposal and discussion at a meeting regarding 'safer batteries.'(Previously, exploding large batteries had already created far too many widows.) The result was that the large battery was rebuilt with sturdier materials and equipped with electronic control.
block.new-horizon-armor-battery-huge.name = Hyper Battery
block.new-horizon-armor-battery-huge.description = Stores energy. Has a higher capacity than Large Batteries.
block.new-horizon-hydro-fuel-cell.name = Hydro Fuel Cell
block.new-horizon-hydro-fuel-cell.description = Clean energy generator. Chemical energy is converted into electricity under the protection of nitrogen.
block.new-horizon-hyper-generator.name = Hyper Generator
block.new-horizon-hyper-generator.description = Generates extremely high amounts of energy from positive thermo charges, but will also generate lightning. Lightning damage is increased while the building is damaged.\n[accent]Will explode when destroyed.

#DefenseBlock
block.new-horizon-presstanium-wall.name = Presstanium Wall
block.new-horizon-presstanium-wall.description = A solid wall, can block incoming bullets, lightning and laser. Can distribute received damage to nearby walls.
block.new-horizon-presstanium-wall.details = A new generation of defensive facility. The damage-distribution design greatly improves the wall?s resistance to strikes.
block.new-horizon-refactoring-multi-wall.name = Refactoring Multi Wall
block.new-horizon-refactoring-multi-wall.description = A solid wall with higher health, can block incoming bullets, lightning and laser. Can distribute more damage with more nearby walls. Have damage reduction.
block.new-horizon-refactoring-multi-wall.details = By layering and reconstructing thorium walls with high-light steel, the wall?s resistance to strikes is further enhanced.
block.new-horizon-seton-phased-wall.name = Seton Phased Wall
block.new-horizon-seton-phased-wall.description = A solid wall with strong armor and high health, can block incoming bullets, lightning and laser. Can distribute more damage with more nearby walls. Have higher damage reduction.
block.new-horizon-seton-phased-wall.details = High-strength strike-resistant material formed by the interaction of dense alloy and phase fabric, applied in defense lines to further improve reliability.
block.new-horizon-shaped-wall.name = Adaptive Wall
block.new-horizon-shaped-wall.description = A nearby unbreakable wall, can block incoming bullets, lightning and laser. Can distribute more damage with more nearby walls. Have great damage reduction.
block.new-horizon-shaped-wall.details = The so-called "memory metal," whose spatial form is fixed once construction is complete, with subsequent walls coordinated to maintain the structure. Due to its material properties, most attacks cannot penetrate the wall. Certain facilities exclusively use this type of wall. This is merely a byproduct.
block.new-horizon-fire-extinguisher.name = Fire Extinguisher
block.new-horizon-fire-extinguisher.description = Extinguishes nearby fires.
block.new-horizon-blaster.name = Blaster
block.new-horizon-blaster.description = Release lightning to approaching units, knockbacks them and deals damage.
block.new-horizon-bomb-launcher.name = Bomb Launcher
block.new-horizon-bomb-launcher.description = Launches a bomb with delayed landing time to the position of the target.\n\n[sky]Multiple buildings can be commanded at the same time.
block.new-horizon-air-raider.name = Air Raider
block.new-horizon-air-raider.description = Strikes multiple missiles to target.

#UnitBlock
block.new-horizon-primary-jump-gate.name = Primary Jump Gate
block.new-horizon-primary-jump-gate.description = Summons T1, T2 and T3 units.
block.new-horizon-standard-jump-gate.name = Standard Jump Gate
block.new-horizon-standard-jump-gate.description = Allows players to call in units to support the battle.\n[sky]Can summon senior units.
block.new-horizon-hyper-jump-gate.name = Hyper Jump Gate
block.new-horizon-hyper-jump-gate.description = Allows players to call in units to support the battle.\n[sky]Can only summon junior units.
block.new-horizon-hyper-space-warper.name = Hyperspace Folding Gate
block.new-horizon-hyper-space-warper.description = Used to transport units.\n\n[sky]Can be blocked by enemy gravity traps.\n[sky]You can see the interference range of the enemy's gravity trap on the HUD. The gravity trap will force a hyperspace jump that passes through it to jump out and cause percentage damage to the unit.
block.new-horizon-module-rail.name = Module Rail
block.new-horizon-module-rail.description = Dedicated rail for transporting large modules.

#SpecialBlock
block.new-horizon-nexus-core.name = Nexus Core
block.new-horizon-nexus-core.description = Reverse-engineered from the abandoned core of Midantha, has better performance, and can serve Midantha's exploitation work more effectively.
block.new-horizon-rift-shield.name = Rift Shield Generator
block.new-horizon-rift-shield.description = Creates a powerful shield to deflect incoming bullets and block enemies.\nConsume more resources when low shield capacity.
block.new-horizon-standard-shield-generator.name = Standard Shield Generator
block.new-horizon-standard-shield-generator.description = Lightweight standard shield generator. Projects a rectangular force wall.
block.new-horizon-large-shield-generator.name = Large Force Projector
block.new-horizon-large-shield-generator.description = Creates a larger and faster regenerating force field, protecting buildings and units inside from damage.\nOverheats if too much damage is sustained. Optionally uses coolant to prevent overheating. Fusion cores increase shield size.
block.new-horizon-standard-regen-projector.name = Standard Regen Projector
block.new-horizon-standard-regen-projector.description = Repairs damaged buildings within a rectangular area. Using phase fabric increases repair speed. Has a minimum repair threshold, allowing faster repairs on small buildings. Repair effects do not stack.
block.new-horizon-heavy-regen-projector.name = Heavy Regen Projector
block.new-horizon-heavy-regen-projector.description = Repairs damaged buildings within a larger rectangular area. Using membranelle increases repair speed. Has a higher minimum repair threshold, allowing faster repairs on small and medium buildings. Repair effects do not stack.
block.new-horizon-standard-storage.name = Standard Storage
block.new-horizon-standard-storage.description = Lightweight item storage. Items can be unloaded from it using unloaders.
block.new-horizon-heavy-storage.name = Heavy Storage
block.new-horizon-heavy-storage.description = Heavy item storage. Items can be unloaded from it using unloaders.
block.new-horizon-remote-storage.name = Remote Storage
block.new-horizon-remote-storage.description = Directly links to the core regardless of its position in the world. Power consumption increases proportionally with the number placed.[accent]Does not provide additional item capacity or core functions.
block.new-horizon-junior-module-beacon.name = Overclock Beacon Tower
block.new-horizon-junior-module-beacon.description = Overclocks all overclockable buildings within a rectangular area centered on it. Adding phase fabric further increases the overclock multiplier.
block.new-horizon-senior-module-beacon.name = Projection Beacon Tower
block.new-horizon-senior-module-beacon.description = Boosts production of designated buildings within a rectangular area centered on it. Adding Tsunami Alloy further increases the production multiplier.Only boosts output of items and modules.

#LogicBlock
block.new-horizon-icon-display-small.name = Small Icon Display
block.new-horizon-icon-display-small.description = Renders icons of game content. Its content can be read and configured using the world processor?s config.
block.new-horizon-icon-display.name = Icon Display
block.new-horizon-icon-display.description = Renders icons of game content. Its content can be read and configured using the world processor?s config.
block.new-horizon-character-display-small.name = Small Character Display
block.new-horizon-character-display-small.description = Renders character symbols. Character textures use overlay floor textures from the game.
block.new-horizon-character-display.name = Character Display
block.new-horizon-character-display.description = Renders character symbols. Character textures use overlay floor textures from the game.

