nh.setting.nh-effect-detail.name = Повне відображення ефектів
nh.setting.nh-effect-detail.desc = Вимкнення зменшить деякі візуальні ефекти. Рекомендується вимикати при низькій продуктивності.
nh.setting.nh-gravity-trap-alpha.name = Прозорість гравітаційної пастки: {0}
nh.setting.nh-gravity-trap-alpha.desc = Значення внутрішньої прозорості гравітаційної пастки.
nh.setting.nh-gravity-trap-outline-alpha.name = Прозорість контуру гравітаційної пастки: {0}
nh.setting.nh-gravity-trap-outline-alpha.desc = Значення прозорості контуру гравітаційної пастки.
nh.setting.nh-override-unit-shield.name = Заміщення щитів юнітів
nh.setting.nh-override-unit-shield.desc = Додає щит фіксованої ємності більшості юнітів, замінюючи ванільний хвильовий щит.
nh.setting.nh-override-core-unit.name = Налаштування юнітів ядра
nh.setting.nh-override-core-unit.desc = Покращує характеристики ванільних юнітів ядра, такі як швидкість будівництва.
nh.setting.nh-override-logistic.name = Заміщення ванільної логістики
nh.setting.nh-override-logistic.desc = Приховує більшість ванільних логістичних будівель, залишаючи лише будівлі Нового Горизонту.\nУвімкніть, якщо вам не подобається різнотехнологічна логістика або ви просто хочете використовувати логістику Нового Горизонту.
nh.setting.nh-override-drill.name = Заміщення ванільних бурів
nh.setting.nh-override-drill.desc = Приховує всі ванільні бури, крім пневматичного та ударного.\nТакож коригує характеристики та вартість бурів, що залишилися.
nh.setting.nh-override-factories.name = Заміщення ванільних фабрик
nh.setting.nh-override-factories.desc = Спрощує виробництво таких предметів, як кремній та сірка, для прискорення прогресу в ранній грі.
nh.setting.nh-override-power.name = Заміщення ванільної енергетики
nh.setting.nh-override-power.desc = Приховує деякі ванільні енергогенеруючі будівлі.\nУвімкніть, якщо вам не подобається різнотехнологічна енергетика або ви хочете використовувати енергосистему Нового Горизонту.
nh.setting.nh-override-unit.name = Заміщення ванільних юнітів
nh.setting.nh-override-unit.desc = Прибирає екологічні обмеження з усіх ванільних юнітів.\nКорисно при грі в середовищах, відмінних від Міданти.
nh.setting.nh-override-logic.name = Заміщення ванільної логіки
nh.setting.nh-override-logic.desc = Коригує вартість ванільних логічних будівель, щоб їх можна було будувати в будь-яких середовищах.
nh.setting.nh-override-item.name = Коригування ванільних предметів
nh.setting.nh-override-item.desc = Прибирає планетарні обмеження на використання деяких ванільних предметних матеріалів.
nh.setting.nh-override-turret.name = Коригування ванільних турелей
nh.setting.nh-override-turret.desc = Додає специфічні для мода боєприпаси ванільним турелям та коригує деякі їхні значення.
nh.setting.nh-event-raid.name = Додати повітряні нальоти
nh.setting.nh-event-raid.desc = Включає періодичні випадкові повітряні нальоти на картах, що не є пісочницею. Не потребує світового процесора.
nh.setting.nh-debugging.name = Режим налагодження
nh.setting.nh-debugging.desc = Включає режим налагодження\nДозволяє ввімкнути деякий налагоджувальний контент.
nh.setting.nh-debug-panel.name = Панель налагодження
nh.setting.nh-debug-panel.desc = Додає та вмикає панель налагодження для мода.

