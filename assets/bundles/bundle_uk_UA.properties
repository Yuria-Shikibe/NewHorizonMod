status.new-horizon-emp-1.name = Мікро-ЕМІ
status.new-horizon-emp-1.description = Дещо послаблює бойові здібності юніта\nЗазнає мікро-ЕМІ-атаки, допоміжні блоки керування пошкоджено, запускається резервна система...
status.new-horizon-emp-2.name = ЕМІ
status.new-horizon-emp-2.description = Послаблює бойові здібності юніта\nЗазнає ЕМІ-атаки, системи керування вогнем порушено.\n[accent]Перезаписує пошкодження від ЕМІ нижчого рівня
status.new-horizon-emp-3.name = Сильний ЕМІ
status.new-horizon-emp-3.description = Сильно послаблює бойові здібності юніта\nЗазнає сильної ЕМІ-атаки, [red]керуюче обладнання отримує незворотні пошкодження.[]\n[accent]Перезаписує пошкодження від ЕМІ нижчого рівня
status.new-horizon-intercepted.name = Контр-варп I
status.new-horizon-intercepted.description = Цільовий юніт буде примусово виведений з варпу\nСильне порушення гіперпросторового каналу, потрібен негайний вихід та оцінка.
