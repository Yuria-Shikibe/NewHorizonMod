liquid.new-horizon-plo-naq.name = Пло-Нак
liquid.new-horizon-plo-naq.description = Критична колоїдна рідина. Може бути вільно сконфігурована в будь-яку високоміцну структуру або використана для швидкого ремонту пошкоджених будівель.
liquid.new-horizon-cho-vat.name = Чо-Ват
liquid.new-horizon-cho-vat.description = Хромово-зелена рідинна енергія. Значно знижує вхідний урон за рахунок ефекту розсіювання енергії.
liquid.new-horizon-kar-ion.name = Кар-Іон
liquid.new-horizon-kar-ion.description = Шестивимірні високовимірні іони. Руйнують звичайні розмірні об'єкти шляхом структурної дисоціації.

#Turret Block
block.new-horizon-bombard.name = Бомбард
block.new-horizon-bombard.description = Велика артилерійська турель.
block.new-horizon-multiple-artillery.details = [red]БОРТОВИЙ ЗАЛП!
block.new-horizon-vortex.name = Вихор
block.new-horizon-vortex.description = Велика турель.
block.new-horizon-hive.name = Вулик
block.new-horizon-hive.description = Зенітна ракетна установка далекого радіусу дії.\nЗапускає ракети по спіральній траєкторії.
block.new-horizon-ancient-artillery.name = Стародавня артилерія
block.new-horizon-ancient-artillery.description = Стріляє потужним снарядом.\n\n[sky]Тільки для редактора та пісочниці. \n[accent]Повторний захват при руйнуванні увімкнено. Захопіть її для кращого контролю над полем бою.
block.new-horizon-prism.name = Призма
block.new-horizon-prism.description = Стріляє зарядженим лазерним променем, при цьому менші промені відбиваються до найближчих цілей.
block.new-horizon-interferon.name = Інтерферон
block.new-horizon-interferon.description = Невідома стародавня технологія\nСтріляє дуговими розривними зарядами.
block.new-horizon-beam.name = Промінь
block.new-horizon-beam.description = Швидко стріляє лазерами по ворогах.
block.new-horizon-antibody.name = Антитіло
block.new-horizon-antibody.description = Невідома стародавня технологія\nСтріляє міні-енергетичними зарядами.
block.new-horizon-webber.name = Веббер
block.new-horizon-webber.description = Захоплює ворогів оптичними пінцетами.\n\n[accent]Пріоритет віддається швидшим ворогам.
block.new-horizon-gravity.name = Гравітація
block.new-horizon-gravity.description = Стріляє притягуючим променем, який може притягувати кілька юнітів одночасно.
block.new-horizon-eternity.name = Вічність
block.new-horizon-eternity.description = Надвелике стратегічно-тактичне суперзброя. «Воно може коштувати дорого, але воно заслуговує на повагу та славу».
block.new-horizon-eternity.details = «На півночі безодні є риба, ім'я їй Кунь. На південних морях є гармата, ім'я їй Вічність. Її довжина — кілька сотень метрів, діаметр — десятки метрів. Коли вона обертається на вогонь, метеори проносяться над головою, небо заливається багрянцем. При детонації горизонт спалахує яскраво, наче пурпурові хмари спускаються з небес, знищуючи всіх ворогів. Володарі охоплені страхом, укладають союзи, щоб послабити Цінь. Ворота відкриті, щоб зустріти її, але вони вагаються і не сміють просунутися. На переговорах вони вимагають скоротити проект удвічі, але безуспішно. Десятиліттями вони не сміють скакати на південь, щоб пасти своїх коней.» — уривок з «Вічності». Її вартість, масштаб і стримуюча сила безпрецедентні. Під тиском заборонено розгортання на зарубіжних базах, з гарантіями, що вона не буде застосована першою. Трудний процес розробки та величезні витрати колись призвели до призупинення проекту. Дійсно, величезне споживання всіх видів ресурсів зробило б і без того небагату компанію ще біднішою. Але як стратегічний козир вона рідко міститься в активному стані.
block.new-horizon-anti-bullet-turret.name = Перехоплювач
block.new-horizon-anti-bullet-turret.description = Турель точкової оборони. Перехоплює кулі, що наближаються.
block.new-horizon-anti-bullet-turret.details = Насправді використовує силовий ланцюг і обчислювач управління вогнем від Аргмота.
block.new-horizon-pulse.name = Імпульс
block.new-horizon-pulse.description = Стріляє чергами куль по ворогах. Завдає більше кінетичного урону.
block.new-horizon-pulse.details = Ходять чутки, що кодове ім'я у військовій базі даних для неї — «Стара мама».
block.new-horizon-dendrite.name = Дендрит
block.new-horizon-dendrite.description = Невідома стародавня технологія
block.new-horizon-atom-separator.name = Атомний роздільник
block.new-horizon-atom-separator.description = Стріляє смертоносним безперервним лазером.\n\nПріоритет віддається ворогам з меншою швидкістю.
block.new-horizon-atom-separator.details = Прізвисько — Атомний різак. Кажуть, що примусове відключення блокування по куту піднесення дозволяє стріляти прямо в небо.\n\n[accent]«Мені здалося, чи я бачив дивну блондинку в обладунках, яка стояла там?»
block.new-horizon-blood-star.name = Кривава зірка
block.new-horizon-blood-star.description = Стріляє статичною іонною бомбою.
block.new-horizon-blood-star.details = Готовий боєзапас може викликати руйнівну ланцюгову реакцію при попаданні. Ретельно захищайте турель.
block.new-horizon-multiple-launcher.name = Мульти-пускова установка
block.new-horizon-multiple-launcher.description = Велика ракетна турель.
block.new-horizon-multiple-launcher.details = Прізвисько — «Катюша», що, здається, якесь стародавнє жіноче ім'я. Як не дивно, це прізвисько несподівано популярне.\n\nМожливо, тому що вона любить пити?
block.new-horizon-thermo-turret.name = Термо-турель
block.new-horizon-thermo-turret.description = Проста оборонна турель, що стріляє самонавідними снарядами за рахунок заряджання Ксен-рідини.
block.new-horizon-thermo-turret.details = Рання турель, оптимізована для хімічних викидів Міданти. Піролізний ефект Ксен-рідини, що стимулюється електрикою, достатній для відбиття атак менших юнітів.
block.new-horizon-rail-gun.name = Рейкотрон
block.new-horizon-rail-gun.description = Турель з повільною швидкістю обертання та низькою скорострільністю, що стріляє болтами з дуже великою дальністю та високим уроном.
block.new-horizon-rail-gun.details = Початкова швидкість кулі наближається до 15 Махів. Її екстремальна пробивна здатність дозволяє легко пронизувати будь-яку ціль.
block.new-horizon-end-of-era.name = Кінець епохи
block.new-horizon-end-of-era.description = Може оснащуватися потужними кулями.
block.new-horizon-executor.name = Кат
block.new-horizon-executor.description = Запускає потужні енергетичні болти, які самонаводяться на ворогів.
block.new-horizon-synchro.name = Синхро
block.new-horizon-synchro.description = Стандартна турель з високою скорострільністю. Може завдавати великої шкоди юнітам, але неефективна проти щитів.
block.new-horizon-argmot.name = Аргмот
block.new-horizon-argmot.description = Стріляє згустками електрики по ворогах. Скорострільність збільшується з часом. Перегрівається при тривалій стрільбі. Завдає нищівного урону по щитах.
block.new-horizon-argmot.details = При повному завантаженні завдає нищівного урону, але якщо величезну кількість відхідного тепла не контролювати, це призведе до примусового вимкнення.
block.new-horizon-slavio.name = Славіо
block.new-horizon-slavio.description = Запускає ряд самонавідних ракет. Завдає великої шкоди юнітам, але неефективний проти щитів.
block.new-horizon-concentration.name = Концентрація
block.new-horizon-concentration.description = [sky]Чим довше вона дивиться, [#bf92f9]тим сильнішою стає.
block.new-horizon-electro.name = Електро
block.new-horizon-electro.description = Випускає енергетичні кулі, які паралізують ворогів і завдають безперервної шкоди на великій площі.

#ProductionBlock
block.new-horizon-large-water-extractor.name = Великий водяний екстрактор
block.new-horizon-large-water-extractor.description = Видобуває підземні води з вищою ефективністю, ніж водяний екстрактор.
block.new-horizon-scan-collector.name = Скануючий колектор
#block.new-horizon-scan-collector.description =
block.new-horizon-resonance-mining-facility.name = Резонансний бур
block.new-horizon-resonance-mining-facility.description = Використовує механічні хвилі певної частоти для ефективного видобутку ресурсів.
block.new-horizon-beam-mining-facility.name = Променевий бур
block.new-horizon-beam-mining-facility.description = Використовує потужні лазерні промені для видобутку. Здатний обробляти твердіші руди. Може отримувати вигоду від модулів видобутку.
block.new-horizon-implosion-mining-facility.name = Імплозивний бур
block.new-horizon-implosion-mining-facility.description = Ефективно видобуває ресурси за допомогою імплозії.
block.new-horizon-air-radiator.name = Повітряний радіатор
#block.new-horizon-air-radiator.description =
block.new-horizon-liquid-radiator.name = Рідинний радіатор
#block.new-horizon-liquid-radiator.description =
block.new-horizon-sand-cracker.name = Дробарка піску
block.new-horizon-sand-cracker.description = Подрібнює матеріали на пісок.
block.new-horizon-decoherence-reverser.name = Реверсер декогеренції
#block.new-horizon-decoherence-reverser.description =
block.new-horizon-tungsten-reconstructor.name = Вольфрамовий реконструктор
block.new-horizon-titanium-reconstructor.name = Титановий реконструктор
block.new-horizon-oil-refiner.name = Нафтопереробний завод
block.new-horizon-oil-refiner.description = Видобуває нафту з піску.
block.new-horizon-resource-convertor.name = Конвертер ресурсів
#block.new-horizon-resource-convertor.description =

#DistributionBlock
block.new-horizon-hard-light-rail.name = Рельс жорсткого світла
block.new-horizon-hard-light-rail.description = Використовує статичні та затверділі фотони як носій для транспортування предметів. Приймає предмети лише від задньої будівлі та інших логістичних компонентів.
block.new-horizon-hard-light-rail.details = Концепція використання статичних фотонних мостів була вперше запропонована та реалізована стародавнім підприємством Guangquan Technology. Дизайн жорсткого світла тепер став кращим вибором для логістики наступного покоління завдяки своїй майже повній безматеріальності.
block.new-horizon-stack-rail.name = Штабельний рельс
block.new-horizon-stack-rail.description = Штабелює та транспортує упаковані предмети. Використовуйте штабелер для подачі штабельованих предметів.
block.new-horizon-steady-stack-rail.name = Стабільний штабельний рельс
block.new-horizon-steady-stack-rail.description = Дозволяє транспортувати штабельовані упаковані предмети. Використовуйте штабелер для подачі штабельованих предметів. Просунуті матеріали підвищують стабільність упаковки, забезпечуючи вищу швидкість транспортування.
block.new-horizon-light-stack-loader.name = Легкий штабелер
block.new-horizon-light-stack-loader.description = Виводить вхідні предмети в стопках по 15 на штабельний конвеєрний рельс.
block.new-horizon-heavy-stack-loader.name = Важкий штабелер
block.new-horizon-heavy-stack-loader.description = Виводить вхідні предмети в стопках по 60 на штабельний конвеєрний рельс.
block.new-horizon-multi-armor-conveyor.name = Броньований багатошаровий сталевий конвеєр
block.new-horizon-multi-armor-conveyor.description = Переміщує предмети вперед. Швидший за рельс жорсткого світла. Не приймає входи з боків.
block.new-horizon-multi-junction.name = Багатошаровий сталевий перехрест
block.new-horizon-multi-router.name = Багатошаровий сталевий маршрутизатор
block.new-horizon-multi-router.description = Рівномірно розподіляє як предмети, так і рідини на три вихідних напрямки.
block.new-horizon-logistics-router.name = Логістичний маршрутизатор
#block.new-horizon-logistics-router.description =
block.new-horizon-logistics-junction.name = Рельсовий перехрест
block.new-horizon-logistics-junction.description = Дозволяє двом рельсам перетинатися.
block.new-horizon-logistics-directional-router.name = Напрямний маршрутизатор
block.new-horizon-logistics-directional-router.description = Напрямний маршрутизатор. Вхідні предмети рівномірно розподіляються за трьома іншими напрямками.
block.new-horizon-logistics-directional-merger.name = Напрямний об'єднувач
block.new-horizon-logistics-directional-merger.description = Напрямний об'єднувач. Об'єднує три входи в один напрямок.
block.new-horizon-logistics-directional-overflow-gate.name = Напрямний надлишковий затвор
block.new-horizon-logistics-directional-overflow-gate.description = Логістичний компонент, який може перенаправляти входи предметів у заданому напрямку.
block.new-horizon-logistics-directional-underflow-gate.name = Напрямний шлюз недовантаження
block.new-horizon-logistics-directional-underflow-gate.description = Логістичний компонент, який може обмежувати входи предметів у заданому напрямку.
block.new-horizon-logistics-omni-sorter.name = Всенапрямний сортувальник
block.new-horizon-logistics-omni-sorter.description = Дозволяє виключати входи предметів у кожному напрямку.
block.new-horizon-logistics-omni-blocker.name = Всенапрямний блокувальник
block.new-horizon-logistics-omni-blocker.description = Логістичний компонент, який може обмежувати або перенаправляти входи предметів у будь-якому напрямку. Натисніть для перемикання режиму.
block.new-horizon-logistics-omni-overflow-gate.name = Всенапрямний надлишковий затвор
block.new-horizon-logistics-omni-overflow-gate.description = Дозволяє фільтрувати входи предметів у кожному напрямку.
block.new-horizon-logistics-omni-underflow-gate.name = Всенапрямний шлюз недовантаження
block.new-horizon-logistics-omni-underflow-gate.description = Дозволяє обмежувати входи предметів у кожному напрямку.
block.new-horizon-logistics-bridge.name = Рельсовий міст
block.new-horizon-logistics-bridge.description = Може транспортувати предмети на інший міст у радіусі дії. Може приймати до трьох входів.
block.new-horizon-logistics-extend-bridge.name = Подовжений міст
block.new-horizon-logistics-extend-bridge.description = Може транспортувати предмети на інший міст у радіусі дії. Може приймати до трьох входів.
block.new-horizon-logistics-unloader.name = Рельсовий розвантажувач
block.new-horizon-logistics-unloader.description = Вивантажує предмети із задньої будівлі в передню. Може бути налаштований на певний предмет. Збільшує швидкість при налаштуванні на конкретний предмет.
block.new-horizon-logistics-fast-unloader.name = Швидкий рельсовий розвантажувач
#block.new-horizon-logistics-fast-unloader.description =
block.new-horizon-omni-unloader.name = Всенапрямний розвантажувач
#block.new-horizon-omni-unloader.description =
block.new-horizon-rapid-unloader.name = Швидкісний розвантажувач
block.new-horizon-rapid-unloader.description = Покращений розвантажувач. Швидко вивантажує вибраний предмет із сусідніх блоків.
block.new-horizon-reinforced-item-source.name = Посилене джерело предметів
block.new-horizon-reinforced-item-source.description = Має більше здоров'я.\n\n[accent]Вибраний контент суворо записується та читається за ідентифікатором, щоб уникнути проблем з втратою прив'язки.

#LiquidBlock
block.new-horizon-turbo-pump-small.name = Малий турбонасос
block.new-horizon-turbo-pump-small.description = Перекачує рідину. При підключенні до інших турбонасосів може розглядатися як єдине ціле для передачі енергії та подачі рідини.
block.new-horizon-turbo-pump.name = Турбонасос
block.new-horizon-turbo-pump.description = Перекачує рідину. При підключенні до інших турбонасосів може розглядатися як єдине ціле для передачі енергії та подачі рідини.
block.new-horizon-standard-liquid-storage.name = Стандартне сховище рідин
block.new-horizon-standard-liquid-storage.description = Зберігає велику кількість рідини.
block.new-horizon-heavy-liquid-storage.name = Важке сховище рідин
block.new-horizon-heavy-liquid-storage.description = Зберігає дуже велику кількість рідини.
block.new-horizon-conduit.name = Трубопровід
block.new-horizon-conduit.description = Переміщує рідину вперед. Натисніть для перемикання прийому бокового вводу.
block.new-horizon-logistics-liquid-bridge.name = Рідинний міст
block.new-horizon-logistics-liquid-bridge.description = Може транспортувати рідину на інший міст у радіусі дії. Може приймати до трьох входів.
block.new-horizon-logistics-extend-liquid-bridge.name = Подовжений рідинний міст
block.new-horizon-logistics-extend-liquid-bridge.description = Може транспортувати рідину на інший міст у радіусі дії. Може приймати до трьох входів.
block.new-horizon-logistics-liquid-junction.name = Логістичний рідинний перехрест
block.new-horizon-logistics-liquid-junction.description = Дозволяє двом трубам перетинатися.
block.new-horizon-logistics-liquid-router.name = Логістичний рідинний маршрутизатор
block.new-horizon-logistics-liquid-router.description = Рідина може розподілятися в будь-якому напрямку.
block.new-horizon-logistics-liquid-unloader.name = Рідинний розвантажувач
block.new-horizon-logistics-liquid-unloader.description = Вивантажує рідину із задньої будівлі в передню. Має бути налаштований на конкретну рідину.
block.new-horizon-reinforced-liquid-source.name = Посилене джерело рідини
block.new-horizon-reinforced-liquid-source.description = Має більше здоров'я.\n\n[accent]Вибраний контент суворо записується та читається за ідентифікатором, щоб уникнути проблем з втратою прив'язки.

block.new-horizon-stream-source.name = Джерело потоку
block.new-horizon-stream-source.description = Нескінченно виводить потоки частинок у заданому напрямку.
block.new-horizon-stream-extractor.name = Екстрактор потоку
block.new-horizon-stream-extractor.description = Виводить потоки частинок з навколишніх блоків у заданому напрямку.
block.new-horizon-stream-receiver.name = Приймач потоку
block.new-horizon-stream-receiver.description = Приймає потоки частинок з інших трьох сторін і передає їх вперед.
block.new-horizon-stream-repeater.name = Повторювач потоку
block.new-horizon-stream-repeater.description = Приймає потоки частинок ззаду і передає їх вперед, збільшуючи дальність передачі.
block.new-horizon-stream-redirector.name = Перенаправлювач потоку
block.new-horizon-stream-redirector.description = Приймає потоки частинок з інших трьох сторін і передає їх вперед.
block.new-horizon-stream-splitter.name = Роздільник потоку
block.new-horizon-stream-splitter.description = Приймає потоки частинок з боків, передає виміряну частину вперед, а решта продовжує передаватися на протилежну сторону.

