block.new-horizon-photothermal-generator.name = Фототермальний генератор
block.new-horizon-photothermal-generator.description = Особлива версія генератора внутрішнього згоряння. Перетворює частину теплової енергії на жорстке світло.
block.new-horizon-geological-photothermal-generator.name = Геологічний фототермальний генератор
block.new-horizon-geological-photothermal-generator.description = Особлива версія термального генератора. Перетворює частину теплової енергії на жорстке світло.
block.new-horizon-vector-condenser.name = Векторна турбіна
block.new-horizon-vector-condenser.description = Особлива версія турбінного конденсатора. Перетворює частину теплової енергії на жорстке світло.
block.new-horizon-differential-reactor.name = Диференціальний реактор
#block.new-horizon-differential-reactor.description =
block.new-horizon-photon-panel.name = Фотонна панель
block.new-horizon-photon-panel.description = Покращена сонячна панель. Генерує енергію від сонячного світла, одночасно вловлюючи світло та перетворюючи його на жорстке світло.\nЕфективність перетворення залежить від сонячного множника. Продукти передаються безпосередньо до ядра через гіпер-інвентарний протокол, без необхідності логістичних компонентів. Дивіться категорію енергетичних будівель для пов'язаних виробничих об'єктів.
block.new-horizon-neutralization-generator.name = Генератор нейтралізації
block.new-horizon-neutralization-generator.description = Генерує енергію з енергії, що виділяється при нейтралізації поляризованого аміаку. Виводить воду як побічний продукт.
block.new-horizon-hydrazine-generator.name = Гідразиновий генератор
block.new-horizon-hydrazine-generator.description = Генерує енергію спалюванням гідразину.
block.new-horizon-gravity-trap-small.name = Мала гравітаційна пастка
block.new-horizon-gravity-trap-small.description = Легкий генератор гравітаційного поля. Створює гравітаційну пастку в певному радіусі.
block.new-horizon-gravity-trap.name = Стандартна гравітаційна пастка
block.new-horizon-gravity-trap.description = Важкий генератор гравітаційного поля. Створює гравітаційну пастку та проводить електрику на великій площі.
block.new-horizon-gravity-trap-heavy.name = Важка гравітаційна пастка
block.new-horizon-gravity-trap-heavy.description = Надважкий генератор гравітаційного поля. Створює гравітаційну пастку та проводить електрику на великій площі.
block.new-horizon-zeta-generator.name = Дзета-ф'юзер
block.new-horizon-zeta-generator.description = Стабільний та ефективний реактор.
block.new-horizon-armor-battery.name = Броньована батарея
block.new-horizon-armor-battery.description = Менша за розміром.
block.new-horizon-armor-battery-large.name = Велика броньована батарея
block.new-horizon-armor-battery-large.description = Броньована велика батарея з підвищеною міцністю, але зменшеною ємністю. Через необхідність розміщувати енергетичні блоки в небезпечних зонах, міністр безпеки Расор підняв питання та обговорення на нараді щодо «безпечніших батарей». (Раніше вибухові великі батареї вже створили забагато вдів.) У результаті велика батарея була перебудована з міцніших матеріалів та оснащена електронним управлінням.
block.new-horizon-armor-battery-huge.name = Гіпер-батарея
block.new-horizon-armor-battery-huge.description = Зберігає енергію. Має більшу ємність, ніж великі батареї.
block.new-horizon-hydro-fuel-cell.name = Водневий паливний елемент
block.new-horizon-hydro-fuel-cell.description = Генератор чистої енергії. Хімічна енергія перетворюється на електрику під захистом азоту.
block.new-horizon-fission-reactor.name = Реактор поділу
#block.new-horizon-fission-reactor.description =
block.new-horizon-fusion-reactor.name = Термоядерний реактор
block.new-horizon-fusion-reactor.description = Колапсує термоядерні ядра для генерації енергії.
block.new-horizon-hyper-reactor.name = Гіпер-реактор
block.new-horizon-hyper-reactor.description = Генерує надзвичайно велику кількість енергії з позитивних термозарядів, але також генерує блискавки. Урон від блискавок збільшується, коли будівля пошкоджена.\n[accent]Вибухне при руйнуванні.

#DefenseBlock
block.new-horizon-titanium-wall.name = Шарова титанова стіна
block.new-horizon-titanium-wall.description = Суцільна стіна з вищим здоров'ям, може блокувати кулі з вбудованим зниженням урону.
block.new-horizon-presstanium-wall.name = Стіна з пресстану
block.new-horizon-presstanium-wall.description = Суцільна стіна, може блокувати кулі, блискавки та лазери. Може розподіляти отриманий урон по сусідніх стінах.
block.new-horizon-presstanium-wall.details = Нове покоління оборонної споруди. Конструкція з розподілом урону значно підвищує стійкість стіни до ударів.
block.new-horizon-refactoring-multi-wall.name = Рефакторингова мульти-стіна
block.new-horizon-refactoring-multi-wall.description = Суцільна стіна з вищим здоров'ям, може блокувати кулі, блискавки та лазери. Може розподіляти більше урону з більшою кількістю сусідніх стін. Має зниження урону.
block.new-horizon-refactoring-multi-wall.details = Шляхом нашарування та реконструкції торієвих стін з високосвітловою сталлю, стійкість стіни до ударів додатково підвищується.
block.new-horizon-seton-phased-wall.name = Фазова стіна Сетона
block.new-horizon-seton-phased-wall.description = Міцна стіна з сильною бронею та високим здоров'ям, може блокувати кулі, блискавки та лазери. Може розподіляти більше урону з більшою кількістю сусідніх стін. Має більше зниження урону.
block.new-horizon-seton-phased-wall.details = Високоміцний удароміцний матеріал, утворений взаємодією щільного сплаву та фазової тканини, застосовується в лініях оборони для подальшого підвищення надійності.
block.new-horizon-shaped-wall.name = Адаптивна стіна
block.new-horizon-shaped-wall.description = Практично незламна стіна, може блокувати кулі, блискавки та лазери. Може розподіляти більше урону з більшою кількістю сусідніх стін. Має велике зниження урону.
block.new-horizon-shaped-wall.details = Так званий «метал з пам'яттю форми», чия просторова форма фіксується після завершення будівництва, а наступні стіни координуються для підтримки структури. Завдяки властивостям матеріалу більшість атак не можуть пробити стіну. Деякі об'єкти виключно використовують цей тип стіни. Це лише побічний продукт.
block.new-horizon-fire-extinguisher.name = Вогнегасник
block.new-horizon-fire-extinguisher.description = Гасить пожежі поблизу.
block.new-horizon-blaster.name = Бластер
block.new-horizon-blaster.description = Випускає блискавки на юнітів, що наближаються, відкидає їх та завдає шкоди.
block.new-horizon-bomb-launcher.name = Бомбомет
block.new-horizon-bomb-launcher.description = Запускає бомбу із затримкою приземлення в позицію цілі.\n\n[sky]Можна одночасно керувати кількома будівлями.
block.new-horizon-air-raider.name = Повітряний рейдер
block.new-horizon-air-raider.description = Завдає удару кількома ракетами по цілі.
block.new-horizon-flood-pipe.name = Труба потоку
block.new-horizon-flood-pipe.description = Підвищує різні характеристики на основі збережених рідин Пло-Нак, Чо-Ват та Кар-Іон. Розподіляє вміст із сусідніми трубами потоку.

#UnitBlock
block.new-horizon-basic-jump-gate.name = Базові стрибкові ворота
block.new-horizon-basic-jump-gate.description = Дозволяє гравцям викликати юнітів для підтримки в бою.\n[sky]Може призивати юнітів T1, T2 та Мідантських T3.
block.new-horizon-primary-jump-gate.name = Первинні стрибкові ворота
block.new-horizon-primary-jump-gate.description = Дозволяє гравцям викликати юнітів для підтримки в бою.\n[sky]Може призивати юнітів T1, T2 та T3.
block.new-horizon-standard-jump-gate.name = Стандартні стрибкові ворота
block.new-horizon-standard-jump-gate.description = Дозволяє гравцям викликати юнітів для підтримки в бою.\n[sky]Може призивати юнітів T4, T5 та молодших юнітів.
block.new-horizon-hyper-jump-gate.name = Гіпер-стрибкові ворота
block.new-horizon-hyper-jump-gate.description = Дозволяє гравцям викликати юнітів для підтримки в бою.\n[sky]Може призивати старших юнітів.
block.new-horizon-hyper-space-warper.name = Гіперпросторові складні ворота
block.new-horizon-hyper-space-warper.description = Використовується для транспортування юнітів.\n\n[sky]Можуть бути заблоковані ворожими гравітаційними пастками.\n[sky]Ви можете бачити радіус перешкод ворожої гравітаційної пастки на HUD. Гравітаційна пастка змусить гіперпросторовий стрибок, що проходить через неї, вистрибнути та завдати відсоткового урону юніту.
block.new-horizon-module-rail.name = Модульний рельс
block.new-horizon-module-rail.description = Спеціалізований рельс для транспортування великих модулів.

#SpecialBlock
block.new-horizon-core-conflux.name = Ядро: Конфлюкс
block.new-horizon-core-conflux.description = Найменше аванпостне ядро, з помірним сховищем та оборонними можливостями.
block.new-horizon-core-array.name = Ядро: Аррей
block.new-horizon-core-array.description = Базове ядро середнього розміру з відмінним сховищем та обороною, здатне підтримувати базу середнього розміру.
block.new-horizon-core-nexus.name = Ядро: Нексус
block.new-horizon-core-nexus.description = Крупне базове ядро з винятковим сховищем та обороною, здатне підтримувати велику базу.
block.new-horizon-core-cluster.name = Ядро: Кластер
block.new-horizon-core-cluster.description = Найпросунутіше базове ядро, високотехнологічний продукт, реконструйований зі стародавніх технологій. Володіє неймовірним сховищем та обороною, здатне підтримувати масивну базу та одночасно підтримувати виключно потужний ядерний мех.
block.new-horizon-rift-shield.name = Генератор розривного щита
block.new-horizon-rift-shield.description = Створює потужний щит для відбиття куль та блокування ворогів.\nСпоживає більше ресурсів при низькій ємності щита.
block.new-horizon-standard-shield-generator.name = Стандартний генератор щита
block.new-horizon-standard-shield-generator.description = Легкий стандартний генератор щита. Створює прямокутну силову стіну.
block.new-horizon-large-shield-generator.name = Великий силовий проектор
block.new-horizon-large-shield-generator.description = Створює більше та швидше відновлюване силове поле, захищаючи будівлі та юнітів усередині від пошкоджень.\nПерегрівається при отриманні занадто великого урону. Опціонально використовує охолоджувальну рідину для запобігання перегріву. Термоядра збільшують розмір щита.
block.new-horizon-standard-regen-projector.name = Стандартний регенеруючий проектор
block.new-horizon-standard-regen-projector.description = Ремонтує пошкоджені будівлі в прямокутній області. Використання фазової тканини збільшує швидкість ремонту. Має мінімальний поріг ремонту, що дозволяє швидше чинити невеликі будівлі. Ефекти ремонту не складаються.
block.new-horizon-heavy-regen-projector.name = Важкий регенеруючий проектор
block.new-horizon-heavy-regen-projector.description = Ремонтує пошкоджені будівлі в більшій прямокутній області. Використання мембранелли збільшує швидкість ремонту. Має вищий мінімальний поріг ремонту, що дозволяє швидше чинити невеликі та середні будівлі. Ефекти ремонту не складаються.
block.new-horizon-standard-storage.name = Стандартне сховище
block.new-horizon-standard-storage.description = Легке сховище предметів. Предмети можуть бути вивантажені за допомогою розвантажувачів.
block.new-horizon-heavy-storage.name = Важке сховище
block.new-horizon-heavy-storage.description = Важке сховище предметів. Предмети можуть бути вивантажені за допомогою розвантажувачів.
block.new-horizon-remote-storage.name = Віддалене сховище
block.new-horizon-remote-storage.description = Напряму зв'язується з ядром, незалежно від його позиції у світі. Споживання енергії збільшується пропорційно до кількості розміщених.[accent]Не забезпечує додаткову ємність предметів або функції ядра.
block.new-horizon-junior-module-beacon.name = Маяк-вежа розгону
block.new-horizon-junior-module-beacon.description = Розганяє всі будівлі, що розганяються, у прямокутній області з центром на ньому. Додавання фазової тканини додатково збільшує множник розгону.
block.new-horizon-senior-module-beacon.name = Проекційна маяк-вежа
block.new-horizon-senior-module-beacon.description = Збільшує виробництво призначених будівель у прямокутній області з центром на ньому. Додавання сплаву Цунамі додатково збільшує множник виробництва. Збільшує тільки випуск предметів та модулів.

#LogicBlock
block.new-horizon-icon-display-small.name = Малий іконний дисплей
block.new-horizon-icon-display-small.description = Відображає іконки ігрового контенту. Його вміст може бути прочитаний та налаштований за допомогою конфігурації світового процесора.
block.new-horizon-icon-display.name = Іконний дисплей
block.new-horizon-icon-display.description = Відображає іконки ігрового контенту. Його вміст може бути прочитаний та налаштований за допомогою конфігурації світового процесора.
block.new-horizon-character-display-small.name = Малий символьний дисплей
block.new-horizon-character-display-small.description = Відображає символи. Текстури символів використовують текстури накладених поверхонь з гри.
block.new-horizon-character-display.name = Символьний дисплей
block.new-horizon-character-display.description = Відображає символи. Текстури символів використовують текстури накладених поверхонь з гри.

#unit
unit.new-horizon-scalar.name = Скаляр
unit.new-horizon-scalar.description = Юніт ядра Конфлюкс. Оснащений легкою розсіювальною термоелектричною гарматою та прискорювачем двигуна.\nЗдатний видобувати руду як з підлоги, так і зі стін.
unit.new-horizon-vector.name = Вектор
unit.new-horizon-vector.description = Юніт ядра Аррей. Оснащений легкими подвійними розривними гарматами та прискорювачем двигуна.\nЗдатний видобувати руду як з підлоги, так і зі стін.
unit.new-horizon-martix.name = Матриця
unit.new-horizon-martix.description = Юніт ядра Нексус. Оснащений подвійними самонавідними розривними пострілами та прискорювачем двигуна. Також може накладати щити на найближчі юніти.\nЗдатний видобувати руду як з підлоги, так і зі стін.
unit.new-horizon-tensor.name = Тензор
unit.new-horizon-tensor.description = Юніт ядра Кластер. Продукт зворотної розробки стародавніх технологій, оснащений подвійними скорострільними електромагнітними самонавідними енергетичними ракетами. Володіє міцним корпусом і кільцевим щитом, а також може давати сильні щити юнітам у певному радіусі.\nЗдатний видобувати руду як з підлоги, так і зі стін.
unit.new-horizon-origin.name = Походження
unit.new-horizon-origin.description = Легкий наземний юніт, оснащений розсіювальною гарматою.
unit.new-horizon-sharp.name = Різак
unit.new-horizon-sharp.description = Легкий повітряний юніт, оснащений легкою термогарматою.
unit.new-horizon-assaulter.name = Штурмовик
unit.new-horizon-assaulter.description = Юніт-смертник, що стріляє перевантажувальним лазером.
unit.new-horizon-apparition.name = Привид
unit.new-horizon-apparition.description = Середньошвидкісний штурмовик\nСтріляє розсіювальними самонавідними імпульсами блискавок.
unit.new-horizon-branch.name = Гілка
unit.new-horizon-branch.description = Легкий повітряний юніт.
unit.new-horizon-thynomo.name = Тиномо
unit.new-horizon-thynomo.description = Середній наземний юніт з лазерною гарматою.
unit.new-horizon-relay.name = Реле
unit.new-horizon-relay.description = Легке морське судно, оснащене двома ракетними установками.
unit.new-horizon-aliotiat.name = Аліотіат
unit.new-horizon-aliotiat.description = Середній наземний юніт підтримки.
unit.new-horizon-warper.name = Викривлювач
unit.new-horizon-warper.description = Високошвидкісний повітряний бомбардувальник.
unit.new-horizon-ghost.name = Привид
unit.new-horizon-ghost.description = Середнє підтримуюче морське судно.
unit.new-horizon-rhino.name = Носоріг
unit.new-horizon-rhino.description = Важкоброньований вантажний корабель з високою швидкістю будівництва.
unit.new-horizon-gather.name = Збирач
unit.new-horizon-gather.description = Старший шахтарський дрон.
unit.new-horizon-tarlidor.name = Тарлідор
unit.new-horizon-tarlidor.description = Важкий наземний юніт підтримки.
unit.new-horizon-naxos.name = Наксос
unit.new-horizon-naxos.description = Зенітний винищувач, оснащений ріжучим променем.\n\n[accent]Націлюється та завдає урону лише повітряним цілям.
unit.new-horizon-striker.name = Страйкер
unit.new-horizon-striker.description = Важкий повітряний юніт підтримки, оснащений лазерними гарматами далекого радіусу дії.
unit.new-horizon-zarkov.name = Зарьков
unit.new-horizon-zarkov.description = Важке підтримуюче морське судно, оснащене 4 багатоствольними ракетними установками.
unit.new-horizon-annihilation.name = Анігілятор
unit.new-horizon-annihilation.description = Важкий наземний юніт, оснащений бойовою лазерною гарматою та ракетними установками.
unit.new-horizon-destruction.name = Зруйновувач
unit.new-horizon-destruction.description = Важкий повітряний бойовий юніт.
unit.new-horizon-longinus.name = Лонгин
unit.new-horizon-longinus.description = Артилерійський крейсер, стріляє смертоносним енергетичним болтом.
unit.new-horizon-saviour.name = Спаситель
unit.new-horizon-saviour.description = Великий юніт підтримки, оснащений двома важкими ЕМІ-турелями.
unit.new-horizon-hurricane.name = Піролізер
unit.new-horizon-hurricane.description = Повітряний флагман. Легко знищує все.
unit.new-horizon-anvil.name = Ковадло
unit.new-horizon-anvil.description = Важкий бойовий корабель.
unit.new-horizon-declining.name = Відхилення
unit.new-horizon-declining.description = Морський флагман. Оснащений 3 рейкотронами та іншою дрібною зброєю.
unit.new-horizon-sin.name = Порок
unit.new-horizon-sin.description = Важкий наземний мех, оснащений кількома ракетними озброєннями.
unit.new-horizon-collapser.name = Колапсер
unit.new-horizon-collapser.description = Великий повітряний флагман. Створений для знищення "нутрощів" ворожої бази.
unit.new-horizon-ancient-probe.name = Давній зонд
unit.new-horizon-ancient-probe.description = Невідома стародавня технологія.\nСканує та надсилає дані про ворожі бази, може привернути рейд.\n[red]<Вам поки що не дозволено доступ до цього підрозділу>
unit.new-horizon-histone.name = Гістон
unit.new-horizon-histone.description = Невідома стародавня технологія\nАвтономний лазерний механізм\n[red]<Вам поки що не дозволено доступ до цього підрозділу>
unit.new-horizon-restriction-enzyme.name = Рестрикційний фермент
unit.new-horizon-restriction-enzyme.description = Невідома стародавня технологія.\nАвтоматична стародавня турель.\n[red]<Вам поки що не дозволено доступ до цього підрозділу>
unit.new-horizon-macrophage.name = Макрофаг
unit.new-horizon-macrophage.description = Невідома стародавня технологія.\nВажкий бойовий корабель. Може виконувати круговий рух.\n[red]<Вам поки що не дозволено доступ до цього підрозділу>
unit.new-horizon-lymph.name = Лімфа
unit.new-horizon-lymph.description = Невідома стародавня технологія\nАвтономна тактична збройова платформа\n[red]<Вам поки що не дозволено доступ до цього підрозділу>
unit.new-horizon-laugra.name = Лаугра
unit.new-horizon-laugra.description = Невідома стародавня технологія.\nСтріляє прискорювальними кулями, які пробивають будівлі та юнітів. Може бути заблокована будівлями з бронею понад 10 або поглинаючими лазерами.\nНе тоне.\n[red]<Вам поки що не дозволено доступ до цього підрозділу>
unit.new-horizon-guardian.name = Карвошер
unit.new-horizon-guardian.description = Давня невідома істота.\n\n[accent]Гравці не можуть добре нею керувати.
unit.new-horizon-pester.name = Ентанглер
unit.new-horizon-pester.description = Давній лінкор.\n[sky]По можливості поверне весь нанесений йому урон.\n[red]<Вам поки що не дозволено доступ до цього підрозділу>
unit.new-horizon-nucleoid.name = Нуклеоїд
unit.new-horizon-nucleoid.description = Невідома стародавня технологія.\nМабуть, флагман древніх.\n[red]<Вам поки що не дозволено доступ до цього підрозділу>
unit.new-horizon-liv.name = Лів
unit.new-horizon-liv.description = Високошвидкісний перехоплювач, оснащений двома термо-турелями. Також може використовуватися як сильний юніт підтримки.
unit.new-horizon-liv.details = Використання ядра Нексус зробило ядерний юніт набагато потужнішим, ніж раніше.

