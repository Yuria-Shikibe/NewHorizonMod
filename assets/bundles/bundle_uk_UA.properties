nh.new-feature.important-0 = [sky]Попередній перегляд оновлення New Horizon 2.0.0[]
nh.new-feature.important-0-desc = Це оновлення включає нові ядра, юніти ядер, бойові юніти, будівлі, предмети, рідини та системні коригування. Український переклад: [ваше ім'я] та Jovinull. Якщо у вас є питання до перекладу, звертайтесь до Discord-серверу. \n[gold]Сервер відновив роботу: 47.103.39.94[white]

nh.new-feature.improve-0 = Систему повітряних нальотів виправлено
nh.new-feature.improve-0-desc = Виправлено тригери нальотів, сповіщення та логіку рівнів загрози; додано HUD загрози та маркери на карті.

nh.new-feature.content-0 = Нові ядра та юніти ядер
nh.new-feature.content-0-desc = Додає чотири нових ядра: Ядро Конфлюкс, Ядро Аррей, Ядро Нексус та Ядро Кластер; додає чотири нових юніти ядер: Скаляр, Вектор, Матриця та Тензор.

nh.new-feature.content-1 = Ядро Конфлюкс
nh.new-feature.content-1-desc = Невелике аванпостне ядро 3x3 з пристойним сховищем та оборонними можливостями. Відповідний юніт ядра: Скаляр.

nh.new-feature.content-2 = Ядро Аррей
nh.new-feature.content-2-desc = Базове ядро середнього розміру 4x4 з солідним сховищем та обороною, здатне підтримувати базу середнього розміру. Відповідний юніт ядра: Вектор.

nh.new-feature.content-3 = Ядро Нексус
nh.new-feature.content-3-desc = Крупне базове ядро 5x5 з відмінним сховищем та обороною, здатне підтримувати велику базу. Відповідний юніт ядра: Матриця.

nh.new-feature.content-4 = Ядро Кластер
nh.new-feature.content-4-desc = Просунуте базове ядро 6x6, перебудоване на основі стародавніх технологій. Володіє надзвичайно високим сховищем та оборонними можливостями, здатне підтримувати масивну базу. Відповідний юніт ядра: Тензор.

nh.new-feature.content-5 = Нові та відновлені юніти
nh.new-feature.content-5-desc = Додає або переробляє кілька бойових юнітів: Реле, Привид, Страйкер, Лімфа та Гістон.

nh.new-feature.content-6 = Реле
nh.new-feature.content-6-desc = Легке морське судно, оснащене двома ракетними установками.

nh.new-feature.content-7 = Привид
nh.new-feature.content-7-desc = Середньошвидкісний штурмовик, що стріляє розсіюваними самонавідними імпульсами блискавок.

nh.new-feature.content-8 = Страйкер
nh.new-feature.content-8-desc = Важкий повітряний юніт підтримки, оснащений лазерною гарматою далекого радіусу дії.

nh.new-feature.content-9 = Лімфа
nh.new-feature.content-9-desc = [red]Цей підрозділ ще не розкрито.

nh.new-feature.content-10 = Гістон
nh.new-feature.content-10-desc = [red]Цей підрозділ ще не розкрито.

nh.new-feature.content-11 = Нові будівлі, предмети та рідини
nh.new-feature.content-11-desc = Додає контент, пов'язаний з логістикою, виробництвом, енергією, синтезом, предметами та рідинами.

nh.new-feature.content-12 = Логістична система
nh.new-feature.content-12-desc = Додає та налаштовує кілька будівель розподілу логістики, оновлює логіку логістичної системи.

nh.new-feature.content-13 = Виробнича система
nh.new-feature.content-13-desc = Додає та налаштовує кілька будівель, пов'язаних з виробництвом.

nh.new-feature.content-14 = Енергетична система
nh.new-feature.content-14-desc = Додає та налаштовує кілька будівель генерації, постачання та підтримки енергії.

nh.new-feature.content-15 = Система синтезу
nh.new-feature.content-15-desc = Додає та налаштовує кілька будівель синтезу, переробки та перетворення.

nh.new-feature.content-16 = Предмети та рідини
nh.new-feature.content-16-desc = Додає кілька предметів і рідин, а також пов'язані з ними ланцюжки переробки.

nh.new-feature.balance-0 = Коригування логістичної системи
nh.new-feature.balance-0-desc = Коригує та переробляє частину логіки системи розподілу.

nh.new-feature.balance-1 = Балансні коригування
nh.new-feature.balance-1-desc = Вносить кілька балансних змін.

nh.new-feature.fix-0 = Виправлення вильоту нерегулярних фабрик
nh.new-feature.fix-0-desc = Виправлено виліт, який міг бути викликаний нерегулярними фабриками.
