mod.new-horizon.author = Yuria & Lao
mod.new-horizon.description = Бета-версія. Кампанія не включена.\n\nМістить стабільний контент та опційне заміщення ванільних механік. \n\nМод грабельний як розширення для Серпуло та Ерекіра. \n\nКампанія ще в розробці.
mod.new-horizon.subtitle = Бета-версія. Кампанія не включена.

