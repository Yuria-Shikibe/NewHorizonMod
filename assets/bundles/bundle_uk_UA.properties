#Items
item.new-horizon-hard-light.name = Жорстке світло
item.new-horizon-hard-light.description = Природно сформовані вуглецево-кремнієві кристали, що утворюються під час високоенергетичних фізичних процесів, таких як інтенсивні сонячні бурі, широко поширені на поверхні Міданти.
item.new-horizon-silicar.name = Силікар
item.new-horizon-silicar.description = Зворотно розроблене досягнення з реліктів Міданти, надлегкий матеріал, утворений фотонним виродженням у певних умовах.
item.new-horizon-presstanium.name = Пресстан
item.new-horizon-presstanium.description = Твердий, жорсткий шматок металу.
item.new-horizon-processor-junior.name = Молодший процесор
item.new-horizon-processor-junior.description = Базовий процесор.
item.new-horizon-processor-junior.details = "Intel - ТАК!"
item.new-horizon-metal-oxhydrigen.name = Металооксигідрид
item.new-horizon-metal-oxhydrigen.description = Кристально чистий!
item.new-horizon-zeta.name = Дзета-кристал
item.new-horizon-zeta.description = Випромінює слабке світіння.
item.new-horizon-multiple-steel.name = Багатошарова сталь
item.new-horizon-multiple-steel.description = Панель, що складається з багатьох шарів металів, скріплених між собою.
item.new-horizon-processor-senior.name = Старший процесор
item.new-horizon-processor-senior.description = Вища швидкість!
item.new-horizon-processor-senior.details = "NVIDIA - ТАК!"
item.new-horizon-irayrond-panel.name = Іридієва панель
item.new-horizon-irayrond-panel.description = Спеціальний тип твердого металу з високою термостійкістю.
item.new-horizon-seton-alloy.name = Сплав Сетона
item.new-horizon-seton-alloy.description = Важкий і міцний.
item.new-horizon-nodex-plate.name = Пластина Нодекс
item.new-horizon-nodex-plate.description = Розумний метал, який може самовідновлюватися.
item.new-horizon-ancimembrane.name = Анцімембрана
item.new-horizon-ancimembrane.description = Невідома стародавня технологія.
item.new-horizon-hadronicomp.name = Адронний композит
item.new-horizon-hadronicomp.description = Також відомий як кварк-глюонний матеріал. Його продукти незнищенні, досягаючи меж відомої науки.
item.new-horizon-processor-hyper.name = Гіперпроцесор
item.new-horizon-processor-hyper.description = Гіперфазовий обчислювальний чіп. Обчислювальна продуктивність збільшена на кілька порядків.
item.new-horizon-fusion-core-energy.name = Кластер термоядерних частинок
item.new-horizon-fusion-core-energy.description = Велика кількість термоядерних частинок у магнітній пастці, може використовуватися як енергія або безпосередньо як боєприпаси.
item.new-horizon-thermo-core-positive.name = Позитивний термозаряд
item.new-horizon-thermo-core-positive.description = Контейнер, заповнений енергійним термозарядом.
item.new-horizon-thermo-core-negative.name = Негативний термозаряд
item.new-horizon-thermo-core-negative.description = Контейнер, заповнений холодним термозарядом.
item.new-horizon-dark-energy.name = Темна енергія
item.new-horizon-dark-energy.description = Таємниця всесвіту.

#Liquids
liquid.new-horizon-ammonia.name = Поляризований аміак
liquid.new-horizon-ammonia.description = Сильнолужний аміак, утворений в особливих умовах, особливо у висококвантовому середовищі Міданти.
liquid.new-horizon-hydrazine.name = Гідразин
liquid.new-horizon-hydrazine.description = Високоенергетичне паливо, отримане з поляризованого аміаку. Використовується для виробництва енергії або подальшого виробництва.
liquid.new-horizon-quantum-liquid.name = Квантова рідина
liquid.new-horizon-quantum-liquid.description = Нестабільний квантовий об'єкт. Після збудження може використовуватися для різних промислових цілей.
liquid.new-horizon-xen-fluid.name = Ксен-рідина
liquid.new-horizon-xen-fluid.description = Високоенергетична рідина. Може генерувати багато енергії.
liquid.new-horizon-zeta-fluid-positive.name = Позитивна дзета-рідина
liquid.new-horizon-zeta-fluid-positive.description = Позитивна рідина після електролізу кристалів Дзета. Може використовуватися для хімічної обробки та повернення негативної дзета-рідини.
liquid.new-horizon-zeta-fluid-negative.name = Негативна дзета-рідина
liquid.new-horizon-zeta-fluid-negative.description = Негативна рідина після електролізу кристалів Дзета. Може використовуватися для хімічної обробки та повернення позитивної дзета-рідини.
liquid.new-horizon-irdryon-fluid.name = Іридієва рідина
liquid.new-horizon-irdryon-fluid.description = Низькотемпературна фазова рідина.

liquid.new-horizon-photon.name = Фотонний потік
liquid.new-horizon-photon.description = Захоплені фотони.
liquid.new-horizon-particle-stream.name = Потік частинок
