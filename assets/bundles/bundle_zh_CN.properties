block.new-horizon-stamping-facility.description = 将钛经冲压操作处理为重混合钢。
block.new-horizon-processor-printer.name = 芯片打印机
block.new-horizon-processor-printer.description = 生产芯片\n可将电路直接打印至高纯硅基板上。
block.new-horizon-condense-facility.name = 相位制冷机
block.new-horizon-crucible-foundry.name = 坩埚铸造厂
