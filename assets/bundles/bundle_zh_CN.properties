block.new-horizon-zeta-dissociator.description = 将Zeta晶体重构为正性Zeta流体和负性Zeta流体。
block.new-horizon-surge-refactor.name = 波动重构器
block.new-horizon-surge-refactor.description = 使用钛与正Zeta流体高效再构造巨浪合金。
block.new-horizon-fabric-synthesizer.name = 相位合成厂
block.new-horizon-fabric-synthesizer.description = 使用硅与负Zeta流体高效再构造相位布。
block.new-horizon-multiple-steel-factory.name = 高轻钢压制器
block.new-horizon-multiple-steel-factory.description = 将多层复合材料处理为高轻钢。
block.new-horizon-processor-encoder.name = 亚原子编码机
block.new-horizon-processor-encoder.description = 在亚原子层面对芯片进行编码。
