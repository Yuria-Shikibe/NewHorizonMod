#Items
item.new-horizon-hard-light.name = 硬光
item.new-horizon-hard-light.description = 在特殊环境下由光子简并形成的超轻结构材料。广泛用于结构建造当中。
item.new-horizon-silicar.name = 嵌晶
item.new-horizon-silicar.description = 在强太阳风暴等高能物理过程中自然形成的脆性碳硅晶体，在弥丹莎表面广泛分布。
item.new-horizon-presstanium.name = 重混合钢
item.new-horizon-presstanium.description = 钛-碳纤维增强聚合物。作为基础材料广泛用于建筑。
item.new-horizon-processor-junior.name = 芯片
item.new-horizon-processor-junior.description = 普通半导体芯片。广泛用于精密计算。
item.new-horizon-processor-junior.details = "Intel YES!"
item.new-horizon-metal-oxhydrigen.name = 羟金
item.new-horizon-metal-oxhydrigen.description = 催化剂和化工原料。用于多种化工生产环节。
item.new-horizon-zeta.name = Zeta晶体
item.new-horizon-zeta.description = 在弥丹砂发现的特殊晶体材料。发出微弱的荧光。
item.new-horizon-multiple-steel.name = 高轻钢
item.new-horizon-multiple-steel.description = 高强度低重量的复合材料。化学稳定性优秀，是理想的建筑材料。
item.new-horizon-processor-senior.name = 量子芯片
item.new-horizon-processor-senior.description = 亚原子编码数据的高性能芯片。使用量子比特大幅提升算力。
item.new-horizon-processor-senior.details = "NVIDIA YES!"
item.new-horizon-irayrond-panel.name = 铱板
item.new-horizon-irayrond-panel.description = 与纯铱性能相仿的合金。拥有优异的物化性能。用于构造高等级建筑和单位。
item.new-horizon-seton-alloy.name = 致密合金
item.new-horizon-seton-alloy.description = 超固态碳塑钢，坚实稳固。\n将原料封入容器后加压至约140万个大气压，强行排出电子制得的超固态材料。
item.new-horizon-nodex-plate.name = 自塑合金
item.new-horizon-nodex-plate.description = 可编程合金，具备形状记忆与传感功能。用于构造尖端武装和建筑。
item.new-horizon-ancimembrane.name = 幽膜
item.new-horizon-ancimembrane.description = 膜状电导镀层。具备高介电性。用于尖端制造。
item.new-horizon-hadronicomp.name = 强子材料
item.new-horizon-hadronicomp.description = 夸克·胶子材料。使用强核力维持恐怖的硬度。
item.new-horizon-processor-hyper.name = 超相芯片
item.new-horizon-processor-hyper.description = "P=NP."
item.new-horizon-fusion-core-energy.name = 聚变产物
item.new-horizon-fusion-core-energy.description = 磁封装的热核粒子团。可用于能源或直接作为弹药。
item.new-horizon-thermo-core-positive.name = 正零位能
item.new-horizon-thermo-core-positive.description = 磁封装的正电性粒子团。可用于能源或直接作为弹药。
item.new-horizon-thermo-core-negative.name = 反零位能
item.new-horizon-thermo-core-negative.description = 磁封装的负电性粒子团。可用于能源或直接作为弹药。
item.new-horizon-dark-energy.name = 暗能
#item.new-horizon-dark-energy.description =

#Liquids
liquid.new-horizon-ammonia.name = 极化氨
liquid.new-horizon-ammonia.description = 在如弥丹砂的强量子场的特殊环境下所形成的N(OH)3分子。展现出极强的碱性。
liquid.new-horizon-hydrazine.name = 肼
liquid.new-horizon-hydrazine.description = 由极化氨处理得到的高能燃料。用于发点或进一步的制造。
liquid.new-horizon-quantum-liquid.name = 量子体
liquid.new-horizon-quantum-liquid.description = 在弥丹莎广泛存在的不稳定量子物质。激发后可用于各种工业用途。
liquid.new-horizon-xen-fluid.name = Xen
liquid.new-horizon-xen-fluid.description = 亚稳定高能粒子流体，激发后可释放极高能量。
liquid.new-horizon-zeta-fluid-positive.name = 正Zeta流体
liquid.new-horizon-zeta-fluid-positive.description = 正向重构Zeta晶体得到的正能流体。可用于化工处理并返还负Zeta流体。
liquid.new-horizon-zeta-fluid-negative.name = 负Zeta流体
liquid.new-horizon-zeta-fluid-negative.description = 逆向Zeta晶体得到的负能流体。可用于化工处理并返还正Zeta流体。
liquid.new-horizon-irdryon-fluid.name = 化工液
liquid.new-horizon-irdryon-fluid.description = 低温活化流体，用做多种工序的保护剂或冷却剂。

liquid.new-horizon-photon.name = 光子流
liquid.new-horizon-photon.description = 捕获的光子。
liquid.new-horizon-particle-stream.name = 粒子流
#liquid.new-horizon-particle-stream.description =
liquid.new-horizon-neutron-stream.name = 中子流
#liquid.new-horizon-neutron-stream.description =
liquid.new-horizon-proton-stream.name = 质子流
#liquid.new-horizon-proton-stream.description =
liquid.new-horizon-anti-matter-stream.name = 反物质
#liquid.new-horizon-anti-matter-stream.description =

liquid.new-horizon-plo-naq.name = 钷介素
liquid.new-horizon-plo-naq.description = 临界状态胶体。可按需求自由构造为任何高强度建筑或，或对受损建筑进行快速修复。
liquid.new-horizon-cho-vat.name = 铬态能
liquid.new-horizon-cho-vat.description = 呈铬绿色的流态能量。通过放能效应显著降低来袭火力的伤害。
liquid.new-horizon-kar-ion.name = 卡离子
liquid.new-horizon-kar-ion.description = 六维高维离子。对常规维度物体通过解离结构以进行毁灭性打击。

#TurretBlock
block.new-horizon-bombard.name = 铁雨
block.new-horizon-bombard.description = 多管曲射火炮。\n结构简单，价格低廉，模块化炮闩可适配多种弹药。
block.new-horizon-multiple-artillery.details = [red]舰 炮 齐 射 ！
block.new-horizon-vortex.name = 裂痕
block.new-horizon-vortex.description = 多功能速射火炮。
block.new-horizon-hive.name = 风暴
block.new-horizon-hive.description = 部署式近SAM，发射旋迹导弹。
block.new-horizon-ancient-artillery.name = 远古巨炮
block.new-horizon-ancient-artillery.description = 发射巨型炮弹。\n坚不可摧，无法确认结构和原理\n[accent]可通过摧毁占领，夺取它以获得更好的战场控制。\n\n[sky]仅限编辑器和沙盒模式。
block.new-horizon-prism.name = 光棱
block.new-horizon-prism.description = 发射带电的激光束，命中后分裂较小的激光束反射到附近的目标。
block.new-horizon-interferon.name = 溶酶
block.new-horizon-interferon.description = 未知科技。\n\n发射高速放电的粒子团
block.new-horizon-beam.name = 镭射
block.new-horizon-beam.description = 发射多道脉冲激光，造成击退和伤害。
block.new-horizon-antibody.name = 抗体
block.new-horizon-antibody.description = 未知科技。\n\n发射自主索敌的光子弹药
block.new-horizon-webber.name = 织网
block.new-horizon-webber.description = 利用宏观光镊效应截停敌机。\n\n[accent]优先捕获高速单位
block.new-horizon-gravity.name = 引力
block.new-horizon-gravity.description = 大型牵引激光，可同时锁定多个单位。
block.new-horizon-eternity.name = 永恒
block.new-horizon-eternity.description = 唯一合法的战略级反物质武器，部署和维护成本极为高昂。\n\n命中时会爆发剧烈的可见光辐射，注意眼部防护。\n[red]可能诱发光敏性癫痫
block.new-horizon-eternity.details = “漆黑的双锋落下断影，绛紫的孤星刺破长空。”
block.new-horizon-anti-bullet-turret.name = 阻断
block.new-horizon-anti-bullet-turret.description = 大型点防御装置，超快光学武器化的集大成者。可抵御高频次的实弹攻击。
block.new-horizon-anti-bullet-turret.details = 事实上它使用的是律令的供能回路和火控计算机。
block.new-horizon-pulse.name = 脉冲
block.new-horizon-pulse.description = 通用电磁炮。\n最早适配弥丹莎环境的武器之一，服役已有近百年历史。能耗极低，无需专线供能。
block.new-horizon-pulse.details = 据传军工系统数据库中对其的代号为“老干妈”。
block.new-horizon-dendrite.name = 树突
block.new-horizon-dendrite.description = 未知科技。\n\n开火回路似乎存在两种模式。
block.new-horizon-atom-separator.name = 帝俊
block.new-horizon-atom-separator.description = 大型高功率辐照激光器，优先攻击低速单位。\n\n注意电力负载。
block.new-horizon-atom-separator.details = 人送外号原子切割机，据说强行解除俯仰角锁定后可以直冲天际发射。\n\n[accent]“我是不是看见有个穿着铠甲的奇怪金发女生站在那？”
block.new-horizon-blood-star.name = 彗星
block.new-horizon-blood-star.description = 大型静滞等离子炮。\n能量栓离架后会因电离空气发散出奇特的光晕，因此得名。
block.new-horizon-blood-star.details = 待发弹药库被命中后可能引起毁灭性连锁反应，注意保护炮塔。
block.new-horizon-multiple-launcher.name = 蜂巢
block.new-horizon-multiple-launcher.description = 部署式多管火箭炮，依靠单轮投送巨量弹药对目标进行压制。
block.new-horizon-multiple-launcher.details = 绰号“喀秋莎”，似乎是某种古老的女性名称。奇怪的是这一外号意外地受欢迎。\n\n可能是因为爱喝酒？
block.new-horizon-thermo-turret.name = 热电
block.new-horizon-thermo-turret.description = 简易野战防空，弹丸飞行过程中释放的高温携电气流能够有效杀伤轻型航空器。
block.new-horizon-thermo-turret.details = 不建议在它开火的时候许愿——流星可不是从地面往天上飞的。
block.new-horizon-rail-gun.name = 穿云
block.new-horizon-rail-gun.description = 重型磁轨炮，用纯粹的动能把对手轰上天。
block.new-horizon-rail-gun.details = 出膛速度接近15马赫，极高的穿深足以使其轻松贯透任何敌人。
block.new-horizon-end-of-era.name = 终焉
block.new-horizon-end-of-era.description = 尖端战术武器，同时也是大部分基地的最高火力配置。
block.new-horizon-executor.name = 裁决
block.new-horizon-executor.description = 大型能量栓发射器，配合其他炮台可以形成恐怖的火力网。
block.new-horizon-synchro.name = 怖烬
block.new-horizon-synchro.description = 常规速射炮台，适配大量弹药。
block.new-horizon-argmot.name = 律令
block.new-horizon-argmot.description = 高频闪电发生器，需要预热以达到最高荷载。
block.new-horizon-argmot.details = 满载状态下具有极高伤害，但如若不做处理，产生的大量废热会使其强制停机。
block.new-horizon-slavio.name = 铁幕
block.new-horizon-slavio.description = 快速轮射小型制导火箭弹，对单位本体造成可观伤害。\n\n对护盾效果大打折扣。
block.new-horizon-concentration.name = 凝聚
block.new-horizon-concentration.description = [sky]命中时间越长\n[#bf92f9]激光伤害越高
block.new-horizon-electro.name = 寂静
block.new-horizon-electro.description = 发射EMP脉冲弹。

#ProductionBlock
block.new-horizon-large-water-extractor.name = 大型抽水机
block.new-horizon-large-water-extractor.description = 更硬钻头，更强动力，更大尺寸，更多抽水量...更高能耗。
block.new-horizon-scan-collector.name = 区域钻探器
#block.new-horizon-scan-collector.description =
block.new-horizon-resonance-mining-facility.name = 谐振钻井
block.new-horizon-resonance-mining-facility.description = 利用矿物共振进行高效开采。
block.new-horizon-beam-mining-facility.name = 光束钻头
block.new-horizon-beam-mining-facility.description = 利用高功率激光进行矿物开采。可以开采较硬的矿物。
block.new-horizon-implosion-mining-facility.name = 内爆钻井
block.new-horizon-implosion-mining-facility.description = 利用真空内爆的方式蛮力开采物资。
block.new-horizon-air-radiator.name = 风冷散热器
#block.new-horizon-air-radiator.description =
block.new-horizon-liquid-radiator.name = 液冷散热器
#block.new-horizon-liquid-radiator.description =
block.new-horizon-sand-cracker.name = 大型粉碎机
block.new-horizon-sand-cracker.description = 将各种材料经粉碎回收处理以得到沙子。
block.new-horizon-decoherence-reverser.name = 退相干逆转仪
#block.new-horizon-decoherence-reverser.description =
block.new-horizon-tungsten-reconstructor.name = 定向重构器-钨
block.new-horizon-titanium-reconstructor.name = 定向重构器-钛
block.new-horizon-oil-refiner.name = 石油精炼机
block.new-horizon-oil-refiner.description = 使用沙精炼石油。\n项目发掘于遗迹海岸，是时完好无损。经一系列实验，工程师们只能强行复制它的结构信息。这神秘机器竟能做到原子层面的转换————“我们应该庆幸塞普罗土著已经灭绝了。”保卫科委员长如是说道。

#DistributionBlock
block.new-horizon-hard-light-rail.name = 滞化光轨
block.new-horizon-hard-light-rail.description = 驱动静态滞化光子定向位移以传输物品。\n点击以切换是否接受侧边输入。\n[accent]需放置在重力井范围内才可运行。
block.new-horizon-hard-light-rail.details = 上世纪由光圈科技提出的光介质物流设想如今得以实现。
block.new-horizon-stack-rail.name = 堆叠导轨
block.new-horizon-stack-rail.description = 可将运输堆叠打包后的物品。\n[accent]需要使用堆叠器输入堆叠后的物品。
block.new-horizon-steady-stack-rail.name = 稳态导轨
block.new-horizon-steady-stack-rail.description  = 可将运输堆叠打包后的物品。\n[accent]需要使用堆叠器输入堆叠后的物品。
block.new-horizon-light-stack-loader.name = 轻型堆叠器
block.new-horizon-light-stack-loader.description = 将输入的物品以15为一叠输出到堆叠导轨上。
block.new-horizon-heavy-stack-loader.name = 重型堆叠器
block.new-horizon-heavy-stack-loader.description = 将输入的物品以60为一叠输出到堆叠导轨上。
block.new-horizon-logistics-junction.name = 物流交叉器
block.new-horizon-logistics-junction.description = 允许两条传送带或其他物流设备跨接运输。
block.new-horizon-logistics-directional-router.name = 定向分流器
block.new-horizon-logistics-directional-router.description = 具有方向的路由器。可以将指定方向的物品均分到另外三个方向上。
block.new-horizon-logistics-directional-merger.name = 定向并流器
block.new-horizon-logistics-directional-merger.description = 具有方向的并流器。可以将其他三个方向的输入合并到一个方向上。
block.new-horizon-logistics-directional-gate.name = 定向物流阀
block.new-horizon-logistics-directional-gate.description = 可以用于截流或溢流指定方向物品输入的物流原件。\n[accent]点击以切换模式。
block.new-horizon-logistics-omni-sorter.name = 全向筛选门
block.new-horizon-logistics-omni-sorter.description = 可以对每个方向的物品输入进行筛选操作。
block.new-horizon-logistics-omni-blocker.name = 全向排除门
block.new-horizon-logistics-omni-blocker.description = 可以对每个方向的物品输入进行排除操作。
block.new-horizon-logistics-omni-gate.name = 全向物流阀
block.new-horizon-logistics-omni-gate.description = 可以用于截流或溢流任意方向物品输入的物流原件。\n[accent]点击以切换模式。
block.new-horizon-logistics-bridge.name = 导轨物流桥
block.new-horizon-logistics-bridge.description = 可将物品运输至范围内的另一个物流桥。最多可接受三个物流桥的输入。
block.new-horizon-logistics-extend-bridge.name = 长距物流桥
block.new-horizon-logistics-extend-bridge.description = 可将物品运输至范围内的另一个物流桥。最多可接受三个物流桥的输入。
block.new-horizon-logistics-unloader.name = 导轨装卸器
block.new-horizon-logistics-unloader.description = 作为单向的装卸器提取后方建筑物品至前方。可自选装卸物品筛选器。当指定装卸物品时提升装卸速率。
block.new-horizon-rapid-unloader.name = 高速装卸器
block.new-horizon-rapid-unloader.description = 拥有更高的卸载速度。
block.new-horizon-reinforced-item-source.name = 强化物品源
block.new-horizon-reinforced-item-source.description = 拥有更高的生命值。\n\n[accent]所选输出物需严格按照定义名读写以避免错位问题。

#LiquidBlock
block.new-horizon-turbo-pump-small.name = 小型涡轮泵
block.new-horizon-turbo-pump-small.description = 泵取液体。毗连其他涡轮泵时可视为整体传导电力和输出液体。
block.new-horizon-turbo-pump.name = 涡轮泵
block.new-horizon-turbo-pump.description = 泵取液体。毗连其他涡轮泵时可视为一个整体传导电力和输出液体。
block.new-horizon-standard-liquid-storage.name = 标准液体仓储
block.new-horizon-standard-liquid-storage.description = 储存大量的液体。
block.new-horizon-heavy-liquid-storage.name = 重型液体仓储
block.new-horizon-heavy-liquid-storage.description = 储存巨量的液体。
block.new-horizon-conduit.name = 流体管道
block.new-horizon-conduit.description = 可将流体向前运输。\n[accent]点击以切换是否接受侧边输入。
block.new-horizon-logistics-liquid-bridge.name = 流体导管桥
block.new-horizon-logistics-liquid-bridge.description = 可将流体运输至范围内的另一个物流桥。最多可接受三个物流桥的输入。
block.new-horizon-logistics-extend-liquid-bridge.name = 长距导管桥
block.new-horizon-logistics-extend-liquid-bridge.description = 可将流体运输至范围内的另一个物流桥。最多可接受三个物流桥的输入。
block.new-horizon-logistics-liquid-junction.name = 流体交叉器
block.new-horizon-logistics-liquid-junction.description = 可将两条导管跨接连接。
block.new-horizon-logistics-liquid-router.name = 流体路由器
block.new-horizon-logistics-liquid-router.description = 可将流体分配至任意方向上。
block.new-horizon-logistics-liquid-unloader.name = 流体装卸器
block.new-horizon-logistics-liquid-unloader.description = 作为单向的装卸器提取后方建筑液体至前方。必须指定装卸的流体。
block.new-horizon-reinforced-liquid-source.name = 强化液体源
block.new-horizon-reinforced-liquid-source.description = 拥有更高的生命值。\n\n[accent]所选输出物需严格按照定义名读写以避免错位问题。

block.new-horizon-stream-source.name = 粒子流射线源
block.new-horizon-stream-source.description = 向指定方向无限的输出粒子流。
block.new-horizon-stream-extractor.name = 粒子流发射器
block.new-horizon-stream-extractor.description = 向指定方向输出来自周围方块的粒子流。
block.new-horizon-stream-receiver.name = 粒子流接收器
block.new-horizon-stream-receiver.description = 接受其余三侧的粒子流，向前侧的建筑传导粒子流。
block.new-horizon-stream-repeater.name = 粒子流中继器
block.new-horizon-stream-repeater.description = 接受后侧的粒子流，向前侧传导粒子流并延长传输距离。
block.new-horizon-stream-redirector.name = 粒子流重定向器
block.new-horizon-stream-redirector.description = 接受其余三侧的粒子流，向前侧传导粒子流。
block.new-horizon-stream-splitter.name = 粒子流分流器
block.new-horizon-stream-splitter.description = 接受来自旁侧的粒子流，向前定量分流粒子流并在对侧继续传导粒子流。

#CraftingBlock
