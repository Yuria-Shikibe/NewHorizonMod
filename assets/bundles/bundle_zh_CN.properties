#PowerBlock
block.new-horizon-photothermal-generator.name = 光热发电厂
block.new-horizon-photothermal-generator.description = 特殊版本的燃烧发电机。发电时将一部分的热能转换为硬光。
block.new-horizon-photon-panel.name = 光栅板
block.new-horizon-photon-panel.description = 改良太阳能板。利用太阳能发电的同时捕获光能转换为硬光。\n转化效率受太阳能倍率影响。
block.new-horizon-neutralization-generator.name = 中和反应堆
block.new-horizon-neutralization-generator.description = 利用极化氨的中和放出的能量进行发电。输出水作为中和产物。
block.new-horizon-hydrazine-generator.name = 肼解发电机
block.new-horizon-hydrazine-generator.description = 通过燃烧肼释放大量能量。
block.new-horizon-gravity-trap-small.name = 小型重力阱
block.new-horizon-gravity-trap-small.description = 小型重力控制器。在一定范围内创建重力阱。
block.new-horizon-gravity-trap.name = 制式重力阱
block.new-horizon-gravity-trap.description = 标准规格重力控制器。在较大范围内创建重力阱。
block.new-horizon-gravity-trap-heavy.name = 重型重力阱
block.new-horizon-gravity-trap-heavy.description = 舰载重力控制器。在大范围内创建重力阱。
block.new-horizon-zeta-generator.name = Zeta融合堆
block.new-horizon-zeta-generator.description = 融合Zeta晶体以释放大量能量。同时封存解离的高能的Zeta粒子。
block.new-horizon-armor-battery.name = 装甲电池
block.new-horizon-armor-battery.description = 披挂重装甲的战地储能设备。在极端情况下也可保持良好的生存性。
block.new-horizon-armor-battery-large.name = 大型装甲电池
block.new-horizon-armor-battery-large.description = 披挂重装甲的战地储能设备。在极端情况下也可保持良好的生存性。强于常规装甲电池。
block.new-horizon-armor-battery-huge.name = 被甲高密度电池
block.new-horizon-armor-battery-huge.description = 尖端战地能源支持系统，配备复合装甲层与晶核高密度电池组。
block.new-horizon-hydro-fuel-cell.name = 羟燃料电池
block.new-horizon-hydro-fuel-cell.description = 清洁能源发电机。
block.new-horizon-fusion-collapser-generator.name = 聚变反应堆
block.new-horizon-fusion-collapser-generator.description = 坍缩聚变核以发电。\n千百年前的人类做过无数次可控聚变的实验，即便是他们也知道：裂变已变成愚蠢的，害人害己又低效的手段。聚变能封存器封装的能量可以为此发电机使用，热效率高达85%。目前这一参数仍在缓慢提升。与众多托卡马克发电机相同，不要在它运行的时候打扰它。
block.new-horizon-hyper-generator.name = 临界反应堆
block.new-horizon-hyper-generator.description = 释放封装零位能蕴含的能量。

#DefenseBlock
block.new-horizon-presstanium-wall.name = 重混合墙体
block.new-horizon-presstanium-wall.description = 迎弹防御结构\n可以抵御多种来袭火力。被弹时将伤害分摊至周围墙体。
block.new-horizon-presstanium-wall.details = 外围标准防御设施。能有效抵挡中小型武器的攻击。
block.new-horizon-refactoring-multi-wall.name = 叠加再构墙体
block.new-horizon-refactoring-multi-wall.description = 迎弹防御结构\n可以抵御多种来袭火力。被弹时将伤害分摊至周围墙体。
block.new-horizon-refactoring-multi-wall.details = 外表面的高轻钢附加装甲层能代替墙体结构承受一定伤害。
block.new-horizon-seton-phased-wall.name = 相位致密墙体
block.new-horizon-seton-phased-wall.description = 迎弹防御结构\n可以抵御多种来袭火力。被弹时将伤害分摊至周围墙体。
block.new-horizon-seton-phased-wall.details = 使用相织布复合层维持致密合金框架的稳定性，防护性能优秀。
block.new-horizon-shaped-wall.name = 自适应墙体
block.new-horizon-shaped-wall.description = 迎弹防御结构\n可以抵御多种来袭火力。背弹时将伤害分摊至周围墙体。
block.new-horizon-shaped-wall.details = 依赖致密合金骨架部署的记忆金属颗粒使自适应结构群具有可怕的抗打击能力。
block.new-horizon-fire-extinguisher.name = 冷却场发射器
block.new-horizon-fire-extinguisher.description = 熄灭附近的火焰
block.new-horizon-blaster.name = 震爆器
block.new-horizon-blaster.description = 向靠近的敌人发射闪电，造成击退和伤害。
block.new-horizon-bomb-launcher.name = 炸弹抛射器
block.new-horizon-bomb-launcher.description = 弹射高爆弹头轰炸目标区域。\n\n[sky]可同时调用多个抛射器。
block.new-horizon-air-raider.name = 空袭呼叫器
block.new-horizon-air-raider.description = 呼叫舰队对目标区域执行导弹打击。

#UnitBlock
block.new-horizon-primary-jump-gate.name = 近地折跃门
block.new-horizon-primary-jump-gate.description = 兆瓦级折跃信标，引导小型战术单位介入战场。
block.new-horizon-standard-jump-gate.name = 位面折跃门
block.new-horizon-standard-jump-gate.description = 吉瓦级折跃信标，引导标准战术单位介入战场。
block.new-horizon-hyper-jump-gate.name = 超核折跃门
block.new-horizon-hyper-jump-gate.description = 太瓦级折跃信标，引导精锐战术单位介入战场。
block.new-horizon-hyper-space-warper.name = 超空间核折跃器
block.new-horizon-hyper-space-warper.description = 用于快速投送单位。[sky]可被重力阱阻断。\n[lightgrey]你可以在HUD上看到敌方重力阱的干扰范围。[red]经过敌方重力阱的折跃单位将被强行迁出并受到百分比伤害。
block.new-horizon-module-rail.name = 模块导轨
block.new-horizon-module-rail.description = 用于运输大型模块的专用导轨。

#SpecialBlock
block.new-horizon-nexus-core.name = 枢纽核心
block.new-horizon-nexus-core.description = 弥丹莎废弃核心逆向工程成果。性能更为优秀，有效助力后续探索与开发进程。
block.new-horizon-rift-shield.name = 裂隙护盾发生器
block.new-horizon-rift-shield.description = 创建裂隙空间以瞬间反转来袭火力。处理激光较为棘手。\n\n[accent]注意：资源消耗速率在低盾容时会快速增长。
block.new-horizon-standard-shield-generator.name = 制式力墙发生器
block.new-horizon-standard-shield-generator.description = 轻量化力场发生器。投射一片小范围的矩形力墙。
block.new-horizon-large-shield-generator.name = 大型力墙发生器
block.new-horizon-large-shield-generator.description = 重型力场发生器。投射一片大范围的矩形力墙。
block.new-horizon-standard-regen-projector.name = 标准再构投影仪
block.new-horizon-standard-regen-projector.description = 对矩形范围内的受损建筑进行修复。使用相位物时可提高修复速度。存在最小修复阈值。\n可对小型建筑进行更快的修复。修复效果不叠加。
block.new-horizon-heavy-regen-projector.name = 重型再构投影仪
block.new-horizon-heavy-regen-projector.description = 对更大矩形范围内的受损建筑进行修复。使用幽膜时可提高修复速度，最小修复阈值更高。\n可对中小型建筑进行更快的修复。修复效果不叠加。
block.new-horizon-standard-storage.name = 轻量仓储
block.new-horizon-standard-storage.description = 轻量化的程物品仓储。可使用装卸器从其卸载物品。
block.new-horizon-heavy-storage.name = 重型仓储
block.new-horizon-heavy-storage.description = 重型物品仓储。可使用装卸器从其卸载物品。
block.new-horizon-remote-storage.name = 远程仓储
block.new-horizon-remote-storage.description = 直接链接核心调用资源。随放置数量的增加等比增加能耗。\n\n[accent]不提供额外的物品容量和核心功能。
block.new-horizon-junior-module-beacon.name = 超频信标塔
block.new-horizon-junior-module-beacon.description = 超速以其为中心的矩形范围内的所有可超速建筑。加入相织布可进一步提高超速倍率。
block.new-horizon-senior-module-beacon.name = 投射信标塔
