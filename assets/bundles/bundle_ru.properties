nh.new-feature.important-0 = [sky]Превью обновления New Horizon 2.0.0[]
nh.new-feature.important-0-desc = Это обновление включает новые ядра, юнитов ядра, боевых юнитов, здания, предметы, жидкости и системные корректировки.\n[gold]Сервер возобновил свою работу: 47.103.39.94[white]

nh.new-feature.improve-0 = Система воздушных налетов исправлена
nh.new-feature.improve-0-desc = Исправлены триггеры налетов, оповещения и логика уровней угрозы; добавлены HUD угрозы и маркеры на карте.

nh.new-feature.content-0 = Новые ядра и юниты ядра
nh.new-feature.content-0-desc = Добавляет четыре новых ядра: Ядро Конфлюкс, Ядро Аррей, Ядро Нексус и Ядро Кластер; добавляет четыре новых юнитов ядра: Скаляр, Вектор, Матрица и Тензор.

nh.new-feature.content-1 = Ядро Конфлюкс
nh.new-feature.content-1-desc = Небольшое аванпостное ядро 3x3 с приличным хранилищем и оборонительными возможностями. Соответствующий юнит ядра: Скаляр.

nh.new-feature.content-2 = Ядро Аррей
nh.new-feature.content-2-desc = Базовое ядро среднего размера 4x4 с солидным хранилищем и обороной, способное поддерживать базу среднего размера. Соответствующий юнит ядра: Вектор.

nh.new-feature.content-3 = Ядро Нексус
nh.new-feature.content-3-desc = Крупное базовое ядро 5x5 с отличным хранилищем и обороной, способное поддерживать большую базу. Соответствующий юнит ядра: Матрица.

nh.new-feature.content-4 = Ядро Кластер
nh.new-feature.content-4-desc = Продвинутое базовое ядро 6x6, перестроенное на основе древних технологий. Обладает чрезвычайно высоким хранилищем и оборонительными возможностями, способное поддерживать массивную базу. Соответствующий юнит ядра: Тензор.

nh.new-feature.content-5 = Новые и восстановленные юниты
nh.new-feature.content-5-desc = Добавляет или перерабатывает несколько боевых юнитов: Реллэй, Призрак, Страйкер, Лимфа и Гистон.

nh.new-feature.content-6 = Реллэй
nh.new-feature.content-6-desc = Легкое морское судно, оснащенное двумя ракетными установками.

nh.new-feature.content-7 = Призрак
nh.new-feature.content-7-desc = Среднескоростной штурмовик, стреляющий рассеивающимися самонаводящимися импульсами молний.

nh.new-feature.content-8 = Страйкер
nh.new-feature.content-8-desc = Тяжелый воздушный юнит поддержки, оснащенный лазерной пушкой дальнего действия.

nh.new-feature.content-9 = Лимфа
nh.new-feature.content-9-desc = [red]Эта подзапись еще не раскрыта.

nh.new-feature.content-10 = Гистон
nh.new-feature.content-10-desc = [red]Эта подзапись еще не раскрыта.

nh.new-feature.content-11 = Новые здания, предметы и жидкости
nh.new-feature.content-11-desc = Добавляет контент, связанный с логистикой, производством, энергией, синтезом, предметами и жидкостями.

nh.new-feature.content-12 = Логистическая система
nh.new-feature.content-12-desc = Добавляет и настраивает несколько зданий распределения логистики, обновляет логику логистической системы.

nh.new-feature.content-13 = Производственная система
nh.new-feature.content-13-desc = Добавляет и настраивает несколько зданий, связанных с производством.

nh.new-feature.content-14 = Энергетическая система
nh.new-feature.content-14-desc = Добавляет и настраивает несколько зданий генерации, снабжения и поддержки энергии.

nh.new-feature.content-15 = Система синтеза
nh.new-feature.content-15-desc = Добавляет и настраивает несколько зданий синтеза, переработки и преобразования.

nh.new-feature.content-16 = Предметы и жидкости
nh.new-feature.content-16-desc = Добавляет несколько предметов и жидкостей, а также связанные с ними цепочки переработки.

nh.new-feature.balance-0 = Корректировки логистической системы
nh.new-feature.balance-0-desc = Корректирует и перерабатывает часть логики системы распределения.

nh.new-feature.balance-1 = Балансные корректировки
nh.new-feature.balance-1-desc = Вносит несколько балансных изменений.

nh.new-feature.fix-0 = Исправление вылета нерегулярных фабрик
nh.new-feature.fix-0-desc = Исправлен вылет, который мог быть вызван нерегулярными фабриками.
