mod.new-horizon.name = Новый Горизонт
mod.new-horizon.author = Yuria & Lao
mod.new-horizon.description = Бета-релиз. Кампания не включена.\n\nСодержит стабильный контент и опциональное замещение ванильных механик. \n\nМод играбелен как расширение для Серпуло и Эрекира. \n\nКампания всё ещё в разработке.
mod.new-horizon.subtitle = Бета-релиз. Кампания не включена.

