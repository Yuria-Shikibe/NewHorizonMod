status.new-horizon-emp-1.name = Микро-ЭМИ
status.new-horizon-emp-1.description = Слегка ослабляет боевые способности юнита\nПодвержен микро-ЭМИ-атаке, вспомогательные управляющие блоки повреждены, запускается резервная система...
status.new-horizon-emp-2.name = ЭМИ
status.new-horizon-emp-2.description = Ослабляет боевые способности юнита\nПодвержен ЭМИ-атаке, системы управления огнем нарушены.\n[accent]Перезаписывает повреждения от ЭМИ более низкого уровня
