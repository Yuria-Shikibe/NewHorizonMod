block.new-horizon-processor-manu-factory.description = Базовое оборудование для производства процессоров. Наносит схемы на кремниевые пластины для получения младших процессоров.
block.new-horizon-processor-printer.name = Принтер процессоров
block.new-horizon-processor-printer.description = Использует 3D-печать для создания младших процессоров из кремния.
