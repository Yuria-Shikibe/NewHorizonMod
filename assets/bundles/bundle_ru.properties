#Items
item.new-horizon-hard-light.name = Жесткий свет
item.new-horizon-hard-light.description = Естественно сформированные углеродно-кремниевые кристаллы, образующиеся в ходе высокоэнергетических физических процессов, таких как интенсивные солнечные бури, широко распространены на поверхности Миданты.
item.new-horizon-silicar.name = Силикар
item.new-horizon-silicar.description = Обратно разработанное достижение из реликтов Миданты, ультралегкий материал, образованный фотонным вырождением в определенных условиях.
item.new-horizon-presstanium.name = Пресстан
item.new-horizon-presstanium.description = Твердый, жесткий кусок металла.
item.new-horizon-processor-junior.name = Младший процессор
item.new-horizon-processor-junior.description = Базовый процессор.
item.new-horizon-processor-junior.details = "Intel - ДА!"
item.new-horizon-metal-oxhydrigen.name = Метагидроксид
item.new-horizon-metal-oxhydrigen.description = Кристально чистый!
item.new-horizon-zeta.name = Зета Кристалл
item.new-horizon-zeta.description = Издает слабое свечение.
item.new-horizon-multiple-steel.name = Мультисталь
item.new-horizon-multiple-steel.description = Панель, состоящая из множества слоев металлов, соединенных друг с другом.
item.new-horizon-processor-senior.name = Старший процессор
item.new-horizon-processor-senior.description = Более высокая скорость!
item.new-horizon-processor-senior.details = "NVIDIA ДА!"
item.new-horizon-irayrond-panel.name = Иридиевая панель
item.new-horizon-irayrond-panel.description = Специальный тип твердого металла с высокой термостойкостью.
item.new-horizon-seton-alloy.name = Сплав Сетона
item.new-horizon-seton-alloy.description = Тяжелый и твердый.
item.new-horizon-nodex-plate.name = Пластина Нодекс
item.new-horizon-nodex-plate.description = Умный металл, который может самовосстанавливаться.
item.new-horizon-ancimembrane.name = Анцимембрана
item.new-horizon-ancimembrane.description = Неизвестная древняя технология.
item.new-horizon-hadronicomp.name = Адронный композит
item.new-horizon-hadronicomp.description = Также известен как кварк-глюонный материал. Его продукты неразрушимы, достигая пределов известной науки.
item.new-horizon-processor-hyper.name = Гиперпроцессор
item.new-horizon-processor-hyper.description = Гиперфазовый вычислительный чип. Вычислительная производительность увеличена на несколько порядков.
item.new-horizon-fusion-core-energy.name = Кластер термоядерных частиц
item.new-horizon-fusion-core-energy.description = Большое количество термоядерных частиц в магнитной ловушке, может использоваться как энергия или напрямую как боеприпасы.
item.new-horizon-thermo-core-positive.name = Положительный термозаряд
item.new-horizon-thermo-core-positive.description = Контейнер, заполненный энергичным термозарядом.
item.new-horizon-thermo-core-negative.name = Отрицательный термозаряд
item.new-horizon-thermo-core-negative.description = Контейнер, заполненный холодным термозарядом.
item.new-horizon-dark-energy.name = Темная энергия
item.new-horizon-dark-energy.description = Тайна вселенной.

#Liquids
liquid.new-horizon-ammonia.name = Поляризованный аммиак
liquid.new-horizon-ammonia.description = Сильнощелочной аммиак, образованный в особых условиях, особенно в квантовой среде Миданты.
liquid.new-horizon-hydrazine.name = Гидразин
liquid.new-horizon-hydrazine.description = Высокоэнергетическое топливо, получаемое из поляризованного аммиака. Используется для выработки энергии или дальнейшего производства.
liquid.new-horizon-quantum-liquid.name = Квантовая жидкость
liquid.new-horizon-quantum-liquid.description = Нестабильный квантовый объект. После возбуждения может использоваться для различных промышленных целей.
liquid.new-horizon-xen-fluid.name = Ксен-жидкость
liquid.new-horizon-xen-fluid.description = Высокоэнергетическая жидкость. Может генерировать много энергии.
liquid.new-horizon-zeta-fluid-positive.name = Положительная зета-жидкость
liquid.new-horizon-zeta-fluid-positive.description = Положительная жидкость после электролиза кристаллов Зета. Может использоваться для химической обработки и возврата отрицательной зета-жидкости.
liquid.new-horizon-zeta-fluid-negative.name = Отрицательная зета-жидкость
liquid.new-horizon-zeta-fluid-negative.description = Отрицательная жидкость после электролиза кристаллов Зета. Может использоваться для химической обработки и возврата положительной зета-жидкости.
liquid.new-horizon-irdryon-fluid.name = Иридиевая жидкость
liquid.new-horizon-irdryon-fluid.description = Низкотемпературная фазовая жидкость.

liquid.new-horizon-photon.name = Фотонный поток
liquid.new-horizon-photon.description = Захваченные фотоны.
liquid.new-horizon-particle-stream.name = Поток частиц
#liquid.new-horizon-particle-stream.description =
liquid.new-horizon-neutron-stream.name = Нейтронный поток
#liquid.new-horizon-neutron-stream.description =
liquid.new-horizon-proton-stream.name = Протонный поток
#liquid.new-horizon-proton-stream.description =
liquid.new-horizon-anti-matter-stream.name = Поток антиматерии
#liquid.new-horizon-anti-matter-stream.description =

liquid.new-horizon-plo-naq.name = Пло-Нак
liquid.new-horizon-plo-naq.description = Критическая коллоидная жидкость. Может быть свободно сконфигурирована в любую высокопрочную структуру или использована для быстрого ремонта поврежденных зданий.
liquid.new-horizon-cho-vat.name = Чо-Ват
liquid.new-horizon-cho-vat.description = Хромово-зеленая жидкостная энергия. Значительно снижает входящий урон за счет эффекта рассеивания энергии.
liquid.new-horizon-kar-ion.name = Кар-Ион
liquid.new-horizon-kar-ion.description = Шестимерные высокомерные ионы. Разрушают обычные размерные объекты путем структурной диссоциации.

#Turret Block
block.new-horizon-bombard.name = Бомбард
block.new-horizon-bombard.description = Большая артиллерийская турель.
block.new-horizon-multiple-artillery.details = [red]БОРТОВОЙ ЗАЛП!
block.new-horizon-vortex.name = Вихрь
block.new-horizon-vortex.description = Большая турель.
block.new-horizon-hive.name = Улей
block.new-horizon-hive.description = Зенитная ракетная установка большой дальности.\nЗапускает ракеты по спиральной траектории.
block.new-horizon-ancient-artillery.name = Древняя артиллерия
block.new-horizon-ancient-artillery.description = Стреляет мощным снарядом.\n\n[sky]Только для редактора и песочницы. \n[accent]Повторный захват при разрушении включен. Захватите ее для лучшего контроля над полем боя.
block.new-horizon-prism.name = Призма
block.new-horizon-prism.description = Стреляет заряженным лазерным лучом, при этом меньшие лучи отражаются к ближайшим целям.
block.new-horizon-interferon.name = Интерферон
block.new-horizon-interferon.description = Неизвестная древняя технология\nСтреляет дуговыми разрывными зарядами.
block.new-horizon-beam.name = Луч
block.new-horizon-beam.description = Быстро стреляет лазерами по врагам.
block.new-horizon-antibody.name = Антитело
block.new-horizon-antibody.description = Неизвестная древняя технология\nСтреляет мини-энергетическими зарядами.
block.new-horizon-webber.name = Уэббер
block.new-horizon-webber.description = Захватывает врагов оптическими пинцетами.\n\n[accent]Приоритет отдается более быстрым врагам.
block.new-horizon-gravity.name = Гравитация
block.new-horizon-gravity.description = Стреляет притягивающим лучом, который может притягивать несколько юнитов одновременно.
block.new-horizon-eternity.name = Вечность
block.new-horizon-eternity.description = Сверхкрупное стратегически-тактическое супероружие. «Оно может стоить дорого, но оно достойно уважения и славы».
block.new-horizon-eternity.details = «На севере бездны есть рыба, имя ей Кунь. На южных морях есть пушка, имя ей Вечность. Ее длина — несколько сотен метров, диаметр — десятки метров. Когда она обращается в огонь, метеоры проносятся над головой, небо заливается багрянцем. При детонации горизонт вспыхивает ярко, словно пурпурные облака спускаются с небес, уничтожая всех врагов. Владыки охвачены страхом, заключают союзы, чтобы ослабить Цинь. Врата открыты, чтобы встретить ее, но они колеблются и не смеют продвинуться. На переговорах они требуют сократить проект вдвое, но безуспешно. Десятилетиями они не смеют скакать на юг, чтобы пасти своих коней.» — отрывок из «Вечности». Ее стоимость, масштаб и сдерживающая сила беспрецедентны. Под давлением запрещено развертывание на зарубежных базах, с гарантиями, что она не будет применена первой. Трудный процесс разработки и огромные затраты однажды привели к приостановке проекта. Действительно, огромное потребление всех видов ресурсов сделало бы и без того небогатую компанию еще беднее. Но как стратегический козырь она редко содержится в активном состоянии.
block.new-horizon-anti-bullet-turret.name = Перехватчик
block.new-horizon-anti-bullet-turret.description = Турель точечной защиты. Перехватывает приближающиеся пули.
block.new-horizon-anti-bullet-turret.details = На самом деле использует силовую цепь и вычислитель управления огнем от Аргмота.
block.new-horizon-pulse.name = Импульс
block.new-horizon-pulse.description = Стреляет очередями пуль по врагам. Наносит больше кинетического урона.
block.new-horizon-pulse.details = Ходят слухи, что кодовое имя в военной базе данных для нее — «Старая мама».
block.new-horizon-dendrite.name = Дендрит
block.new-horizon-dendrite.description = Неизвестная древняя технология
block.new-horizon-atom-separator.name = Атомный разделитель
block.new-horizon-atom-separator.description = Стреляет смертоносным непрерывным лазером.\n\nПриоритет отдается врагам с меньшей скоростью.
block.new-horizon-atom-separator.details = Прозвище — Атомный резак. Говорят, что принудительное отключение блокировки по углу возвышения позволяет стрелять прямо в небо.\n\n[accent]«Мне показалось, или я видел странную блондинку в доспехах, стоящую там?»
block.new-horizon-blood-star.name = Кровавая звезда
block.new-horizon-blood-star.description = Стреляет статической ионной бомбой.
block.new-horizon-blood-star.details = Готовый боезапас может вызвать разрушительную цепную реакцию при попадании. Тщательно защищайте турель.
block.new-horizon-multiple-launcher.name = Мульти-пусковая установка
block.new-horizon-multiple-launcher.description = Большая ракетная турель.
block.new-horizon-multiple-launcher.details = Прозвище — «Катюша», что, кажется, какое-то древнее женское имя. Как ни странно, это прозвище неожиданно популярно.\n\nВозможно, потому что она любит пить?
block.new-horizon-thermo-turret.name = Термо-турель
block.new-horizon-thermo-turret.description = Простая оборонительная турель, стреляющая самонаводящимися снарядами за счет зарядки Ксен-жидкости.
block.new-horizon-thermo-turret.details = Ранняя турель, оптимизированная для химических выбросов Миданты. Пиролизный эффект Ксен-жидкости, стимулируемый электричеством, достаточен для отражения атак меньших юнитов.
block.new-horizon-rail-gun.name = Рельсотрон
block.new-horizon-rail-gun.description = Турель с медленной скоростью вращения и низкой скорострельностью, стреляющая болтами с очень большой дальностью и высоким уроном.
block.new-horizon-rail-gun.details = Начальная скорость пули приближается к 15 Махам. Ее экстремальная пробивная способность позволяет легко пронзать любую цель.
block.new-horizon-end-of-era.name = Конец эры
block.new-horizon-end-of-era.description = Может оснащаться мощными пулями.
block.new-horizon-executor.name = Палач
block.new-horizon-executor.description = Запускает мощные энергетические болты, которые самонаводятся на врагов.
block.new-horizon-synchro.name = Синхро
block.new-horizon-synchro.description = Стандартная турель с высокой скорострельностью. Может наносить большой урон юнитам, но неэффективна против щитов.
block.new-horizon-argmot.name = Аргмот
block.new-horizon-argmot.description = Стреляет сгустками электричества по врагам. Скорострельность увеличивается со временем. Перегревается при длительной стрельбе. Наносит сокрушительный урон по щитам.
block.new-horizon-argmot.details = При полной загрузке наносит сокрушительный урон, но если огромное количество отходящего тепла не контролировать, это приведет к принудительному отключению.
block.new-horizon-slavio.name = Славио
block.new-horizon-slavio.description = Запускает ряд самонаводящихся ракет. Наносит большой урон юнитам, но неэффективен против щитов.
block.new-horizon-concentration.name = Концентрация
block.new-horizon-concentration.description = [sky]Чем дольше она смотрит, [#bf92f9]тем сильнее становится.
block.new-horizon-electro.name = Электро
block.new-horizon-electro.description = Выпускает энергетические пули, которые парализуют врагов и наносят непрерывный урон по большой площади.

#ProductionBlock
block.new-horizon-large-water-extractor.name = Большой гидронасос
block.new-horizon-large-water-extractor.description = Извлекает подземные воды с более высокой эффективностью, чем гидронасос.
block.new-horizon-scan-collector.name = Сканирующий коллектор
#block.new-horizon-scan-collector.description =
block.new-horizon-resonance-mining-facility.name = Резонансный бур
block.new-horizon-resonance-mining-facility.description = Использует механические волны определенной частоты для эффективной добычи ресурсов.
block.new-horizon-beam-mining-facility.name = Лучевой бур
block.new-horizon-beam-mining-facility.description = Использует мощные лазерные лучи для добычи. Способен обрабатывать более твердые руды. Может получать выгоду от модулей добычи.
block.new-horizon-implosion-mining-facility.name = Имплозивный бур
block.new-horizon-implosion-mining-facility.description = Эффективно извлекает ресурсы с помощью имплозии.
block.new-horizon-air-radiator.name = Воздушный радиатор
#block.new-horizon-air-radiator.description =
block.new-horizon-liquid-radiator.name = Жидкостный радиатор
#block.new-horizon-liquid-radiator.description =
block.new-horizon-sand-cracker.name = Дробилка песка
block.new-horizon-sand-cracker.description = Измельчает материалы в песок.
block.new-horizon-decoherence-reverser.name = Реверсер декогеренции
#block.new-horizon-decoherence-reverser.description =
block.new-horizon-tungsten-reconstructor.name = Вольфрамовый реконструктор
block.new-horizon-titanium-reconstructor.name = Титановый реконструктор
block.new-horizon-oil-refiner.name = Нефтеперегонный завод
block.new-horizon-oil-refiner.description = Извлекает нефть из песка.

#DistributionBlock
block.new-horizon-hard-light-rail.name = Рельс жесткого света
block.new-horizon-hard-light-rail.description = Использует статические и затвердевшие фотоны в качестве носителя для транспортировки предметов. Принимает предметы только от заднего здания и других логистических компонентов.
block.new-horizon-hard-light-rail.details = Концепция использования статических фотонных мостов была впервые предложена и реализована древним предприятием Guangquan Technology. Дизайн жесткого света теперь стал предпочтительным выбором для логистики следующего поколения благодаря своей практически полной безатериальности.
block.new-horizon-stack-rail.name = Штабельный рельс
block.new-horizon-stack-rail.description = Штабелирует и транспортирует упакованные предметы. Используйте штабелер для подачи штабелированных предметов.
block.new-horizon-steady-stack-rail.name = Стабильный штабельный рельс
block.new-horizon-steady-stack-rail.description = Позволяет транспортировать штабелированные упакованные предметы. Используйте штабелер для подачи штабелированных предметов. Продвинутые материалы повышают стабильность упаковки, обеспечивая более высокую скорость транспортировки.
block.new-horizon-light-stack-loader.name = Легкий штабелер
block.new-horizon-light-stack-loader.description = Выводит входящие предметы в стопках по 15 на штабельный конвейерный рельс.
block.new-horizon-heavy-stack-loader.name = Тяжелый штабелер
block.new-horizon-heavy-stack-loader.description = Выводит входящие предметы в стопках по 60 на штабельный конвейерный рельс.
block.new-horizon-logistics-router.name = Логистический маршрутизатор
#block.new-horizon-logistics-router.description =
block.new-horizon-logistics-junction.name = Рельсовый перекресток
block.new-horizon-logistics-junction.description = Позволяет двум рельсам пересекаться.
block.new-horizon-logistics-directional-router.name = Направленный маршрутизатор
block.new-horizon-logistics-directional-router.description = Направленный маршрутизатор. Входные предметы равномерно распределяются по трем другим направлениям.
block.new-horizon-logistics-directional-merger.name = Направленный объединитель
block.new-horizon-logistics-directional-merger.description = Направленный объединитель. Объединяет три входа в одно направление.
block.new-horizon-logistics-directional-overflow-gate.name = Направленный избыточный затвор
block.new-horizon-logistics-directional-overflow-gate.description = Логистический компонент, который может перенаправлять входы предметов в заданном направлении.
block.new-horizon-logistics-directional-underflow-gate.name = Направленный шлюз недогруза
block.new-horizon-logistics-directional-underflow-gate.description = Логистический компонент, который может ограничивать входы предметов в заданном направлении.
block.new-horizon-logistics-omni-sorter.name = Всенаправленный сортировщик
block.new-horizon-logistics-omni-sorter.description = Позволяет исключать входы предметов в каждом направлении.
block.new-horizon-logistics-omni-blocker.name = Всенаправленный блокировщик
block.new-horizon-logistics-omni-blocker.description = Логистический компонент, который может ограничивать или перенаправлять входы предметов в любом направлении. Нажмите для переключения режима.
block.new-horizon-logistics-omni-overflow-gate.name = Всенаправленный избыточный затвор
block.new-horizon-logistics-omni-overflow-gate.description = Позволяет фильтровать входы предметов в каждом направлении.
block.new-horizon-logistics-omni-underflow-gate.name = Всенаправленный шлюз недогруза
block.new-horizon-logistics-omni-underflow-gate.description = Позволяет ограничивать входы предметов в каждом направлении.
block.new-horizon-logistics-bridge.name = Рельсовый мост
block.new-horizon-logistics-bridge.description = Может транспортировать предметы на другой мост в радиусе действия. Может принимать до трех входов.
block.new-horizon-logistics-extend-bridge.name = Удлиненный мост
block.new-horizon-logistics-extend-bridge.description = Может транспортировать предметы на другой мост в радиусе действия. Может принимать до трех входов.
block.new-horizon-logistics-unloader.name = Рельсовый разгрузчик
block.new-horizon-logistics-unloader.description = Выгружает предметы из заднего здания в переднее. Может быть настроен на определенный предмет. Увеличивает скорость при настройке на конкретный предмет.
block.new-horizon-logistics-fast-unloader.name = Быстрый рельсовый разгрузчик
#block.new-horizon-logistics-fast-unloader.description =
block.new-horizon-omni-unloader.name = Всенаправленный разгрузчик
#block.new-horizon-omni-unloader.description =
block.new-horizon-rapid-unloader.name = Скоростной разгрузчик
block.new-horizon-rapid-unloader.description = Улучшенный разгрузчик. Быстро выгружает выбранный предмет из ближайших блоков.
block.new-horizon-reinforced-item-source.name = Усиленный источник предметов
block.new-horizon-reinforced-item-source.description = Имеет больше здоровья.\n\n[accent]Выбранный контент строго записывается и читается по идентификатору, чтобы избежать проблем с потерей привязки.

#LiquidBlock
block.new-horizon-turbo-pump-small.name = Малый турбонасос
block.new-horizon-turbo-pump-small.description = Перекачивает жидкость. При подключении к другим турбонасосам может рассматриваться как единое целое для передачи энергии и подачи жидкости.
block.new-horizon-turbo-pump.name = Турбонасос
block.new-horizon-turbo-pump.description = Перекачивает жидкость. При подключении к другим турбонасосам может рассматриваться как единое целое для передачи энергии и подачи жидкости.
block.new-horizon-standard-liquid-storage.name = Стандартное хранилище жидкостей
block.new-horizon-standard-liquid-storage.description = Хранит большое количество жидкости.
block.new-horizon-heavy-liquid-storage.name = Тяжелое хранилище жидкостей
block.new-horizon-heavy-liquid-storage.description = Хранит очень большое количество жидкости.
block.new-horizon-conduit.name = Трубопровод
block.new-horizon-conduit.description = Перемещает жидкость вперед. Нажмите для переключения приема бокового ввода.
block.new-horizon-logistics-liquid-bridge.name = Жидкостный мост
block.new-horizon-logistics-liquid-bridge.description = Может транспортировать жидкость на другой мост в радиусе действия. Может принимать до трех входов.
block.new-horizon-logistics-extend-liquid-bridge.name = Удлиненный жидкостный мост
block.new-horizon-logistics-extend-liquid-bridge.description = Может транспортировать жидкость на другой мост в радиусе действия. Может принимать до трех входов.
block.new-horizon-logistics-liquid-junction.name = Логистический жидкостный перекресток
block.new-horizon-logistics-liquid-junction.description = Позволяет двум трубам пересекаться.
block.new-horizon-logistics-liquid-router.name = Логистический жидкостный маршрутизатор
block.new-horizon-logistics-liquid-router.description = Жидкость может распределяться в любом направлении.
block.new-horizon-logistics-liquid-unloader.name = Жидкостный разгрузчик
block.new-horizon-logistics-liquid-unloader.description = Выгружает жидкость из заднего здания в переднее. Должен быть настроен на конкретную жидкость.
block.new-horizon-reinforced-liquid-source.name = Усиленный источник жидкости
block.new-horizon-reinforced-liquid-source.description = Имеет больше здоровья.\n\n[accent]Выбранный контент строго записывается и читается по идентификатору, чтобы избежать проблем с потерей привязки.

block.new-horizon-stream-source.name = Источник потока
block.new-horizon-stream-source.description = Бесконечно выводит потоки частиц в заданном направлении.
block.new-horizon-stream-extractor.name = Экстрактор потока
block.new-horizon-stream-extractor.description = Выводит потоки частиц из окружающих блоков в заданном направлении.
block.new-horizon-stream-receiver.name = Приемник потока
block.new-horizon-stream-receiver.description = Принимает потоки частиц с других трех сторон и передает их вперед.
block.new-horizon-stream-repeater.name = Повторитель потока
block.new-horizon-stream-repeater.description = Принимает потоки частиц сзади и передает их вперед, увеличивая дальность передачи.
block.new-horizon-stream-redirector.name = Перенаправитель потока
block.new-horizon-stream-redirector.description = Принимает потоки частиц с других трех сторон и передает их вперед.
block.new-horizon-stream-splitter.name = Разделитель потока
block.new-horizon-stream-splitter.description = Принимает потоки частиц с боков, передает измеренную часть вперед, а остальное продолжает передаваться на противоположную сторону.

