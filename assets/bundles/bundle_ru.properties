block.new-horizon-photothermal-generator.name = Фототермальный генератор
block.new-horizon-photothermal-generator.description = Особая версия генератора внутреннего сгорания. Преобразует часть тепловой энергии в жесткий свет.
block.new-horizon-geological-photothermal-generator.name = Геологический фототермальный генератор
block.new-horizon-geological-photothermal-generator.description = Особая версия термального генератора. Преобразует часть тепловой энергии в жесткий свет.
block.new-horizon-vector-condenser.name = Векторная турбина
block.new-horizon-vector-condenser.description = Особая версия турбинного конденсатора. Преобразует часть тепловой энергии в жесткий свет.
block.new-horizon-differential-reactor.name = Дифференциальный реактор
#block.new-horizon-differential-reactor.description =
block.new-horizon-photon-panel.name = Фотонная панель
block.new-horizon-photon-panel.description = Улучшенная солнечная панель. Генерирует энергию от солнечного света, одновременно улавливая свет и преобразуя его в жесткий свет.\nЭффективность преобразования зависит от солнечного множителя. Продукты передаются напрямую в ядро через гипер-инвентарный протокол, без необходимости логистических компонентов. Смотрите категорию энергетических зданий для связанных производственных объектов.
block.new-horizon-neutralization-generator.name = Генератор нейтрализации
block.new-horizon-neutralization-generator.description = Генерирует энергию из энергии, выделяемой при нейтрализации поляризованного аммиака. Выводит воду в качестве побочного продукта.
block.new-horizon-hydrazine-generator.name = Гидразиновый генератор
block.new-horizon-hydrazine-generator.description = Генерирует энергию сжиганием гидразина.
block.new-horizon-gravity-trap-small.name = Малая гравитационная ловушка
block.new-horizon-gravity-trap-small.description = Легкий генератор гравитационного поля. Создает гравитационную ловушку в определенном радиусе.
block.new-horizon-gravity-trap.name = Стандартная гравитационная ловушка
block.new-horizon-gravity-trap.description = Тяжелый генератор гравитационного поля. Создает гравитационную ловушку и проводит электричество на большой площади.
block.new-horizon-gravity-trap-heavy.name = Тяжелая гравитационная ловушка
block.new-horizon-gravity-trap-heavy.description = Сверхтяжелый генератор гравитационного поля. Создает гравитационную ловушку и проводит электричество на большой площади.
block.new-horizon-zeta-generator.name = Зета-фьюзер
block.new-horizon-zeta-generator.description = Стабильный и эффективный реактор.
block.new-horizon-armor-battery.name = Бронированная батарея
block.new-horizon-armor-battery.description = Меньше по размеру.
block.new-horizon-armor-battery-large.name = Большая бронированная батарея
block.new-horizon-armor-battery-large.description = Бронированная большая батарея с повышенной прочностью, но уменьшенной емкостью. Из-за необходимости размещать энергетические блоки в опасных зонах, министр безопасности Расор поднял вопрос и обсуждение на совещании о «более безопасных батареях». (Ранее взрывающиеся большие батареи уже создали слишком много вдов.) В результате большая батарея была перестроена из более прочных материалов и оснащена электронным управлением.
block.new-horizon-armor-battery-huge.name = Гипер-батарея
block.new-horizon-armor-battery-huge.description = Хранит энергию. Имеет большую емкость, чем большие батареи.
block.new-horizon-hydro-fuel-cell.name = Водородный топливный элемент
block.new-horizon-hydro-fuel-cell.description = Генератор чистой энергии. Химическая энергия преобразуется в электричество под защитой азота.
block.new-horizon-fission-reactor.name = Реактор деления
#block.new-horizon-fission-reactor.description =
block.new-horizon-fusion-reactor.name = Термоядерный реактор
block.new-horizon-fusion-reactor.description = Коллапсирует термоядерные ядра для генерации энергии.
block.new-horizon-hyper-reactor.name = Гипер-реактор
block.new-horizon-hyper-reactor.description = Генерирует чрезвычайно большое количество энергии из положительных термозарядов, но также генерирует молнии. Урон от молний увеличивается, когда здание повреждено.\n[accent]Взорвется при разрушении.

#DefenseBlock
block.new-horizon-presstanium-wall.name = Стена из пресстана
block.new-horizon-presstanium-wall.description = Сплошная стена, может блокировать пули, молнии и лазеры. Может распределять полученный урон по близлежащим стенам.
block.new-horizon-presstanium-wall.details = Новое поколение оборонительного сооружения. Конструкция с распределением урона значительно повышает устойчивость стены к ударам.
block.new-horizon-refactoring-multi-wall.name = Рефакторинговая мульти-стена
block.new-horizon-refactoring-multi-wall.description = Сплошная стена с более высоким здоровьем, может блокировать пули, молнии и лазеры. Может распределять больше урона с большим количеством близлежащих стен. Имеет снижение урона.
block.new-horizon-refactoring-multi-wall.details = Путем наслаивания и реконструкции ториевых стен с высокосветовой сталью, устойчивость стены к ударам дополнительно повышается.
block.new-horizon-seton-phased-wall.name = Фазовая стена Сетона
block.new-horizon-seton-phased-wall.description = Прочная стена с сильной броней и высоким здоровьем, может блокировать пули, молнии и лазеры. Может распределять больше урона с большим количеством близлежащих стен. Имеет большее снижение урона.
block.new-horizon-seton-phased-wall.details = Высокопрочный ударопрочный материал, образованный взаимодействием плотного сплава и фазовой ткани, применяется в линиях обороны для дальнейшего повышения надежности.
block.new-horizon-shaped-wall.name = Адаптивная стена
block.new-horizon-shaped-wall.description = Практически несокрушимая стена, может блокировать пули, молнии и лазеры. Может распределять больше урона с большим количеством близлежащих стен. Имеет большое снижение урона.
block.new-horizon-shaped-wall.details = Так называемый «металл с памятью формы», чья пространственная форма фиксируется после завершения строительства, а последующие стены координируются для поддержания структуры. Благодаря свойствам материала большинство атак не могут пробить стену. Некоторые объекты исключительно используют этот тип стены. Это всего лишь побочный продукт.
block.new-horizon-fire-extinguisher.name = Огнетушитель
block.new-horizon-fire-extinguisher.description = Тушит близлежащие пожары.
block.new-horizon-blaster.name = Бластер
block.new-horizon-blaster.description = Выпускает молнии по приближающимся юнитам, отбрасывает их и наносит урон.
block.new-horizon-bomb-launcher.name = Бомбомет
block.new-horizon-bomb-launcher.description = Запускает бомбу с задержкой приземления в позицию цели.\n\n[sky]Можно одновременно командовать несколькими зданиями.
block.new-horizon-air-raider.name = Воздушный рейдер
block.new-horizon-air-raider.description = Наносит удар несколькими ракетами по цели.

#UnitBlock
block.new-horizon-basic-jump-gate.name = Базовые прыжковые ворота
#block.new-horizon-basic-jump-gate.description =
block.new-horizon-primary-jump-gate.name = Первичные прыжковые ворота
block.new-horizon-primary-jump-gate.description = Призывает юнитов T1, T2 и T3.
block.new-horizon-standard-jump-gate.name = Стандартные прыжковые ворота
block.new-horizon-standard-jump-gate.description = Позволяет игрокам вызывать юнитов для поддержки битвы.\n[sky]Может призывать старших юнитов.
block.new-horizon-hyper-jump-gate.name = Гипер-прыжковые ворота
block.new-horizon-hyper-jump-gate.description = Позволяет игрокам вызывать юнитов для поддержки битвы.\n[sky]Может призывать только младших юнитов.
block.new-horizon-hyper-space-warper.name = Гиперпространственные складные ворота
block.new-horizon-hyper-space-warper.description = Используется для транспортировки юнитов.\n\n[sky]Могут быть заблокированы вражескими гравитационными ловушками.\n[sky]Вы можете видеть радиус помех создоваемыми вражеской гравитационной ловушкой на HUD. Гравитационная ловушка блокирует юнита находящегося в гиперпространстве: На границе зоны действия поля, юнит выпрыгивает из гиперпространства и ему наносится процентный урон.
block.new-horizon-module-rail.name = Модульный рельс
block.new-horizon-module-rail.description = Специализированный рельс для транспортировки крупных модулей.

#SpecialBlock
block.new-horizon-core-conflux.name = Ядро: Конфлюкс
block.new-horizon-core-conflux.description = Самое маленькое аванпостное ядро, с умеренным хранилищем и оборонительными возможностями.
block.new-horizon-core-array.name = Ядро: Аррей
block.new-horizon-core-array.description = Базовое ядро среднего размера с отличным хранилищем и обороной, способное поддерживать базу среднего размера.
block.new-horizon-core-nexus.name = Ядро: Нексус
block.new-horizon-core-nexus.description = Крупное базовое ядро с исключительным хранилищем и обороной, способное поддерживать большую базу.
block.new-horizon-core-cluster.name = Ядро: Кластер
block.new-horizon-core-cluster.description = Самое продвинутое базовое ядро, высокотехнологичный продукт, реконструированный из древних технологий. Обладает невообразимым хранилищем и обороной, способное поддерживать массивную базу и одновременно поддерживать исключительно мощный ядерный мех.
block.new-horizon-rift-shield.name = Генератор разрывного щита
block.new-horizon-rift-shield.description = Создает мощный щит для отражения пуль и блокировки врагов.\nПотребляет больше ресурсов при низкой емкости щита.
block.new-horizon-standard-shield-generator.name = Стандартный генератор щита
block.new-horizon-standard-shield-generator.description = Легкий стандартный генератор щита. Создает прямоугольную силовую стену.
block.new-horizon-large-shield-generator.name = Большой силовой проектор
block.new-horizon-large-shield-generator.description = Создает более крупное и быстрее восстанавливающееся силовое поле, защищая здания и юниты внутри от повреждений.\nПерегревается при получении слишком большого урона. Опционально использует охлаждающую жидкость для предотвращения перегрева. Термоядра увеличивают размер щита.
block.new-horizon-standard-regen-projector.name = Стандартный регенерирующий проектор
block.new-horizon-standard-regen-projector.description = Ремонтирует поврежденные здания в прямоугольной области. Использование фазовой ткани увеличивает скорость ремонта. Имеет минимальный порог ремонта, позволяющий быстрее чинить небольшие здания. Эффекты ремонта не складываются.
block.new-horizon-heavy-regen-projector.name = Тяжелый регенерирующий проектор
block.new-horizon-heavy-regen-projector.description = Ремонтирует поврежденные здания в большей прямоугольной области. Использование мембранеллы увеличивает скорость ремонта. Имеет более высокий минимальный порог ремонта, позволяющий быстрее чинить небольшие и средние здания. Эффекты ремонта не складываются.
block.new-horizon-standard-storage.name = Стандартное хранилище
block.new-horizon-standard-storage.description = Легкое хранилище предметов. Предметы могут быть выгружены с помощью разгрузчиков.
block.new-horizon-heavy-storage.name = Тяжелое хранилище
block.new-horizon-heavy-storage.description = Тяжелое хранилище предметов. Предметы могут быть выгружены с помощью разгрузчиков.
block.new-horizon-remote-storage.name = Удаленное хранилище
block.new-horizon-remote-storage.description = Напрямую связывается с ядром, независимо от его позиции в мире. Потребление энергии увеличивается пропорционально количеству размещенных.[accent]Не обеспечивает дополнительную емкость предметов или функции ядра.
block.new-horizon-junior-module-beacon.name = Маяк-башня разгона
block.new-horizon-junior-module-beacon.description = Разгоняет все разгоняемые здания в прямоугольной области с центром на нем. Добавление фазовой ткани дополнительно увеличивает множитель разгона.
block.new-horizon-senior-module-beacon.name = Проекционная маяк-башня
block.new-horizon-senior-module-beacon.description = Увеличивает производство назначенных зданий в прямоугольной области с центром на нем. Добавление сплава Цунами дополнительно увеличивает множитель производства. Увеличивает только выпуск предметов и модулей.

#LogicBlock
block.new-horizon-icon-display-small.name = Малый иконный дисплей
block.new-horizon-icon-display-small.description = Отображает иконки игрового контента. Его содержимое может быть прочитано и настроено с помощью конфигурации мирового процессора.
block.new-horizon-icon-display.name = Иконный дисплей
block.new-horizon-icon-display.description = Отображает иконки игрового контента. Его содержимое может быть прочитано и настроено с помощью конфигурации мирового процессора.
block.new-horizon-character-display-small.name = Малый символьный дисплей
block.new-horizon-character-display-small.description = Отображает символы. Текстуры символов используют текстуры наложенных полов из игры.
block.new-horizon-character-display.name = Символьный дисплей
block.new-horizon-character-display.description = Отображает символы. Текстуры символов используют текстуры наложенных полов из игры.

#unit
unit.new-horizon-scalar.name = Скаляр
unit.new-horizon-scalar.description = Ядерный юнит для ядра Конфлюкс. Оснащен легкой рассеивающей термоэлектрической пушкой и ускорителем двигателя.\nСпособен добывать руду как с пола, так и со стен.
unit.new-horizon-vector.name = Вектор
unit.new-horizon-vector.description = Ядерный юнит для ядра Аррей. Оснащен легкими двойными разрывными пушками и ускорителем двигателя.\nСпособен добывать руду как с пола, так и со стен.
unit.new-horizon-martix.name = Матрица
unit.new-horizon-martix.description = Ядерный юнит для ядра Нексус. Оснащен двойными самонаводящимися разрывными выстрелами и ускорителем двигателя. Также может накладывать щиты на ближайшие юниты.\nСпособен добывать руду как с пола, так и со стен.
unit.new-horizon-tensor.name = Тензор
unit.new-horizon-tensor.description = Ядерный юнит для ядра Кластер. Продукт обратной разработки древних технологий, оснащен двойными скорострельными электромагнитными самонаводящимися энергетическими ракетами. Обладает прочным корпусом и кольцевым щитом, а также может давать сильные щиты юнитам в определенном радиусе.\nСпособен добывать руду как с пола, так и со стен.
unit.new-horizon-origin.name = Возникатель
unit.new-horizon-origin.description = Легкий наземный юнит, оснащенный рассеивающей пушкой.
unit.new-horizon-sharp.name = Остроконечник
unit.new-horizon-sharp.description = Легкий воздушный юнит, оснащенный легкой термопушкой.
unit.new-horizon-assaulter.name = Нападающий
unit.new-horizon-assaulter.description = Юнит-смертник, стреляющий перегруженным лазером.
unit.new-horizon-apparition.name = Призрак
unit.new-horizon-apparition.description = Среднескоростной штурмовик\nСтреляет рассеивающимися самонаводящимися импульсами молний.
unit.new-horizon-branch.name = Линия
unit.new-horizon-branch.description = Легкий воздушный юнит.
unit.new-horizon-thynomo.name = Тайномо
unit.new-horizon-thynomo.description = Средний наземный юнит с лазерной пушкой.
unit.new-horizon-relay.name = Реллэй
unit.new-horizon-relay.description = Легкое морское судно, оснащенное двумя ракетными установками.
unit.new-horizon-aliotiat.name = Алиотиат
unit.new-horizon-aliotiat.description = Средний наземный юнит поддержки.
unit.new-horizon-warper.name = Варпер
unit.new-horizon-warper.description = Высокоскоростной воздушный бомбардировщик.
unit.new-horizon-ghost.name = Призрак
unit.new-horizon-ghost.description = Среднее поддерживающее морское судно.
unit.new-horizon-rhino.name = Носорог
unit.new-horizon-rhino.description = Тяжелобронированный грузовой корабль с высокой скоростью строительства.
unit.new-horizon-gather.name = Сборщик
unit.new-horizon-gather.description = Старший шахтерский дрон.
unit.new-horizon-tarlidor.name = Тарлидор
unit.new-horizon-tarlidor.description = Тяжелый наземный юнит поддержки.
unit.new-horizon-naxos.name = Наксос
unit.new-horizon-naxos.description = Зенитный истребитель, оснащенный режущим лучом.\n\n[accent]Нацеливается и наносит урон только воздушным целям.
unit.new-horizon-striker.name = Страйкер
unit.new-horizon-striker.description = Тяжелый воздушный юнит поддержки, оснащенный лазерными пушками дальнего действия.
unit.new-horizon-zarkov.name = Зарьков
unit.new-horizon-zarkov.description = Тяжелое поддерживающее морское судно, оснащенное 4 многоствольными ракетными установками.
unit.new-horizon-annihilation.name = Аннигилятор
unit.new-horizon-annihilation.description = Тяжелый наземный юнит, оснащенный боевой лазерной пушкой и ракетными установками.
unit.new-horizon-destruction.name = Деструктор
unit.new-horizon-destruction.description = Тяжелый воздушный боевой юнит.
unit.new-horizon-longinus.name = Лонгин
unit.new-horizon-longinus.description = Артиллерийский крейсер, стреляет смертоносным энергетическим зарядом.
unit.new-horizon-saviour.name = Спаситель
unit.new-horizon-saviour.description = Большой юнит поддержки, оснащенный двумя тяжелыми ЭМИ-турелями.
unit.new-horizon-hurricane.name = Пиролизер
unit.new-horizon-hurricane.description = Воздушный флагман. Легко уничтожает все.
unit.new-horizon-anvil.name = Наковальня
unit.new-horizon-anvil.description = Тяжелый боевой корабль.
unit.new-horizon-declining.name = Ухудшатель
unit.new-horizon-declining.description = Морской флагман. Оснащен 3 рельсотронами и другим стрелковым оружием.
unit.new-horizon-sin.name = Грех
unit.new-horizon-sin.description = Тяжелый наземный мех, оснащенный несколькими ракетными орудиями.
unit.new-horizon-collapser.name = Коллапсер
unit.new-horizon-collapser.description = Великий воздушный флагман. Создан для уничтожения "внутренностей" вражеской базы.
unit.new-horizon-ancient-probe.name = Древний зонд
unit.new-horizon-ancient-probe.description = Неизвестная древняя технология.\nСканирует и отправляет данные о вражеских базах, может привлечь рейд.\n[red]<Вам пока не разрешен доступ к этой подзаписи>
unit.new-horizon-histone.name = Гистон
unit.new-horizon-histone.description = Неизвестная древняя технология\nАвтономный лазерный механизм\n[red]<Вам пока не разрешен доступ к этой подзаписи>
unit.new-horizon-restriction-enzyme.name = Рестрикционный фермент
unit.new-horizon-restriction-enzyme.description = Неизвестная древняя технология.\nАвтоматическая древняя турель.\n[red]<Вам пока не разрешен доступ к этой подзаписи>
unit.new-horizon-macrophage.name = Макрофаг
unit.new-horizon-macrophage.description = Неизвестная древняя технология.\nТяжелый боевой корабль. Может выполнять круговое движение.\n[red]<Вам пока не разрешен доступ к этой подзаписи>
unit.new-horizon-lymph.name = Лимфа
unit.new-horizon-lymph.description = Неизвестная древняя технология\nАвтономная тактическая оружейная платформа\n[red]<Вам пока не разрешен доступ к этой подзаписи>
unit.new-horizon-laugra.name = Лаугра
unit.new-horizon-laugra.description = Неизвестная древняя технология.\nСтреляет ускоряющимися пулями, которые пробивают здания и юнитов. Может быть заблокирована зданиями с броней более 10 или поглощающими лазерами.\nНе тонет.\n[red]<Вам пока не разрешен доступ к этой подзаписи>
unit.new-horizon-guardian.name = Карвошер
unit.new-horizon-guardian.description = Древнее неизвестное существо.\n\n[accent]Игроки не могут хорошо им управлять.
unit.new-horizon-pester.name = Энтанглер
unit.new-horizon-pester.description = Древний линкор.\n[sky]По возможности вернет весь нанесенный ему урон.\n[red]<Вам пока не разрешен доступ к этой подзаписи>
unit.new-horizon-nucleoid.name = Нуклеоид
unit.new-horizon-nucleoid.description = Неизвестная древняя технология.\nДолжно быть, флагман древних.\n[red]<Вам пока не разрешен доступ к этой подзаписи>
unit.new-horizon-liv.name = Лив
unit.new-horizon-liv.description = Высокоскоростной перехватчик, оснащен двумя термо-турелями. Также может использоваться как сильный юнит поддержки.
unit.new-horizon-liv.details = Использование ядра Нексус сделало ядерный юнит гораздо более мощным, чем раньше.

