nh.setting.nh-override-drill.name = Замещение ванильных буров
nh.setting.nh-override-drill.desc = Скрывает все ванильные буры, кроме пневматического и ударного.\nТакже корректирует характеристики и стоимость оставшихся буров.
nh.setting.nh-override-factories.name = Замещение ванильных фабрик
nh.setting.nh-override-factories.desc = Упрощает производство таких предметов, как кремний и сера, для ускорения прогресса в ранней игре.
nh.setting.nh-override-power.name = Замещение ванильной энергетики
nh.setting.nh-override-power.desc = Скрывает некоторые ванильные энергогенерирующие здания.\nВключите, если вам не нравится разнотехнологичная энергетика или вы хотите использовать энергосистему Нового Горизонта.
nh.setting.nh-override-unit.name = Замещение ванильных юнитов
nh.setting.nh-override-unit.desc = Убирает экологические ограничения со всех ванильных юнитов.\nПолезно при игре в средах, отличных от Миданты.
nh.setting.nh-override-logic.name = Замещение ванильной логики
nh.setting.nh-override-logic.desc = Корректирует стоимость ванильных логических зданий, чтобы их можно было строить в любых средах.
nh.setting.nh-override-item.name = Корректировка ванильных предметов
nh.setting.nh-override-item.desc = Убирает планетарные ограничения на использование некоторых ванильных предметных материалов.
nh.setting.nh-override-turret.name = Корректировка ванильных турелей
nh.setting.nh-override-turret.desc = Добавляет специфические для мода боеприпасы ванильным турелям и корректирует некоторые их значения.
nh.setting.nh-event-raid.name = Добавить воздушные налеты
nh.setting.nh-event-raid.desc = Включает периодические случайные воздушные налеты на картах, не являющихся песочницей. Не требует мирового процессора.
nh.setting.nh-debugging.name = Режим отладки
nh.setting.nh-debugging.desc = Включает режим отладки\nПозволяет включить некоторый отладочный контент.
nh.setting.nh-debug-panel.name = Панель отладки
nh.setting.nh-debug-panel.desc = Добавляет и включает панель отладки для мода.

